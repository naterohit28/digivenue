<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiVenue Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.topbar{
height:60px;
background:#020617;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #1e293b;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.dv{
background:#3b82f6;
padding:6px 10px;
border-radius:6px;
}

.top-buttons button{
margin-left:10px;
padding:8px 14px;
border-radius:6px;
border:none;
cursor:pointer;
}

.booking-btn{
background:#2563eb;
color:white;
}

.inquiry-btn{
background:#334155;
color:white;
}

.container{
padding:20px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
min-height:100px;
padding:6px;
font-size:12px;
cursor:pointer;
}

.day:hover{
background:#1e293b;
}

.hot{
background:#7c2d12;
}

.muhurat{
color:#fbbf24;
font-size:10px;
}

.booking{
color:#22c55e;
font-size:10px;
}

.inquiry{
color:#60a5fa;
font-size:10px;
}

.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
padding:20px;
border-radius:10px;
border:1px solid #334155;
display:none;
}

.modal input,.modal select{
display:block;
margin-top:10px;
width:250px;
padding:8px;
background:#020617;
border:1px solid #334155;
color:white;
}

.modal button{
margin-top:10px;
padding:8px 14px;
}

</style>
</head>

<body>

<div class="topbar">

<div class="logo">
<div class="dv">DV</div>
DigiVenue
</div>

<div class="top-buttons">
<button class="booking-btn" onclick="openBooking()">+ New Booking</button>
<button class="inquiry-btn" onclick="openInquiry()">+ New Inquiry</button>
</div>

</div>

<div class="container">

<h2>Smart Booking Calendar</h2>

<div id="calendar" class="calendar"></div>

</div>

<!-- Booking Modal -->

<div id="bookingModal" class="modal">

<h3>New Booking</h3>

<input id="bname" placeholder="Client name">
<input id="bdate" type="date">
<input id="bguests" placeholder="Guests">

<button onclick="saveBooking()">Confirm</button>

</div>

<!-- Inquiry Modal -->

<div id="inquiryModal" class="modal">

<h3>New Inquiry</h3>

<input id="iname" placeholder="Client name">
<input id="idate" type="date">
<input id="iguests" placeholder="Guests">

<select id="isource">
<option>Walk-in</option>
<option>Phone</option>
<option>WhatsApp</option>
<option>QR Code</option>
<option>Online</option>
</select>

<button onclick="saveInquiry()">Save</button>

</div>

<script>

const bookings=[]
const inquiries=[]

const MUHURATS={
marathi:["2025-03-12","2025-03-22"],
gujarati:["2025-03-14","2025-03-27"],
northIndian:["2025-03-11","2025-03-25"],
drik:["2025-03-10","2025-03-29"]
}

function demandScore(date){

let score=0

let day=new Date(date).getDay()

if(day==0||day==5||day==6)score+=2

Object.values(MUHURATS).forEach(arr=>{
if(arr.includes(date))score+=1.5
})

let inquiryCount=inquiries.filter(i=>i.date==date).length

score+=Math.min(inquiryCount*1.5,3)

let month=new Date(date).getMonth()

if([2,3,4,10,11].includes(month))score+=1.5

return score

}

function renderCalendar(){

let cal=document.getElementById("calendar")

cal.innerHTML=""

let today=new Date()

let year=today.getFullYear()

let month=today.getMonth()

let days=new Date(year,month+1,0).getDate()

for(let i=1;i<=days;i++){

let date=`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`

let div=document.createElement("div")

div.className="day"

let score=demandScore(date)

if(score>=6)div.classList.add("hot")

div.innerHTML=`<b>${i}</b>`

Object.values(MUHURATS).forEach(arr=>{
if(arr.includes(date))
div.innerHTML+=`<div class="muhurat">⭐ Muhurat</div>`
})

bookings.filter(b=>b.date==date).forEach(b=>{
div.innerHTML+=`<div class="booking">✓ ${b.name}</div>`
})

inquiries.filter(b=>b.date==date).forEach(b=>{
div.innerHTML+=`<div class="inquiry">• ${b.name}</div>`
})

cal.appendChild(div)

}

}

function openBooking(){

document.getElementById("bookingModal").style.display="block"

}

function openInquiry(){

document.getElementById("inquiryModal").style.display="block"

}

function saveBooking(){

bookings.push({
name:document.getElementById("bname").value,
date:document.getElementById("bdate").value
})

document.getElementById("bookingModal").style.display="none"

renderCalendar()

}

function saveInquiry(){

inquiries.push({
name:document.getElementById("iname").value,
date:document.getElementById("idate").value,
source:document.getElementById("isource").value
})

document.getElementById("inquiryModal").style.display="none"

renderCalendar()

}

renderCalendar()

</script>

</body>
</html>
