<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheet Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Root ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f7f8fc;
  --surface:    #ffffff;
  --surface2:   #f0f2f8;
  --border:     #e2e5ef;
  --border2:    #cdd1e0;
  --text:       #1a1d2e;
  --text2:      #5a6080;
  --text3:      #9ba3bf;
  --accent:     #4361ee;
  --accent-bg:  #eef0fd;
  --accent2:    #7c3aed;
  --green:      #059669;
  --green-bg:   #ecfdf5;
  --amber:      #d97706;
  --amber-bg:   #fffbeb;
  --red:        #dc2626;
  --header-h:   52px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow:     0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --r:          8px;
}

html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ───────────────────────────────────────────────── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.header-icon {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #4361ee, #7c3aed);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 14px;
  flex-shrink: 0;
}

.header-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  white-space: nowrap;
}

.header-subtitle {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
}

.header-spacer { flex: 1; }

.sync-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
}

.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 0 rgba(5,150,105,.4);
  animation: pulse-ring 2s ease-out infinite;
}

@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(5,150,105,.4); }
  70%  { box-shadow: 0 0 0 6px rgba(5,150,105,0); }
  100% { box-shadow: 0 0 0 0 rgba(5,150,105,0); }
}

.btn {
  height: 32px;
  padding: 0 14px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all .15s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: #3451d1; transform: translateY(-1px); }

.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--border); color: var(--text); }

.btn-danger {
  background: #fef2f2;
  color: var(--red);
  border: 1px solid #fecaca;
}
.btn-danger:hover { background: #fee2e2; }

/* ── Toolbar ──────────────────────────────────────────────── */
.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar-sep {
  width: 1px;
  height: 22px;
  background: var(--border);
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 160px;
  max-width: 320px;
}

.search-wrap svg {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
}

.search-input {
  width: 100%;
  height: 30px;
  padding: 0 10px 0 30px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  font-family: inherit;
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }

.col-filter-wrap {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.col-filter-label { font-size: 11px; color: var(--text3); font-weight: 500; }

.col-btn {
  height: 24px;
  padding: 0 10px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  transition: all .12s;
  white-space: nowrap;
}
.col-btn:hover, .col-btn.active {
  background: var(--accent-bg);
  border-color: #c7d0f9;
  color: var(--accent);
}

/* ── Edit banner ──────────────────────────────────────────── */
.edit-banner {
  background: var(--amber-bg);
  border-bottom: 1px solid #fde68a;
  padding: 7px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--amber);
  font-weight: 500;
  display: none;
}
.edit-banner.visible { display: flex; }
.edit-banner svg { flex-shrink: 0; }

/* ── Main area ────────────────────────────────────────────── */
main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Status bar ───────────────────────────────────────────── */
.status-bar {
  padding: 0 16px;
  height: 30px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.status-pill {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-pill strong { color: var(--text2); }

/* ── Table wrapper ────────────────────────────────────────── */
.table-container {
  flex: 1;
  overflow: auto;
  position: relative;
}

/* loading overlay */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(247,248,252,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 10;
  backdrop-filter: blur(2px);
}

.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-size: 13px; color: var(--text2); font-weight: 500; }

/* ── The table ────────────────────────────────────────────── */
table {
  border-collapse: separate;
  border-spacing: 0;
  width: max-content;
  min-width: 100%;
}

/* Row number column */
.row-num {
  position: sticky;
  left: 0;
  z-index: 2;
  background: var(--surface2);
  width: 40px;
  min-width: 40px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  border-right: 2px solid var(--border);
  user-select: none;
}

thead .row-num {
  z-index: 3;
  background: var(--surface2);
}

/* Header cells */
thead {
  position: sticky;
  top: 0;
  z-index: 4;
}

th {
  background: var(--surface2);
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .04em;
  padding: 0 12px;
  height: 36px;
  border-bottom: 2px solid var(--border2);
  border-right: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
  text-align: left;
}

th:hover { background: #e8eaf5; }
th.sorted-asc::after  { content: ' ↑'; color: var(--accent); }
th.sorted-desc::after { content: ' ↓'; color: var(--accent); }

/* Data cells */
td {
  padding: 0 12px;
  height: 34px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  vertical-align: middle;
  max-width: 280px;
  overflow: hidden;
  text-overflow: ellipsis;
}

tr:hover td:not(.row-num) { background: var(--accent-bg); }

/* editable cells */
td.editable {
  cursor: text;
  outline: none;
}

td.editable:focus {
  background: #fff;
  outline: 2px solid var(--accent);
  outline-offset: -1px;
  overflow: visible;
  z-index: 1;
  position: relative;
  box-shadow: 0 4px 16px rgba(67,97,238,.15);
}

td.modified {
  background: #fffbeb !important;
}

td.modified::after {
  content: '';
  position: absolute;
  top: 3px; right: 3px;
  width: 5px; height: 5px;
  background: var(--amber);
  border-radius: 50%;
}

td { position: relative; }

/* ── Dropdown select in cells ─────────────────────────────── */
td select {
  width: 100%;
  height: 100%;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  outline: none;
  padding: 0 4px 0 0;
  -webkit-appearance: auto;
}
td select:focus { background: #fff; }

/* ── Sheet tabs ───────────────────────────────────────────── */
.sheet-tabs {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  gap: 4px;
  align-items: center;
  overflow-x: auto;
}

.sheet-tab {
  height: 28px;
  padding: 0 16px;
  border-radius: 5px 5px 0 0;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  background: none;
  color: var(--text2);
  transition: all .12s;
  white-space: nowrap;
  font-family: inherit;
}
.sheet-tab:hover { background: var(--surface2); }
.sheet-tab.active {
  background: var(--surface);
  border-color: var(--border);
  color: var(--accent);
  font-weight: 600;
}

/* ── Error state ──────────────────────────────────────────── */
.error-state {
  padding: 60px 24px;
  text-align: center;
}
.error-state .icon { font-size: 40px; margin-bottom: 12px; }
.error-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.error-state p { font-size: 13px; color: var(--text2); line-height: 1.7; max-width: 420px; margin: 0 auto 20px; }
.error-state code {
  display: inline-block;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}

/* ── Toast notification ───────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1a1d2e;
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  z-index: 1000;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: #064e3b; }
.toast.warning { background: #78350f; }

/* ── Mobile responsive ────────────────────────────────────── */
@media (max-width: 640px) {
  .header-subtitle { display: none; }
  .col-filter-wrap { display: none; }
  td, th { padding: 0 8px; font-size: 12px; }
}

/* ── Scrollbar styling ────────────────────────────────────── */
.table-container::-webkit-scrollbar { width: 8px; height: 8px; }
.table-container::-webkit-scrollbar-track { background: var(--bg); }
.table-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
.table-container::-webkit-scrollbar-thumb:hover { background: var(--text3); }
.table-container::-webkit-scrollbar-corner { background: var(--bg); }
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<header>
  <div class="header-icon">📊</div>
  <div>
    <div class="header-title" id="sheetTitle">Loading…</div>
    <div class="header-subtitle">Live from Google Sheets · Local edits only</div>
  </div>
  <div class="header-spacer"></div>

  <div class="sync-indicator" id="syncIndicator" style="display:none">
    <div class="sync-dot"></div>
    Live
  </div>

  <button class="btn btn-ghost" onclick="refreshData()" id="refreshBtn">
    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
    </svg>
    Refresh
  </button>

  <button class="btn btn-danger" onclick="clearEdits()" id="clearBtn" style="display:none">
    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    Clear my edits
  </button>
</header>

<!-- ── EDIT BANNER ─────────────────────────────────────────── -->
<div class="edit-banner" id="editBanner">
  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
  </svg>
  You have local edits — these changes are only visible to you and won't affect the original sheet.
</div>

<!-- ── TOOLBAR ─────────────────────────────────────────────── -->
<div class="toolbar">
  <div class="toolbar-group">
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input class="search-input" type="text" placeholder="Search all cells…" id="searchInput" oninput="applyFilters()">
    </div>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <span style="font-size:11px;color:var(--text3);font-weight:500">Sort by:</span>
    <select class="col-btn" id="sortColSelect" onchange="applySortFromSelect()" style="height:26px;padding:0 8px;cursor:pointer">
      <option value="">— column —</option>
    </select>
    <button class="col-btn" id="sortDirBtn" onclick="toggleSortDir()">↑ Asc</button>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <span style="font-size:11px;color:var(--text3);font-weight:500">Filter column:</span>
    <div class="col-filter-wrap" id="colFilterWrap"></div>
  </div>
</div>

<!-- ── STATUS BAR ──────────────────────────────────────────── -->
<div class="status-bar">
  <div class="status-pill">
    Rows: <strong id="rowCount">—</strong>
  </div>
  <div class="status-pill">
    Cols: <strong id="colCount">—</strong>
  </div>
  <div class="status-pill" id="filterStatus" style="display:none">
    Showing: <strong id="filteredCount">—</strong>
  </div>
  <div class="status-pill" style="margin-left:auto">
    Last updated: <strong id="lastUpdated">—</strong>
  </div>
</div>

<!-- ── MAIN TABLE ──────────────────────────────────────────── -->
<main>
  <div class="table-container" id="tableContainer">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading sheet data…</div>
    </div>
    <div id="tableArea"></div>
  </div>
</main>

<!-- ── SHEET TABS ──────────────────────────────────────────── -->
<div class="sheet-tabs" id="sheetTabs" style="display:none"></div>

<!-- ── TOAST ──────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ⚙  CONFIG — Change the sheet ID here if needed
═══════════════════════════════════════════════════════════════ */
const SHEET_ID  = '1SErG-urDF7KqwU5inV6wwaqJfADXjY73Xss5BRDYY-Q'
const SHEETS = [
  { name: 'Sheet (gid 1775142554)', gid: '1775142554' },
  // Add more sheets like: { name: 'Sheet2', gid: '0' }
]

/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
let allData      = []      // raw rows from sheet
let headers      = []      // column headers
let displayData  = []      // currently shown rows (after filter/sort)
let localEdits   = {}      // { 'row-col': value }
let sortCol      = -1
let sortDir      = 'asc'
let hiddenCols   = new Set()
let activeGid    = SHEETS[0].gid
let searchQ      = ''
let autoInterval = null

/* ══════════════════════════════════════════════════════════════
   FETCH
══════════════════════════════════════════════════════════════ */
async function fetchSheet(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`
  try {
    const res  = await fetch(url)
    const text = await res.text()
    // Strip google's prefix: google.visualization.Query.setResponse(...)
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1])
    return json
  } catch (e) {
    return null
  }
}

function parseGvizResponse(json) {
  if (!json || !json.table) return { headers: [], rows: [] }

  const cols = json.table.cols || []
  const rows = json.table.rows || []

  const hdrs = cols.map(c => c.label || c.id || '')

  const data = rows.map(row =>
    (row.c || []).map((cell, ci) => {
      if (!cell) return ''
      // formatted value preferred, then raw value
      return cell.f !== undefined && cell.f !== null ? String(cell.f)
           : cell.v !== undefined && cell.v !== null ? String(cell.v)
           : ''
    })
  )

  return { headers: hdrs, rows: data }
}

/* ══════════════════════════════════════════════════════════════
   MAIN LOAD
══════════════════════════════════════════════════════════════ */
async function loadSheet(gid = activeGid, isRefresh = false) {
  activeGid = gid
  showLoading(true)

  const json   = await fetchSheet(gid)
  const parsed = parseGvizResponse(json)

  if (!parsed.rows.length && !parsed.headers.length) {
    showError()
    return
  }

  headers    = parsed.headers
  allData    = parsed.rows
  localEdits = {} // reset edits on fresh load
  hiddenCols = new Set()

  buildSortSelect()
  buildColFilter()
  applyFilters()
  updateStatusBar()
  updateSheetTabs()

  const sheetName = SHEETS.find(s => s.gid === gid)?.name || 'Sheet'
  document.getElementById('sheetTitle').textContent = sheetName
  document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString()
  document.getElementById('syncIndicator').style.display = 'flex'
  document.getElementById('clearBtn').style.display = 'none'
  document.getElementById('editBanner').classList.remove('visible')

  showLoading(false)
  if (isRefresh) showToast('Sheet refreshed', 'success')

  // Save sheet title for future reference
  try {
    const titleEl = document.querySelector('title')
    if (titleEl) titleEl.textContent = `${sheetName} — Sheet Viewer`
  } catch {}
}

function refreshData() {
  loadSheet(activeGid, true)
}

/* ══════════════════════════════════════════════════════════════
   BUILD TABLE
══════════════════════════════════════════════════════════════ */
function buildTable(rows) {
  const area = document.getElementById('tableArea')

  if (!rows.length) {
    area.innerHTML = `
      <div class="error-state">
        <div class="icon">🔍</div>
        <h3>No results</h3>
        <p>No rows match your current search or filter. Try clearing the search.</p>
        <button class="btn btn-ghost" onclick="document.getElementById('searchInput').value='';applyFilters()">Clear search</button>
      </div>`
    return
  }

  const maxCols = Math.max(headers.length, ...rows.map(r => r.length))

  let html = '<table id="dataTable"><thead><tr>'
  html += '<th class="row-num">#</th>'

  for (let c = 0; c < maxCols; c++) {
    if (hiddenCols.has(c)) continue
    const label = headers[c] || `Col ${c + 1}`
    const sortClass = sortCol === c ? (sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc') : ''
    html += `<th class="${sortClass}" onclick="sortByCol(${c})">${escHtml(label)}</th>`
  }
  html += '</tr></thead><tbody>'

  rows.forEach((row, ri) => {
    // Find the original row index in allData for edit tracking
    const origIdx = allData.indexOf(row) !== -1 ? allData.indexOf(row) : ri

    html += `<tr>`
    html += `<td class="row-num">${origIdx + 1}</td>`

    for (let c = 0; c < maxCols; c++) {
      if (hiddenCols.has(c)) continue

      const editKey = `${origIdx}-${c}`
      const rawVal  = row[c] ?? ''
      const dispVal = localEdits[editKey] !== undefined ? localEdits[editKey] : rawVal
      const modClass = localEdits[editKey] !== undefined ? 'modified' : ''

      // Detect if a column likely needs a dropdown (few unique values)
      const colValues = allData.map(r => r[c] ?? '').filter(v => v !== '')
      const uniqueVals = [...new Set(colValues)]
      const isDropdown = uniqueVals.length >= 2 && uniqueVals.length <= 12 && colValues.length > 3

      if (isDropdown && headers[c]) {
        const options = uniqueVals.map(v =>
          `<option value="${escHtml(v)}" ${v === dispVal ? 'selected' : ''}>${escHtml(v)}</option>`
        ).join('')
        html += `<td class="editable ${modClass}" data-row="${origIdx}" data-col="${c}">
          <select onchange="handleCellEdit(${origIdx}, ${c}, this.value)" onclick="event.stopPropagation()">
            <option value="">—</option>
            ${options}
          </select>
        </td>`
      } else {
        html += `<td class="editable ${modClass}"
          contenteditable="true"
          data-row="${origIdx}"
          data-col="${c}"
          data-orig="${escHtml(String(rawVal))}"
          oninput="handleCellEdit(${origIdx}, ${c}, this.textContent)"
          onkeydown="handleCellKeydown(event, ${origIdx}, ${c})"
        >${escHtml(String(dispVal))}</td>`
      }
    }
    html += '</tr>'
  })

  html += '</tbody></table>'
  area.innerHTML = html
}

/* ══════════════════════════════════════════════════════════════
   EDITING
══════════════════════════════════════════════════════════════ */
function handleCellEdit(rowIdx, colIdx, value) {
  const key     = `${rowIdx}-${colIdx}`
  const origVal = allData[rowIdx]?.[colIdx] ?? ''

  if (value !== origVal) {
    localEdits[key] = value
  } else {
    delete localEdits[key]
  }

  const hasEdits = Object.keys(localEdits).length > 0
  document.getElementById('clearBtn').style.display     = hasEdits ? 'inline-flex' : 'none'
  document.getElementById('editBanner').classList.toggle('visible', hasEdits)

  // Update modified class visually
  const td = document.querySelector(`td[data-row="${rowIdx}"][data-col="${colIdx}"]`)
  if (td) td.classList.toggle('modified', localEdits[key] !== undefined)
}

function handleCellKeydown(e, rowIdx, colIdx) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    // Move to next row
    const nextTd = document.querySelector(`td[data-row="${rowIdx + 1}"][data-col="${colIdx}"]`)
    if (nextTd) nextTd.focus()
  }
  if (e.key === 'Tab') {
    e.preventDefault()
    const nextTd = document.querySelector(`td[data-row="${rowIdx}"][data-col="${colIdx + 1}"]`)
      || document.querySelector(`td[data-row="${rowIdx + 1}"][data-col="0"]`)
    if (nextTd) nextTd.focus()
  }
  if (e.key === 'Escape') {
    // Revert cell
    const key     = `${rowIdx}-${colIdx}`
    const origVal = allData[rowIdx]?.[colIdx] ?? ''
    e.target.textContent = origVal
    delete localEdits[key]
    const hasEdits = Object.keys(localEdits).length > 0
    document.getElementById('clearBtn').style.display     = hasEdits ? 'inline-flex' : 'none'
    document.getElementById('editBanner').classList.toggle('visible', hasEdits)
    e.target.classList.remove('modified')
    e.target.blur()
  }
}

function clearEdits() {
  localEdits = {}
  document.getElementById('clearBtn').style.display = 'none'
  document.getElementById('editBanner').classList.remove('visible')
  applyFilters() // rebuild table
  showToast('All local edits cleared', 'warning')
}

/* ══════════════════════════════════════════════════════════════
   FILTER + SORT
══════════════════════════════════════════════════════════════ */
function applyFilters() {
  searchQ = document.getElementById('searchInput').value.toLowerCase().trim()

  let rows = [...allData]

  // Search
  if (searchQ) {
    rows = rows.filter(row =>
      row.some(cell => String(cell ?? '').toLowerCase().includes(searchQ))
    )
  }

  // Sort
  if (sortCol >= 0) {
    rows.sort((a, b) => {
      const av = String(a[sortCol] ?? '').toLowerCase()
      const bv = String(b[sortCol] ?? '').toLowerCase()
      const an = parseFloat(av), bn = parseFloat(bv)
      const cmp = (!isNaN(an) && !isNaN(bn)) ? an - bn : av.localeCompare(bv)
      return sortDir === 'asc' ? cmp : -cmp
    })
  }

  displayData = rows
  buildTable(rows)

  // Update filter status
  const filterStatus = document.getElementById('filterStatus')
  const filteredCount = document.getElementById('filteredCount')
  if (searchQ || sortCol >= 0) {
    filterStatus.style.display = 'flex'
    filteredCount.textContent  = rows.length
  } else {
    filterStatus.style.display = 'none'
  }
}

function sortByCol(c) {
  if (sortCol === c) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc'
  } else {
    sortCol = c
    sortDir = 'asc'
  }
  document.getElementById('sortDirBtn').textContent = sortDir === 'asc' ? '↑ Asc' : '↓ Desc'
  // Sync the select
  document.getElementById('sortColSelect').value = c
  applyFilters()
}

function applySortFromSelect() {
  const val = document.getElementById('sortColSelect').value
  sortCol   = val === '' ? -1 : parseInt(val)
  applyFilters()
}

function toggleSortDir() {
  sortDir = sortDir === 'asc' ? 'desc' : 'asc'
  document.getElementById('sortDirBtn').textContent = sortDir === 'asc' ? '↑ Asc' : '↓ Desc'
  applyFilters()
}

/* ══════════════════════════════════════════════════════════════
   COLUMN FILTER (hide/show columns)
══════════════════════════════════════════════════════════════ */
function buildColFilter() {
  const wrap = document.getElementById('colFilterWrap')
  wrap.innerHTML = headers.map((h, i) =>
    `<button class="col-btn active" data-col="${i}" onclick="toggleCol(${i}, this)">${escHtml(h || `C${i+1}`)}</button>`
  ).join('')
}

function toggleCol(idx, btn) {
  if (hiddenCols.has(idx)) {
    hiddenCols.delete(idx)
    btn.classList.add('active')
  } else {
    if (hiddenCols.size >= headers.length - 1) {
      showToast('At least one column must be visible')
      return
    }
    hiddenCols.add(idx)
    btn.classList.remove('active')
  }
  applyFilters()
}

/* ══════════════════════════════════════════════════════════════
   SORT SELECT
══════════════════════════════════════════════════════════════ */
function buildSortSelect() {
  const sel = document.getElementById('sortColSelect')
  sel.innerHTML = '<option value="">— column —</option>'
  headers.forEach((h, i) => {
    const opt = document.createElement('option')
    opt.value       = i
    opt.textContent = h || `Col ${i + 1}`
    sel.appendChild(opt)
  })
}

/* ══════════════════════════════════════════════════════════════
   SHEET TABS
══════════════════════════════════════════════════════════════ */
function updateSheetTabs() {
  const tabsEl = document.getElementById('sheetTabs')
  if (SHEETS.length <= 1) { tabsEl.style.display = 'none'; return }
  tabsEl.style.display = 'flex'
  tabsEl.innerHTML = SHEETS.map(s =>
    `<button class="sheet-tab ${s.gid === activeGid ? 'active' : ''}"
      onclick="loadSheet('${s.gid}')">${escHtml(s.name)}</button>`
  ).join('')
}

/* ══════════════════════════════════════════════════════════════
   STATUS BAR
══════════════════════════════════════════════════════════════ */
function updateStatusBar() {
  document.getElementById('rowCount').textContent = allData.length
  document.getElementById('colCount').textContent = headers.length
}

/* ══════════════════════════════════════════════════════════════
   ERROR STATE
══════════════════════════════════════════════════════════════ */
function showError() {
  showLoading(false)
  document.getElementById('tableArea').innerHTML = `
    <div class="error-state">
      <div class="icon">🔒</div>
      <h3>Cannot access the sheet</h3>
      <p>
        The sheet needs to be publicly viewable. In Google Sheets, go to<br>
        <strong>Share → Change to anyone with the link → Viewer</strong><br>
        then refresh this page. Your data stays read-only in the original sheet — visitors can only edit locally here.
      </p>
      <p style="margin-top:8px;font-size:12px;color:var(--text3)">
        Sheet ID: <code>${SHEET_ID}</code>
      </p>
      <button class="btn btn-primary" onclick="refreshData()" style="margin-top:8px">
        Try again
      </button>
    </div>`
}

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function showLoading(v) {
  document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none'
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;')
}

let toastTimer
function showToast(msg, type = '') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className   = `toast show ${type}`
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800)
}

/* ══════════════════════════════════════════════════════════════
   AUTO-REFRESH (every 60 seconds)
══════════════════════════════════════════════════════════════ */
function startAutoRefresh(intervalSec = 60) {
  if (autoInterval) clearInterval(autoInterval)
  autoInterval = setInterval(() => {
    // Only silent-refresh if no local edits
    if (Object.keys(localEdits).length === 0) {
      loadSheet(activeGid, false)
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString()
    }
  }, intervalSec * 1000)
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
loadSheet(SHEETS[0].gid)
startAutoRefresh(60)
</script>
