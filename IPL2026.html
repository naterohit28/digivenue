<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 Fantasy League</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* COMPACT & MODERN DASHBOARD GLOBAL STYLES */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc; font-family: 'Inter', sans-serif;
      padding: 15px; min-height: 100vh; overflow-x: hidden;
    }
    .dashboard-container {
      max-width: 1250px; margin: 0 auto;
      background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
      border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
      padding: 20px;
    }

    /* HEADER & TABS */
    .header { text-align: center; margin-bottom: 15px; }
    .header h1 {
      font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; margin: 0;
      background: linear-gradient(to right, #fbbf24, #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .update-banner {
      display: inline-block; margin-top: 8px;
      background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5; padding: 4px 12px; border-radius: 15px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    }
    .tab-bar {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 15px;
    }
    .tab-bar::-webkit-scrollbar { height: 4px; }
    .tab-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    .tab-button {
      background: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: all 0.2s; font-size: 13px; font-family: 'Inter', sans-serif;
    }
    .tab-button.active {
      background: rgba(251, 191, 36, 0.1); color: #fbbf24; border-color: #fbbf24;
    }

    /* COMPACT LEADERBOARD CARDS (Style from image_5cc10a.png) */
    .leaderboard { display: flex; flex-direction: column; gap: 10px; }
    .player-card {
      background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); 
      border-radius: 10px; padding: 12px; transition: transform 0.2s;
    }
    .player-card:hover { transform: translateY(-2px); background: rgba(51, 65, 85, 0.8); border-color: rgba(251, 191, 36, 0.4); }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px; margin-bottom: 10px;
    }
    .card-header-left { display: flex; align-items: center; }
    .rank-and-avatar { display: flex; align-items: center; margin-right: 12px;}
    .rank-bade {
      font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 800; width: 35px; height: 35px;
      display: flex; align-items: center; justify-content: center; border-radius: 50%;
      background: #334155; color: #cbd5e1; flex-shrink: 0; position: relative; z-index: 2; border: 2px solid #1e293b;
    }
    .rank-bade.r1 { background: linear-gradient(135deg, #fbbf24, #d97706); color: #fff; box-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
    .player-name { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 18px; color: #f8fafc; }
    .total-score { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 800; color: #fbbf24; text-align: right; }

    /* COMPACT STATS GRID */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; }
    .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); padding: 6px; border-radius: 6px; text-align: center; }
    .stat-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; margin-bottom: 3px; display: block; letter-spacing: 0.5px; }
    .stat-value { font-size: 13px; font-weight: 600; color: #e2e8f0; font-family: 'Poppins', sans-serif;}

    /* DATA TABLES (With Sticky Headers) */
    .table-container { overflow: auto; background: rgba(15, 23, 42, 0.6); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.05); max-height: 70vh; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; white-space: nowrap; }
    th, td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; color: #e2e8f0; }
    th { background: #0f172a; color: #fbbf24; font-weight: 600; font-size: 13px; position: sticky; top: 0; z-index: 30; border-bottom: 2px solid rgba(255,255,255,0.1); }
    
    .sticky-col1 { position: sticky; left: 0; background: #1e293b; z-index: 10; font-weight: 600; min-width: 170px; max-width: 170px; }
    .sticky-col2 { position: sticky; left: 170px; background: #1e293b; z-index: 10; font-weight: 800; color: #fbbf24; min-width: 90px; border-right: 1px solid rgba(255,255,255,0.1); text-align: center; }
    th.sticky-col1, th.sticky-col2 { z-index: 40; background: #0f172a; }
    tr:hover td { background: rgba(255,255,255,0.03); }

    /* IFRAME */
    .iframe-container { width: 100%; height: 75vh; border-radius: 10px; overflow: hidden; background: #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
    iframe { width: 100%; height: 100%; border: none; }
    .iframe-notice { text-align: center; color: #94a3b8; padding: 10px; font-size: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 15px;}

    .loading { text-align: center; color: #94a3b8; padding: 30px; font-weight: 500; font-size: 14px;}
    .spinner { width: 25px; height: 25px; border: 3px solid #334155; border-top-color: #fbbf24; border-radius: 50%; animation: spin 1s infinite linear; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .total-score { font-size: 20px;}
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .dashboard-container { padding: 10px; }
      .sticky-col1 { min-width: 120px; max-width: 120px; }
      .sticky-col2 { min-width: 80px; left: 120px; }
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <div class="header">
      <h1>IPL 2026 Fantasy League</h1>
      <div class="update-banner" id="banner">Fetching live data...</div>
    </div>

    <div class="tab-bar" id="tabBar"></div>
    <div id="contentArea">
      <div class="loading"><div class="spinner"></div>Loading View...</div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1SErG-urDF7KqwU5inV6wwaqJfADXjY73Xss5BRDYY-Q';
    
    // 🔴 Step 1: Replace this placeholder with your deployed Google Apps Script URL
    const PROXY_URL = 'YOUR_APPS_SCRIPT_PROXY_URL_HERE';
    
    const TABS = [
      { name: 'Leaderboard', gid: '1775142554', type: 'leaderboard' },
      { name: 'Your Report Card', gid: '1383665756', type: 'iframe' }, 
      { name: 'Match Scores', gid: '1509870547', type: 'datatable' },
      { name: 'SS Scores', gid: '130216061', type: 'datatable' },
      { name: 'Daily Score', gid: '1884747051', type: 'datatable' },
      { name: 'IPL Player Points', gid: '1991041599', type: 'datatable' }
    ];

    // ==========================================
    // 🛠️ PERFECTED MAPPING (Index matching image_5cc4ea.png)
    // ==========================================
    // (A=0, B=1, C=2...)
    const DASH_COLS = { 
      name: 2,           // Column C
      match: 3,          // Column D
      bonus: 4,          // Column E
      star: 5,           // Column F
      duo: 6,            // Column G
      resurrector: 7,    // Column H
      risk: 8,           // Column I
      special: 9,        // Column J
      superBonus: 10,    // Column K
      superSelector: 11, // Column L
      total: 12          // Column M (Cumulative Total)
    };

    let currentTab = TABS[0];

    function renderTabs() {
      const tabBar = document.getElementById('tabBar');
      tabBar.innerHTML = '';
      TABS.forEach(tab => {
        const btn = document.createElement('button');
        btn.className = `tab-button ${tab.name === currentTab.name ? 'active' : ''}`;
        btn.innerText = tab.name;
        btn.onclick = () => {
          currentTab = tab;
          renderTabs();
          loadContent();
        };
        tabBar.appendChild(btn);
      });
    }

    async function loadContent() {
      const content = document.getElementById('contentArea');
      
      if (currentTab.type === 'leaderboard' || currentTab.type === 'datatable') {
        content.innerHTML = '<div class="loading"><div class="spinner"></div>Crunching raw data...</div>';
        
        const fetchUrl = `${PROXY_URL}?id=${SHEET_ID}&gid=${currentTab.gid}`;
        
        try {
          const res = await fetch(fetchUrl);
          const json = await res.json();
          
          if (!json || !json.table || !json.table.rows) throw new Error("Could not parse data.");
          
          if (currentTab.type === 'leaderboard') {
            renderLeaderboard(json.table.rows);
          } else {
            renderDataTable(json.table.rows, json.table.cols);
          }
        } catch (error) {
          content.innerHTML = `<div class="loading" style="color:#ef4444;">Error connection failed. Verify Apps Script URL and Sheet Permissions.</div>`;
        }
      } 
      else if (currentTab.type === 'iframe') {
        // REPORT CARD: Keeping full iframe functionality for working dropdowns. Zoomed on D2:R45 layout.
        const iframeUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=${currentTab.gid}&rm=minimal&range=D2:R45`;
        
        content.innerHTML = `
          <div class="iframe-notice">💡 Use the name and match dropdowns inside the sheet to view your report card. Calculations happen inside Google Sheets.</div>
          <div class="iframe-container">
            <iframe src="${iframeUrl}" title="${currentTab.name}"></iframe>
          </div>
        `;
      }
    }

    // ==========================================
    // 🛠️ DATA TABLES: DYNAMIC FREEZE PANES & FIXED ALIGNMENT
    // ==========================================
    function renderDataTable(rows, cols) {
      let html = '<div class="table-container"><table><thead><tr>';
      const isPlayerPoints = currentTab.name === 'IPL Player Points';

      cols.forEach((c, i) => {
        if (isPlayerPoints) { if (i === 0 || i === 1) return; } 
        else { if (i === 0 || i === 3) return; }
        
        let cls = '';
        let label = c.label || '';
        if (isPlayerPoints) {
          if (i === 2) cls = 'sticky-col1';
          if (i === 3) { cls = 'sticky-col2'; label = 'Total Score'; }
        } else {
          if (i === 1) cls = 'sticky-col1';
          if (i === 2) { cls = 'sticky-col2'; label = 'Total Score'; }
        }
        html += `<th class="${cls}">${label}</th>`;
      });
      html += '</tr></thead><tbody>';

      rows.forEach(row => {
        html += '<tr>';
        row.c.forEach((cell, i) => {
          if (isPlayerPoints) { if (i === 0 || i === 1) return; } 
          else { if (i === 0 || i === 3) return; }
          
          let cls = '';
          if (isPlayerPoints) { if (i === 2) cls = 'sticky-col1'; if (i === 3) cls = 'sticky-col2'; }
          else { if (i === 1) cls = 'sticky-col1'; if (i === 2) cls = 'sticky-col2'; }
          
          // Cleanup data values
          let val = cell ? (cell.f || cell.v || '') : '';
          if (val === 'null' || val === null) val = '-';
          html += `<td class="${cls}">${val}</td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      document.getElementById('contentArea').innerHTML = html;
    }

    // ==========================================
    // 🛠️ LEADERBOARD: COMPACT CARDS & DECIMAL REMOVER
    // ==========================================
    const getCleanVal = (row, colIndex) => {
      if (row && row.c && row.c[colIndex] && row.c[colIndex].v !== null) {
        let val = row.c[colIndex].v;
        if (typeof val === 'number') return Math.round(val);
        let parsed = parseFloat(String(val).replace(/,/g, ''));
        return isNaN(parsed) ? val : Math.round(parsed);
      }
      return 0;
    };

    function renderLeaderboard(rows) {
      // Find current match number safely from headers
      try {
        const headerRow = rows.find(r => r.c.some(c => c && c.v && String(c.v).includes('Match')));
        if(headerRow) {
          const matchCell = headerRow.c.find(c => c && c.v && String(c.v).includes('Match'));
          if(matchCell) {
            const matchTxt = String(matchCell.v).match(/Match \d+/);
            if(matchTxt) document.getElementById('banner').innerText = 'Data updated till ' + matchTxt[0];
          }
        }
      } catch(e) {}

      let html = '<div class="leaderboard">';
      let validPlayers = [];
      
      rows.forEach(row => {
        const nameRaw = row.c && row.c[DASH_COLS.name] ? row.c[DASH_COLS.name].v : '';
        const name = String(nameRaw).trim();
        
        if (name !== '' && name !== 'Participant' && name !== '0' && name !== 'null') {
          validPlayers.push({
            name, 
            score: getCleanVal(row, DASH_COLS.total), // Corrected index (Column M)
            match: getCleanVal(row, DASH_COLS.match),
            bonus: getCleanVal(row, DASH_COLS.bonus),
            star: getCleanVal(row, DASH_COLS.star),
            duo: getCleanVal(row, DASH_COLS.duo),
            resurrector: getCleanVal(row, DASH_COLS.resurrector),
            risk: getCleanVal(row, DASH_COLS.risk),
            special: getCleanVal(row, DASH_COLS.special),
            superBonus: getCleanVal(row, DASH_COLS.superBonus),
            superSelector: getCleanVal(row, DASH_COLS.superSelector)
          });
        }
      });

      // Sort valid players by cumulative total
      validPlayers.sort((a, b) => b.score - a.score);

      validPlayers.forEach((p, i) => {
        const rank = i + 1;
        
        html += `
          <div class="player-card">
            <div class="card-header">
              <div class="card-header-left">
                <div class="rank-and-avatar">
                   <div class="rank-bade ${rank===1 ? 'r1' : ''}">${rank}</div>
                </div>
                <div class="player-name">${p.name}</div>
              </div>
              <div class="total-score">${p.score.toLocaleString('en-US')}</div>
            </div>
            <div class="stats-grid">
              <div class="stat-box"><span class="stat-label">Match</span><span class="stat-value">${p.match.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Bonus</span><span class="stat-value">${p.bonus.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Star</span><span class="stat-value">${p.star.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Duo</span><span class="stat-value">${p.duo.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Resurrect</span><span class="stat-value">${p.resurrector.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Risk</span><span class="stat-value">${p.risk.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Special</span><span class="stat-value">${p.special.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Sup Bonus</span><span class="stat-value">${p.superBonus === 0 ? '-' : p.superBonus.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Selector</span><span class="stat-value">${p.superSelector.toLocaleString('en-US')}</span></div>
            </div>
          </div>`;
      });
      document.getElementById('contentArea').innerHTML = html + '</div>';
    }

    // Startup
    renderTabs();
    loadContent();
    setInterval(() => { if(currentTab.type === 'leaderboard') loadContent(); }, 120000);
  </script>

</body>
</html>
