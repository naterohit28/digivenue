<script>
    const SHEET_ID = '1SErG-urDF7KqwU5inV6wwaqJfADXjY73Xss5BRDYY-Q';
    const GID = '1775142554'; 
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

    async function loadDashboard() {
      try {
        const res = await fetch(URL);
        const text = await res.text();
        
        // Diagnostic: Check if Google sent an HTML login page instead of data
        if (text.includes('<html')) {
          throw new Error("Google is blocking access. The sheet is not set to 'Anyone with the link'.");
        }

        const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
        if (!jsonString) throw new Error("Could not parse the data from Google.");
        
        const json = JSON.parse(jsonString[1]);
        const rows = json.table.rows;
        let html = '';
        let validPlayers = [];
        
        rows.forEach((row, index) => {
          try {
            // Safely check if the row and column C exist
            if(row && row.c && row.c[2] && row.c[2].v) {
              const name = String(row.c[2].v);
              if (name !== 'Participant' && name.trim() !== '') {
                
                // Safely grab the other columns (fallback to 0 if empty)
                const starPerformer = (row.c[5] && row.c[5].v) ? row.c[5].v : 0;
                const dynamicDuo = (row.c[6] && row.c[6].v) ? row.c[6].v : 0;
                const totalScore = (row.c[12] && row.c[12].v) ? row.c[12].v : 0;

                const numericScore = typeof totalScore === 'number' ? totalScore : parseFloat(String(totalScore).replace(/,/g, '')) || 0;

                validPlayers.push({
                  name: name,
                  score: numericScore, 
                  displayScore: totalScore,
                  starPerformer: starPerformer,
                  dynamicDuo: dynamicDuo
                });
              }
            }
          } catch (rowError) {
            console.log("Skipping a broken row at index: " + index);
          }
        });

        if (validPlayers.length === 0) {
          throw new Error("Connected to sheet, but couldn't find any player names in Column C.");
        }

        validPlayers.sort((a, b) => b.score - a.score);

        validPlayers.forEach((player, index) => {
          const rank = index + 1;
          let rankClass = rank <= 3 ? `rank-${rank}` : '';
          html += `
            <div class="player-card">
              <div class="rank ${rankClass}">${rank}</div>
              <div class="player-info">
                <div class="player-name">${player.name}</div>
                <div class="player-stats">
                  <span class="stat-badge">⭐ Star: ${player.starPerformer}</span>
                  <span class="stat-badge">🤝 Duo: ${player.dynamicDuo}</span>
                </div>
              </div>
              <div class="total-score">${player.displayScore.toLocaleString()}</div>
            </div>
          `;
        });

        document.getElementById('leaderboard').innerHTML = html;

      } catch (error) {
        // This will print the EXACT error on your screen
        document.getElementById('leaderboard').innerHTML = `
          <div style="background: rgba(220,38,38,0.2); border: 1px solid #ef4444; padding: 20px; border-radius: 10px; color: #fca5a5; text-align: center;">
            <strong>Error:</strong> ${error.message}
          </div>
        `;
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 60000);
  </script>
