<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavor Fusion Pro v2.7 | Business Suite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f1f5f9;
            margin: 0;
            padding: 0;
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: #171717;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .warning {
            background: #451a03;
            color: #fdba74;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .profit { color: #4ade80; }
        .loss { color: #f87171; }
        .pending { color: #fbbf24; }
    </style>
</head>
<body>

    <nav class="bg-zinc-900 border-b border-zinc-800 p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-cyan-400">Flavor Fusion <span class="text-gray-400 text-sm">Event Finance Pro v2.7</span></h1>
            <div class="flex space-x-6 text-sm">
                <button onclick="switchTab('dashboard')" class="hover:text-cyan-400">Dashboard</button>
                <button onclick="switchTab('events')" class="hover:text-cyan-400">Events</button>
                <button onclick="switchTab('expenses')" class="hover:text-cyan-400">Expenses</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">

        <div class="warning">
            ⚠️ Sandbox mode — data resets on refresh. Use Live Server in VS Code for persistence.
        </div>

        <!-- DASHBOARD -->
        <section id="dashboard" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10" id="stats-grid"></div>
            
            <div class="bg-zinc-900 p-6 rounded-2xl mb-8">
                <h2 class="text-lg font-bold mb-4">Pending Collections</h2>
                <div id="overdue-list" class="space-y-3"></div>
            </div>

            <div class="bg-zinc-900 p-6 rounded-2xl">
                <h2 class="text-lg font-bold mb-4">Recent Events</h2>
                <div id="dashboard-recent-events" class="space-y-3"></div>
            </div>
        </section>

        <!-- EVENTS -->
        <section id="events" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Events Management</h2>
                <button onclick="openEventModal()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-semibold">+ Create Event</button>
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- EXPENSES -->
        <section id="expenses" class="tab-content">
            <div class="bg-zinc-900 p-4 rounded-2xl mb-6 flex justify-around text-center">
                <div><p class="text-xs text-gray-400">Entries</p><p id="exp-count" class="text-2xl font-bold">0</p></div>
                <div><p class="text-xs text-gray-400">Total Spend</p><p id="exp-total-val" class="text-2xl font-bold text-red-400">₹0</p></div>
            </div>
            <div class="bg-zinc-900 rounded-2xl overflow-hidden">
                <table class="w-full">
                    <thead class="bg-zinc-800">
                        <tr>
                            <th class="p-4 text-left">Date</th>
                            <th class="p-4 text-left">Event</th>
                            <th class="p-4 text-left">Vendor</th>
                            <th class="p-4 text-left">Head</th>
                            <th class="p-4 text-right">Amount</th>
                            <th class="p-4"></th>
                        </tr>
                    </thead>
                    <tbody id="expenses-table-body"></tbody>
                </table>
            </div>
        </section>

        <!-- EVENT DETAIL -->
        <section id="event-detail" class="tab-content">
            <button onclick="switchTab('events')" class="text-cyan-400 mb-6 flex items-center gap-2">← Back</button>
            <div id="detail-content" class="bg-zinc-900 rounded-3xl p-8"></div>
        </section>
    </main>

    <!-- EVENT MODAL -->
    <div id="event-modal" class="modal">
        <div class="bg-zinc-900 w-full max-w-md rounded-3xl p-8">
            <h3 id="event-modal-title" class="text-2xl font-bold mb-6">Create Event</h3>
            <input type="hidden" id="edit-event-id">
            <div class="space-y-5">
                <input type="text" id="ev-client" placeholder="Client Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4" required>
                <input type="date" id="ev-date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4">
                <input type="tel" id="ev-mobile" placeholder="Mobile" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4">
                <input type="text" id="ev-venue" placeholder="Venue" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4">
                <select id="ev-type" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4">
                    <option>Wedding</option><option>Corporate</option><option>Birthday</option><option>Engagement</option><option>Haldi</option><option>Reception</option><option>Other</option>
                </select>
                <input type="number" id="ev-billing" placeholder="Total Billing ₹" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModals()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Cancel</button>
                <button onclick="handleEventSubmit()" class="flex-1 py-4 bg-blue-600 rounded-2xl font-semibold">Save Event</button>
            </div>
        </div>
    </div>

    <!-- EXPENSE MODAL -->
    <div id="expense-modal" class="modal">
        <div class="bg-zinc-900 w-full max-w-md rounded-3xl p-8">
            <h3 id="expense-modal-title" class="text-2xl font-bold mb-6">Add Expense</h3>
            <input type="hidden" id="edit-expense-id">
            <div class="space-y-5">
                <select id="ex-event" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4"></select>
                <div class="grid grid-cols-2 gap-4">
                    <select id="ex-cat" onchange="updateHeads()" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4"></select>
                    <select id="ex-head" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4"></select>
                </div>
                <input type="number" id="ex-amount" placeholder="Amount ₹" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4 text-2xl text-center">
                <input type="date" id="ex-date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4">
                <input type="text" id="ex-vendor" placeholder="Vendor Name" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4">
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeModals()" class="flex-1 py-4 border border-zinc-700 rounded-2xl">Cancel</button>
                <button onclick="handleExpenseSubmit()" class="flex-1 py-4 bg-red-600 rounded-2xl font-semibold">Save Expense</button>
            </div>
        </div>
    </div>

    <script>
        // All variables declared FIRST
        let state = {
            events: [],
            expenses: [],
            payments: []
        };

        const expenseHeadsDB = {
            "Raw Material": ["Grocery – किराणा","Vegetable – भाजी","Fruits","Juice – ज्यूस","Water – पाणी","Ice + Milk – बर्फ + दूध","Bread – ब्रेड","Pickle – लोणचे","Sweet – मिठाई","Dry Fruits","Spices / Masala","Oil / Ghee","Paneer / Dairy"],
            "Live Counter": ["Chaat – चाट","Starter – स्टार्टर","Dosa – डोसा","Chinese – चायनीज","Ice Cream – आईस्क्रीम","Paan Mukhwas – पान मुखवास","Counter Setup – काउंटर","Pav Bhaji Counter","Pizza / Italian Counter","Dessert Counter","Beverage Counter"],
            "Labour": ["Rojiya Labour","Boys","Cook","Helper Staff","Cleaner","Supervisor","Loading Labour"],
            "Operations": ["Transport","Fuel / Diesel","Gas / Cylinder","Rented Material","Disposable","Packaging Material","Utensils","Generator","Water Tanker"],
            "Admin": ["Office Expense","Phone / Internet","Printing","License","Commission","Marketing","Tips","Misc"],
            "Adjustment": ["Damage","Refund","Staff Advance","Cash Difference"]
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            renderAll();
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function updateHeads() {
            const cat = document.getElementById('ex-cat').value;
            const headSelect = document.getElementById('ex-head');
            headSelect.innerHTML = expenseHeadsDB[cat] ? expenseHeadsDB[cat].map(h => `<option>${h}</option>`).join('') : '';
        }

        function openEventModal(id = null) {
            const modal = document.getElementById('event-modal');
            document.getElementById('event-modal-title').textContent = id ? "Edit Event" : "Create Event";
            document.getElementById('edit-event-id').value = id || '';
            modal.classList.add('active');
        }

        function handleEventSubmit() {
            const id = document.getElementById('edit-event-id').value || Date.now().toString();
            const data = {
                id: id,
                client: document.getElementById('ev-client').value,
                date: document.getElementById('ev-date').value,
                mobile: document.getElementById('ev-mobile').value,
                venue: document.getElementById('ev-venue').value,
                type: document.getElementById('ev-type').value,
                billing: parseFloat(document.getElementById('ev-billing').value) || 0
            };
            if (document.getElementById('edit-event-id').value) {
                const idx = state.events.findIndex(e => e.id === id);
                if (idx > -1) state.events[idx] = data;
            } else {
                state.events.push(data);
            }
            closeModals();
            renderAll();
        }

        function openExpenseModal(id = null) {
            const modal = document.getElementById('expense-modal');
            document.getElementById('expense-modal-title').textContent = id ? "Edit Expense" : "Add Expense";
            document.getElementById('edit-expense-id').value = id || '';

            const evSelect = document.getElementById('ex-event');
            evSelect.innerHTML = state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('');

            const catSelect = document.getElementById('ex-cat');
            catSelect.innerHTML = Object.keys(expenseHeadsDB).map(c => `<option>${c}</option>`).join('');
            updateHeads();

            modal.classList.add('active');
        }

        function handleExpenseSubmit() {
            const id = document.getElementById('edit-expense-id').value || Date.now().toString();
            const expData = {
                id: id,
                eventId: document.getElementById('ex-event').value,
                category: document.getElementById('ex-cat').value,
                head: document.getElementById('ex-head').value,
                amount: parseFloat(document.getElementById('ex-amount').value),
                date: document.getElementById('ex-date').value || new Date().toISOString().slice(0,10),
                vendor: document.getElementById('ex-vendor').value
            };
            if (document.getElementById('edit-expense-id').value) {
                const idx = state.expenses.findIndex(ex => ex.id === id);
                if (idx > -1) state.expenses[idx] = expData;
            } else {
                state.expenses.push(expData);
            }
            closeModals();
            renderAll();
        }

        function getEventFinancials(eventId) {
            const event = state.events.find(e => e.id === eventId);
            if (!event) return { billing: 0, expenses: 0, received: 0, pending: 0, profit: 0 };
            const expensesSum = state.expenses.filter(ex => ex.eventId === eventId).reduce((sum, ex) => sum + (ex.amount || 0), 0);
            const receivedSum = state.payments.filter(p => p.eventId === eventId).reduce((sum, p) => sum + (p.amount || 0), 0);
            return {
                billing: event.billing || 0,
                expenses: expensesSum,
                received: receivedSum,
                pending: (event.billing || 0) - receivedSum,
                profit: (event.billing || 0) - expensesSum
            };
        }

        function renderAll() {
            renderDashboard();
            renderEvents();
            renderExpenses();
        }

        function renderDashboard() {
            const totalBilling = state.events.reduce((sum, e) => sum + (e.billing || 0), 0);
            const totalExp = state.expenses.reduce((sum, e) => sum + (e.amount || 0), 0);
            const totalRec = state.payments.reduce((sum, p) => sum + (p.amount || 0), 0);
            const profit = totalBilling - totalExp;

            document.getElementById('stats-grid').innerHTML = `
                <div class="bg-zinc-900 p-6 rounded-2xl">
                    <p class="text-gray-400 text-sm">Total Events</p>
                    <p class="text-3xl font-bold">${state.events.length}</p>
                </div>
                <div class="bg-zinc-900 p-6 rounded-2xl">
                    <p class="text-gray-400 text-sm">Total Billing</p>
                    <p class="text-3xl font-bold text-blue-400">₹${totalBilling.toLocaleString()}</p>
                </div>
                <div class="bg-zinc-900 p-6 rounded-2xl">
                    <p class="text-gray-400 text-sm">Total Expenses</p>
                    <p class="text-3xl font-bold text-red-400">₹${totalExp.toLocaleString()}</p>
                </div>
                <div class="bg-zinc-900 p-6 rounded-2xl">
                    <p class="text-gray-400 text-sm">Expected Profit</p>
                    <p class="text-3xl font-bold ${profit >= 0 ? 'profit' : 'loss'}">₹${profit.toLocaleString()}</p>
                </div>
            `;

            // Pending Collections
            let pendingHTML = '';
            state.events.forEach(ev => {
                const fin = getEventFinancials(ev.id);
                if (fin.pending > 0) {
                    pendingHTML += `
                        <div onclick="showEventDetail('${ev.id}')" class="bg-zinc-800 p-4 rounded-2xl flex justify-between cursor-pointer">
                            <div>
                                <div class="font-medium">${ev.client}</div>
                                <div class="text-sm text-gray-400">${ev.date}</div>
                            </div>
                            <div class="text-right">
                                <div class="pending font-bold">₹${fin.pending.toLocaleString()}</div>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('overdue-list').innerHTML = pendingHTML || '<p class="text-gray-400">No pending collections 🎉</p>';
        }

        function renderEvents() {
            const container = document.getElementById('events-list');
            container.innerHTML = state.events.map(ev => {
                const fin = getEventFinancials(ev.id);
                return `
                <div onclick="showEventDetail('${ev.id}')" class="bg-zinc-900 p-6 rounded-2xl cursor-pointer hover:ring-2 hover:ring-blue-500 transition">
                    <div class="flex justify-between">
                        <div>
                            <p class="text-xs uppercase tracking-widest text-gray-400">${ev.type}</p>
                            <h3 class="font-bold text-lg">${ev.client}</h3>
                            <p class="text-sm text-gray-400">${ev.date} | ${ev.venue}</p>
                        </div>
                        <button onclick="event.stopPropagation(); openEventModal('${ev.id}')" class="text-blue-400 text-sm">Edit</button>
                    </div>
                    <div class="mt-6 grid grid-cols-2 gap-4 text-sm">
                        <div>Billing<br><span class="font-bold">₹${fin.billing}</span></div>
                        <div>Profit<br><span class="font-bold ${fin.profit >= 0 ? 'profit' : 'loss'}">₹${fin.profit}</span></div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderExpenses() {
            const tbody = document.getElementById('expenses-table-body');
            let total = 0;
            tbody.innerHTML = state.expenses.map(ex => {
                total += ex.amount || 0;
                const event = state.events.find(e => e.id === ex.eventId);
                return `
                <tr onclick="openExpenseModal('${ex.id}')" class="border-b border-zinc-800 hover:bg-zinc-800 cursor-pointer">
                    <td class="p-4">${ex.date}</td>
                    <td class="p-4 font-medium">${event ? event.client : 'Unknown'}</td>
                    <td class="p-4">${ex.vendor || '—'}</td>
                    <td class="p-4">${ex.head}</td>
                    <td class="p-4 font-bold text-red-400">₹${ex.amount}</td>
                    <td class="p-4 text-blue-400 text-sm">Edit</td>
                </tr>`;
            }).join('');
            document.getElementById('exp-total-val').innerText = '₹' + total.toLocaleString();
            document.getElementById('exp-count').innerText = state.expenses.length;
        }

        function showEventDetail(id) {
            const ev = state.events.find(e => e.id === id);
            const fin = getEventFinancials(id);
            const evExpenses = state.expenses.filter(ex => ex.eventId === id);
            const evPayments = state.payments.filter(p => p.eventId === id);

            let catBreakdown = '';
            const catTotals = {};
            evExpenses.forEach(ex => {
                catTotals[ex.category] = (catTotals[ex.category] || 0) + ex.amount;
            });
            Object.keys(catTotals).forEach(cat => {
                const percent = fin.expenses > 0 ? ((catTotals[cat] / fin.expenses) * 100).toFixed(1) : 0;
                catBreakdown += `<div class="flex justify-between py-1"><span>${cat}</span><span class="font-bold">₹${catTotals[cat]} (${percent}%)</span></div>`;
            });

            switchTab('event-detail');
            document.getElementById('detail-content').innerHTML = `
                <div class="bg-zinc-900 p-8 rounded-3xl">
                    <h2 class="text-3xl font-bold">${ev.client}</h2>
                    <p class="text-gray-400">${ev.date} • ${ev.venue}</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-8 mt-10">
                        <div><p class="text-gray-400">Billing</p><p class="text-4xl font-bold">₹${fin.billing}</p></div>
                        <div><p class="text-gray-400">Expenses</p><p class="text-4xl font-bold expense">₹${fin.expenses}</p></div>
                        <div><p class="text-gray-400">Received</p><p class="text-4xl font-bold text-emerald-400">₹${fin.received}</p></div>
                        <div><p class="text-gray-400">Profit</p><p class="text-4xl font-bold ${fin.profit >= 0 ? 'profit' : 'loss'}">₹${fin.profit}</p></div>
                    </div>
                    <div class="mt-10">
                        <h3 class="font-bold mb-4">Expenses by Category</h3>
                        <div class="space-y-2">${catBreakdown}</div>
                    </div>
                    <div class="mt-10">
                        <h3 class="font-bold mb-4">Payment History</h3>
                        <div class="space-y-3">
                            ${evPayments.map(p => `
                                <div class="flex justify-between p-4 bg-emerald-900/30 rounded-2xl">
                                    <div>
                                        <span class="text-xs font-bold uppercase">${p.mode}</span>
                                        <p class="font-bold text-emerald-400">₹${p.amount}</p>
                                    </div>
                                    <div class="text-sm text-gray-400">${p.date}</div>
                                </div>
                            `).join('') || '<p class="text-gray-400">No payments recorded</p>'}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            renderDashboard();
            renderEvents();
            renderExpenses();
        }

        function init() {
            if (state.events.length === 0) {
                state.events = [
                    { id: "EV-001", client: "Manav Seva Trust", date: "2026-04-14", venue: "Manav Seva Hall", type: "Wedding", billing: 45000 }
                ];
            }
            renderAll();
        }

        window.onload = init;
    </script>
</body>
</html>
