<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavor Fusion | Event Finance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white border-b p-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">Flavor Fusion <span class="text-gray-400 text-sm font-normal">Next Gen Catering</span></h1>
            <div class="flex space-x-4">
                <button onclick="switchTab('dashboard')" class="hover:text-blue-600 font-medium">Dashboard</button>
                <button onclick="switchTab('events')" class="hover:text-blue-600 font-medium">Events</button>
                <button onclick="switchTab('expenses')" class="hover:text-blue-600 font-medium">Expenses</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        
        <section id="dashboard" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8" id="stats-grid">
                </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4">Recent Events</h2>
                <div id="dashboard-recent-events" class="space-y-3"></div>
            </div>
        </section>

        <section id="events" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Events Management</h2>
                <button onclick="openEventModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+ Create Event</button>
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="expenses" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">All Expenses</h2>
                <button onclick="openExpenseModal()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold">+ Add Expense</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4">Date</th>
                            <th class="p-4">Event</th>
                            <th class="p-4">Category</th>
                            <th class="p-4">Head</th>
                            <th class="p-4">Amount</th>
                            <th class="p-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="event-detail" class="tab-content">
            <button onclick="switchTab('events')" class="text-blue-600 mb-4 flex items-center">← Back to Events</button>
            <div id="detail-content"></div>
        </section>

    </main>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="bg-white rounded-xl p-6 w-full max-w-md relative">
            <h3 id="event-modal-title" class="text-xl font-bold mb-4">Create Event</h3>
            <input type="hidden" id="edit-event-id">
            <div class="space-y-4">
                <div><label class="block text-sm font-medium">Client Name</label><input type="text" id="ev-client" required class="w-full border p-2 rounded"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">Date</label><input type="date" id="ev-date" required class="w-full border p-2 rounded"></div>
                    <div><label class="block text-sm font-medium">Mobile</label><input type="tel" id="ev-mobile" class="w-full border p-2 rounded"></div>
                </div>
                <div><label class="block text-sm font-medium">Venue</label><input type="text" id="ev-venue" class="w-full border p-2 rounded"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">Event Type</label>
                        <select id="ev-type" class="w-full border p-2 rounded">
                            <option>Wedding</option><option>Corporate</option><option>Birthday</option><option>Other</option>
                        </select>
                    </div>
                    <div><label class="block text-sm font-medium">Total Billing</label><input type="number" id="ev-billing" required class="w-full border p-2 rounded"></div>
                </div>
            </div>
            <div class="flex justify-end mt-6 space-x-3">
                <button type="button" onclick="closeModals()" class="text-gray-500">Cancel</button>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">Save Event</button>
            </div>
        </form>
    </div>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 id="expense-modal-title" class="text-xl font-bold mb-4">Add Expense</h3>
            <input type="hidden" id="edit-expense-id">
            <div class="space-y-4">
                <div><label class="block text-sm font-medium">Link to Event</label><select id="ex-event" required class="w-full border p-2 rounded"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">Category</label><select id="ex-cat" onchange="updateHeads()" class="w-full border p-2 rounded"></select></div>
                    <div><label class="block text-sm font-medium">Head</label><select id="ex-head" class="w-full border p-2 rounded"></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">Amount</label><input type="number" id="ex-amount" required class="w-full border p-2 rounded"></div>
                    <div><label class="block text-sm font-medium">Date</label><input type="date" id="ex-date" required class="w-full border p-2 rounded"></div>
                </div>
                <div><label class="block text-sm font-medium">Vendor</label><input type="text" id="ex-vendor" placeholder="Supplier Name" class="w-full border p-2 rounded"></div>
            </div>
            <div class="flex justify-end mt-6 space-x-3">
                <button type="button" onclick="closeModals()" class="text-gray-500">Cancel</button>
                <button type="submit" class="bg-red-500 text-white px-6 py-2 rounded-lg font-bold">Save Expense</button>
            </div>
        </form>
    </div>

    <div id="payment-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handlePaymentSubmit(event)" class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Record Payment</h3>
            <div class="space-y-4">
                <div><label class="block text-sm font-medium">Event</label><select id="pay-event" required class="w-full border p-2 rounded"></select></div>
                <div><label class="block text-sm font-medium">Amount Received</label><input type="number" id="pay-amount" required class="w-full border p-2 rounded"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium">Date</label><input type="date" id="pay-date" required class="w-full border p-2 rounded"></div>
                    <div><label class="block text-sm font-medium">Mode</label>
                        <select id="pay-mode" class="w-full border p-2 rounded">
                            <option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Cheque</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="flex justify-end mt-6 space-x-3">
                <button type="button" onclick="closeModals()" class="text-gray-500">Cancel</button>
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">Add Payment</button>
            </div>
        </form>
    </div>

    <script>
        // --- DATABASE & CATEGORIES ---
        const DB_KEYS = { EVENTS: 'ff_events', EXPENSES: 'ff_expenses', PAYMENTS: 'ff_payments' };
        
        const expenseHeadsDB = {
            "Raw Materials": ["Vegetables", "Grocery", "Dairy", "Meat", "Spices"],
            "Staff": ["Chef Fees", "Waiters", "Cleaning Service", "Supervisor"],
            "Logistics": ["Transport", "Gas/Fuel", "Generator"],
            "Decor & Setup": ["Flower Decor", "Lighting", "Furniture Rental", "Tent House"],
            "Other": ["Licenses", "Marketing", "Miscellaneous"]
        };

        // --- STATE MANAGEMENT ---
        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || [],
            payments: JSON.parse(localStorage.getItem(DB_KEYS.PAYMENTS)) || []
        };

        function saveToDB() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            localStorage.setItem(DB_KEYS.PAYMENTS, JSON.stringify(state.payments));
            renderAll();
        }

        // --- NAVIGATION ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            renderAll();
        }

        // --- FORM HELPERS ---
        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('input[type="date"]').forEach(input => input.value = today);
        }

        function updateHeads() {
            const cat = document.getElementById('ex-cat').value;
            const headSelect = document.getElementById('ex-head');
            headSelect.innerHTML = expenseHeadsDB[cat].map(h => `<option>${h}</option>`).join('');
        }

        // --- EVENT ACTIONS ---
        function openEventModal(id = null) {
            const modal = document.getElementById('event-modal');
            const title = document.getElementById('event-modal-title');
            const editId = document.getElementById('edit-event-id');
            setDefaultDate();

            if (id) {
                const ev = state.events.find(e => e.id === id);
                title.innerText = "Edit Event";
                editId.value = id;
                document.getElementById('ev-client').value = ev.client;
                document.getElementById('ev-date').value = ev.date;
                document.getElementById('ev-mobile').value = ev.mobile;
                document.getElementById('ev-venue').value = ev.venue;
                document.getElementById('ev-type').value = ev.type;
                document.getElementById('ev-billing').value = ev.billing;
            } else {
                title.innerText = "Create Event";
                editId.value = "";
                document.getElementById('event-modal').querySelector('form').reset();
                setDefaultDate();
            }
            modal.classList.add('active');
        }

        function handleEventSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-event-id').value;
            const eventData = {
                id: id || Date.now().toString(),
                client: document.getElementById('ev-client').value,
                date: document.getElementById('ev-date').value,
                mobile: document.getElementById('ev-mobile').value,
                venue: document.getElementById('ev-venue').value,
                type: document.getElementById('ev-type').value,
                billing: parseFloat(document.getElementById('ev-billing').value)
            };

            if (id) {
                const idx = state.events.findIndex(ev => ev.id === id);
                state.events[idx] = eventData;
            } else {
                state.events.push(eventData);
            }
            saveToDB();
            closeModals();
        }

        // --- EXPENSE ACTIONS ---
        function openExpenseModal(id = null) {
            const modal = document.getElementById('expense-modal');
            const evSelect = document.getElementById('ex-event');
            const catSelect = document.getElementById('ex-cat');
            
            // Fill Event Dropdown
            evSelect.innerHTML = state.events.map(e => `<option value="${e.id}">${e.client} (${e.date})</option>`).join('');
            // Fill Category Dropdown
            catSelect.innerHTML = Object.keys(expenseHeadsDB).map(c => `<option>${c}</option>`).join('');
            updateHeads();
            setDefaultDate();

            if (id) {
                const ex = state.expenses.find(e => e.id === id);
                document.getElementById('edit-expense-id').value = id;
                document.getElementById('ex-event').value = ex.eventId;
                document.getElementById('ex-cat').value = ex.category;
                updateHeads();
                document.getElementById('ex-head').value = ex.head;
                document.getElementById('ex-amount').value = ex.amount;
                document.getElementById('ex-date').value = ex.date;
                document.getElementById('ex-vendor').value = ex.vendor;
            } else {
                document.getElementById('edit-expense-id').value = "";
            }
            modal.classList.add('active');
        }

        function handleExpenseSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-expense-id').value;
            const expData = {
                id: id || Date.now().toString(),
                eventId: document.getElementById('ex-event').value,
                category: document.getElementById('ex-cat').value,
                head: document.getElementById('ex-head').value,
                amount: parseFloat(document.getElementById('ex-amount').value),
                date: document.getElementById('ex-date').value,
                vendor: document.getElementById('ex-vendor').value
            };

            if (id) {
                const idx = state.expenses.findIndex(ex => ex.id === id);
                state.expenses[idx] = expData;
            } else {
                state.expenses.push(expData);
            }
            saveToDB();
            closeModals();
        }

        // --- PAYMENT ACTIONS ---
        function openPaymentModal(eventId = null) {
            const modal = document.getElementById('payment-modal');
            const payEv = document.getElementById('pay-event');
            payEv.innerHTML = state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('');
            if (eventId) payEv.value = eventId;
            setDefaultDate();
            modal.classList.add('active');
        }

        function handlePaymentSubmit(e) {
            e.preventDefault();
            const payData = {
                id: Date.now().toString(),
                eventId: document.getElementById('pay-event').value,
                amount: parseFloat(document.getElementById('pay-amount').value),
                date: document.getElementById('pay-date').value,
                mode: document.getElementById('pay-mode').value
            };
            state.payments.push(payData);
            saveToDB();
            closeModals();
        }

        // --- CALCULATION LOGIC ---
        function getEventFinancials(eventId) {
            const event = state.events.find(e => e.id === eventId);
            const expenses = state.expenses.filter(ex => ex.eventId === eventId).reduce((sum, ex) => sum + ex.amount, 0);
            const received = state.payments.filter(p => p.eventId === eventId).reduce((sum, p) => sum + p.amount, 0);
            return {
                billing: event.billing,
                expenses,
                received,
                pending: event.billing - received,
                profit: event.billing - expenses
            };
        }

        // --- RENDERERS ---
        function renderAll() {
            renderDashboard();
            renderEvents();
            renderExpenses();
        }

        function renderDashboard() {
            const totalBilling = state.events.reduce((sum, e) => sum + e.billing, 0);
            const totalExp = state.expenses.reduce((sum, e) => sum + e.amount, 0);
            const totalRec = state.payments.reduce((sum, p) => sum + p.amount, 0);

            document.getElementById('stats-grid').innerHTML = `
                <div class="bg-white p-6 rounded-xl border">
                    <p class="text-gray-500 text-sm">Total Events</p>
                    <p class="text-2xl font-bold">${state.events.length}</p>
                </div>
                <div class="bg-white p-6 rounded-xl border">
                    <p class="text-gray-500 text-sm">Total Billing</p>
                    <p class="text-2xl font-bold text-blue-600">₹${totalBilling.toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-xl border">
                    <p class="text-gray-500 text-sm">Total Expenses</p>
                    <p class="text-2xl font-bold text-red-500">₹${totalExp.toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-xl border">
                    <p class="text-gray-500 text-sm">Expected Profit</p>
                    <p class="text-2xl font-bold text-green-600">₹${(totalBilling - totalExp).toLocaleString()}</p>
                </div>
            `;
        }

        function renderEvents() {
            const list = document.getElementById('events-list');
            list.innerHTML = state.events.map(ev => {
                const fin = getEventFinancials(ev.id);
                return `
                <div class="bg-white p-5 rounded-xl shadow-sm border hover:border-blue-300 cursor-pointer transition" onclick="showEventDetail('${ev.id}')">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">${ev.type}</p>
                            <h3 class="font-bold text-lg">${ev.client}</h3>
                            <p class="text-sm text-gray-500">${ev.date} | ${ev.venue}</p>
                        </div>
                        <button onclick="event.stopPropagation(); openEventModal('${ev.id}')" class="text-blue-500 hover:bg-blue-50 p-1 rounded">Edit</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm pt-4 border-t">
                        <div><p class="text-gray-400">Billing</p><p class="font-bold">₹${fin.billing}</p></div>
                        <div><p class="text-gray-400">Profit</p><p class="font-bold text-green-600">₹${fin.profit}</p></div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderExpenses() {
            const tbody = document.getElementById('expenses-table-body');
            tbody.innerHTML = state.expenses.sort((a,b) => new Date(b.date) - new Date(a.date)).map(ex => {
                const event = state.events.find(e => e.id === ex.eventId);
                return `
                <tr class="border-b hover:bg-gray-50 cursor-pointer" onclick="openExpenseModal('${ex.id}')">
                    <td class="p-4 text-sm">${ex.date}</td>
                    <td class="p-4 font-medium">${event ? event.client : 'Deleted Event'}</td>
                    <td class="p-4"><span class="bg-gray-100 px-2 py-1 rounded text-xs">${ex.category}</span></td>
                    <td class="p-4 text-sm">${ex.head}</td>
                    <td class="p-4 font-bold text-red-600">₹${ex.amount}</td>
                    <td class="p-4"><button class="text-gray-400">Edit</button></td>
                </tr>`;
            }).join('');
        }

        function showEventDetail(id) {
            const ev = state.events.find(e => e.id === id);
            const fin = getEventFinancials(id);
            const evExpenses = state.expenses.filter(ex => ex.eventId === id);
            const evPayments = state.payments.filter(p => p.eventId === id);

            switchTab('event-detail');
            document.getElementById('detail-content').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="md:col-span-2 bg-white p-6 rounded-xl border">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-2xl font-bold">${ev.client}</h2>
                            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm">${ev.type}</span>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div><p class="text-gray-400 text-xs uppercase">Date</p><p class="font-medium">${ev.date}</p></div>
                            <div><p class="text-gray-400 text-xs uppercase">Mobile</p><p class="font-medium">${ev.mobile}</p></div>
                            <div><p class="text-gray-400 text-xs uppercase">Venue</p><p class="font-medium">${ev.venue}</p></div>
                            <div><p class="text-gray-400 text-xs uppercase">Billing</p><p class="font-bold">₹${ev.billing}</p></div>
                        </div>
                    </div>
                    <div class="bg-blue-600 text-white p-6 rounded-xl shadow-lg">
                        <p class="text-blue-200 text-sm">Pending Collection</p>
                        <p class="text-3xl font-bold">₹${fin.pending.toLocaleString()}</p>
                        <button onclick="openPaymentModal('${ev.id}')" class="mt-4 w-full bg-white text-blue-600 py-2 rounded-lg font-bold">Collect Payment</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl border">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold">Expenses</h3>
                            <p class="text-red-500 font-bold">Total: ₹${fin.expenses}</p>
                        </div>
                        <div class="space-y-2">
                            ${evExpenses.map(ex => `
                                <div class="flex justify-between text-sm p-2 bg-gray-50 rounded">
                                    <span>${ex.head} (${ex.vendor || 'No Vendor'})</span>
                                    <span class="font-bold">₹${ex.amount}</span>
                                </div>
                            `).join('') || '<p class="text-gray-400 text-sm">No expenses recorded</p>'}
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl border">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold">Payments Received</h3>
                            <p class="text-green-600 font-bold">Total: ₹${fin.received}</p>
                        </div>
                        <div class="space-y-2">
                            ${evPayments.map(p => `
                                <div class="flex justify-between text-sm p-2 bg-green-50 rounded">
                                    <span>${p.date} - ${p.mode}</span>
                                    <span class="font-bold">₹${p.amount}</span>
                                </div>
                            `).join('') || '<p class="text-gray-400 text-sm">No payments received</p>'}
                        </div>
                    </div>
                </div>
            `;
        }

        // Init App
        renderAll();
    </script>
</body>
</html>
