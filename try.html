<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavor Fusion Pro v2.1 | Business Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .quick-btn { @apply bg-gray-100 hover:bg-blue-100 px-3 py-1 rounded text-sm font-medium transition; }
        #toast { position: fixed; bottom: 20px; right: 20px; display: none; z-index: 100; transition: all 0.3s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="toast" class="bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold flex items-center gap-3">
        <span class="text-green-400">✓</span> <span id="toast-msg">Saved</span>
    </div>

    <nav class="bg-white border-b p-4 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700">Flavor Fusion <span class="text-slate-400 font-light text-sm italic">Pro v2.1</span></h1>
            <div class="flex space-x-6">
                <button onclick="switchTab('dashboard')" class="text-sm font-bold hover:text-blue-600 uppercase tracking-tight">Dashboard</button>
                <button onclick="switchTab('events')" class="text-sm font-bold hover:text-blue-600 uppercase tracking-tight">Events</button>
                <button onclick="switchTab('expenses')" class="text-sm font-bold hover:text-blue-600 uppercase tracking-tight">Expenses</button>
                <button onclick="switchTab('vendors')" class="text-sm font-bold hover:text-blue-600 uppercase tracking-tight">Vendors</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <section id="dashboard" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8" id="stats-grid"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border">
                    <h2 class="text-lg font-bold mb-4">Top Profitable Events</h2>
                    <div id="top-events" class="space-y-4"></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h2 class="text-lg font-bold mb-4">Fast Access</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="openEventModal()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 transition">+ New Event</button>
                        <button onclick="openExpenseModal()" class="w-full bg-red-500 text-white p-3 rounded-xl font-bold hover:bg-red-600 transition">+ Record Expense</button>
                        <button onclick="exportData()" class="w-full border border-gray-300 p-3 rounded-xl font-bold hover:bg-gray-50">Export (CSV)</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="events" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Event Portfolio</h2>
                <button onclick="openEventModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold shadow-lg shadow-blue-200">+ Create Event</button>
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="expenses" class="tab-content">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold">Expense Registry</h2>
                <div class="flex flex-wrap gap-2">
                    <select id="filter-event" onchange="renderExpenses()" class="border p-2 rounded-lg text-sm bg-white shadow-sm"><option value="">All Events</option></select>
                    <select id="filter-cat" onchange="renderExpenses()" class="border p-2 rounded-lg text-sm bg-white shadow-sm"><option value="">All Categories</option></select>
                    <button onclick="openExpenseModal()" class="bg-red-500 text-white px-5 py-2 rounded-xl font-bold">+ Add Expense</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-slate-500 text-sm">
                        <tr><th class="p-4">Date</th><th class="p-4">Event</th><th class="p-4">Category</th><th class="p-4">Amount</th><th class="p-4">Vendor</th><th class="p-4 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="expenses-table-body"></tbody>
                </table>
                <div id="expense-empty-state" class="hidden p-12 text-center text-slate-400 italic">No expenses recorded</div>
            </div>
        </section>

        <section id="vendors" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Vendor Management</h2>
                <button onclick="openVendorModal()" class="bg-slate-800 text-white px-5 py-2 rounded-xl font-bold">+ Add Vendor</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="vendors-list"></div>
        </section>

        <section id="event-detail" class="tab-content">
            <button onclick="switchTab('events')" class="text-blue-600 mb-6 font-bold flex items-center">← Back to Portfolio</button>
            <div id="detail-content"></div>
        </section>

    </main>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
            <h3 id="event-modal-title" class="text-2xl font-bold mb-6">New Event</h3>
            <input type="hidden" id="edit-event-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2"><label class="text-xs font-bold text-slate-400 uppercase">Client Name</label><input type="text" id="ev-client" required class="w-full border-b py-2 focus:border-blue-500 outline-none"></div>
                <div><label class="text-xs font-bold text-slate-400 uppercase">Event Date</label><input type="date" id="ev-date" required class="w-full border-b py-2 outline-none"></div>
                <div><label class="text-xs font-bold text-slate-400 uppercase">Mobile Number</label><input type="tel" id="ev-mobile" placeholder="9876543210" required class="w-full border-b py-2 outline-none"></div>
                <div><label class="text-xs font-bold text-slate-400 uppercase">Event Type</label><select id="ev-type" class="w-full border-b py-2 outline-none"><option>Wedding</option><option>Corporate</option><option>Birthday</option><option>Other</option></select></div>
                <div><label class="text-xs font-bold text-slate-400 uppercase">Total Billing (₹)</label><input type="number" id="ev-billing" required class="w-full border-b py-2 outline-none font-bold text-blue-600"></div>
                <div class="md:col-span-2"><label class="text-xs font-bold text-slate-400 uppercase">Venue Location</label><input type="text" id="ev-venue" class="w-full border-b py-2 outline-none"></div>
            </div>
            <div class="flex justify-end mt-8 space-x-4">
                <button type="button" onclick="closeModals()" class="text-slate-400 font-bold">Cancel</button>
                <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">Save Event</button>
            </div>
        </form>
    </div>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
            <h3 id="expense-modal-title" class="text-2xl font-bold mb-6">Record Expense</h3>
            <input type="hidden" id="edit-expense-id">
            <div class="space-y-5">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Select Event</label>
                    <select id="ex-event" required class="w-full border-b py-2 bg-transparent outline-none font-medium"></select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-slate-400 uppercase">Category</label><select id="ex-cat" onchange="updateHeads()" required class="w-full border-b py-2 outline-none"></select></div>
                    <div><label class="text-xs font-bold text-slate-400 uppercase">Sub-Head</label><select id="ex-head" required class="w-full border-b py-2 outline-none"></select></div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Amount (₹)</label>
                    <input type="number" id="ex-amount" required class="w-full border-b py-2 text-xl font-bold text-red-600 outline-none">
                    <div class="flex gap-2 mt-2">
                        <button type="button" onclick="setAmount(500)" class="quick-btn">₹500</button>
                        <button type="button" onclick="setAmount(1000)" class="quick-btn">₹1k</button>
                        <button type="button" onclick="setAmount(5000)" class="quick-btn">₹5k</button>
                        <button type="button" onclick="setAmount(10000)" class="quick-btn">₹10k</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-slate-400 uppercase">Date</label><input type="date" id="ex-date" required class="w-full border-b py-2 outline-none"></div>
                    <div><label class="text-xs font-bold text-slate-400 uppercase">Vendor</label><select id="ex-vendor" class="w-full border-b py-2 outline-none"></select></div>
                </div>
            </div>
            <div class="flex justify-end mt-8 space-x-4">
                <button type="button" onclick="closeModals()" class="text-slate-400 font-bold">Cancel</button>
                <button type="submit" class="bg-red-500 text-white px-8 py-3 rounded-2xl font-bold">Save Expense</button>
            </div>
        </form>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const DB_KEYS = { EVENTS: 'ff_events_v2', EXPENSES: 'ff_exp_v2', PAYMENTS: 'ff_pay_v2', VENDORS: 'ff_ven_v2' };
        
        const expenseHeadsDB = {
            "Raw Material": ["Grocery – किराणा", "Vegetable – भाजी", "Fruits", "Juice – ज्यूस", "Water – पाणी", "Ice + Milk – बर्फ + दूध", "Bread – ब्रेड", "Pickle – लोणचे", "Sweet – मिठाई", "Dry Fruits", "Spices / Masala", "Oil / Ghee", "Paneer / Dairy"],
            "Live Counter": ["Chaat – चाट", "Starter – स्टार्टर", "Dosa – डोसा", "Chinese – चायनीज", "Ice Cream – आईस्क्रीम", "Paan Mukhwas – पान मुखवास", "Counter Setup – काउंटर", "Pav Bhaji Counter", "Pizza / Italian Counter", "Dessert Counter", "Beverage Counter"],
            "Labour": ["Rojiya Labour", "Boys", "Cook", "Helper Staff", "Cleaner", "Supervisor", "Loading Labour"],
            "Operations": ["Transport", "Fuel / Diesel", "Gas / Cylinder", "Rented Material", "Disposable", "Packaging Material", "Utensils", "Generator", "Water Tanker"],
            "Admin": ["Office Expense", "Phone / Internet", "Printing", "License", "Commission", "Marketing", "Tips", "Misc"],
            "Adjustment": ["Damage", "Refund", "Staff Advance", "Cash Difference"]
        };

        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || [],
            payments: JSON.parse(localStorage.getItem(DB_KEYS.PAYMENTS)) || [],
            vendors: JSON.parse(localStorage.getItem(DB_KEYS.VENDORS)) || []
        };

        // --- UTILITIES ---
        function save() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            localStorage.setItem(DB_KEYS.PAYMENTS, JSON.stringify(state.payments));
            localStorage.setItem(DB_KEYS.VENDORS, JSON.stringify(state.vendors));
            renderAll();
        }

        function formatPhone(num) {
            if (!num) return "";
            num = num.toString().replace(/\D/g, ''); // Remove non-digits
            if (num.startsWith('91') && num.length === 12) return '+' + num;
            if (num.length === 10) return '+91' + num;
            return num; // Return as is if format is unknown
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('input[type="date"]').forEach(i => i.value = today);
        }

        function setAmount(val) { document.getElementById('ex-amount').value = val; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            renderAll();
        }

        // --- HANDLERS ---

        function handleEventSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-event-id').value;
            const billingInput = parseFloat(document.getElementById('ev-billing').value);

            if (isNaN(billingInput)) { alert("Invalid billing amount"); return; }

            const data = {
                id: id || "EV" + Date.now() + Math.random().toString(36).substr(2, 4),
                client: document.getElementById('ev-client').value.trim(),
                date: document.getElementById('ev-date').value,
                mobile: formatPhone(document.getElementById('ev-mobile').value),
                billing: billingInput,
                venue: document.getElementById('ev-venue').value.trim(),
                type: document.getElementById('ev-type').value
            };

            if (!data.client || !data.date) { alert("Missing required fields"); return; }

            if (id) {
                state.events = state.events.map(ev => ev.id === id ? data : ev);
            } else {
                state.events.push(data);
            }

            save();
            closeModals();
            showToast("Event Saved Successfully");
        }

        function handleExpenseSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-expense-id').value;
            const eventId = document.getElementById('ex-event').value;
            const amount = parseFloat(document.getElementById('ex-amount').value);

            // Validation
            if (!eventId) { alert("Please select an event"); return; }
            if (isNaN(amount) || amount <= 0) { alert("Please enter a valid amount"); return; }

            const data = {
                id: id || "EX" + Date.now() + Math.random().toString(36).substr(2, 4),
                eventId: eventId,
                category: document.getElementById('ex-cat').value,
                head: document.getElementById('ex-head').value,
                amount: amount,
                date: document.getElementById('ex-date').value,
                vendorId: document.getElementById('ex-vendor').value
            };

            // CRITICAL FIX: Data Overwrite Protection
            if (id) {
                state.expenses = state.expenses.map(ex => ex.id === id ? data : ex);
            } else {
                state.expenses.push(data);
            }

            save();
            closeModals();
            showToast("Expense Recorded");
        }

        // --- MODAL CONTROLS ---

        function openEventModal(id = null) {
            const m = document.getElementById('event-modal');
            const form = m.querySelector('form');
            form.reset();
            setDefaultDate();
            if (id) {
                const ev = state.events.find(e => e.id === id);
                document.getElementById('edit-event-id').value = id;
                document.getElementById('ev-client').value = ev.client;
                document.getElementById('ev-date').value = ev.date;
                document.getElementById('ev-mobile').value = ev.mobile;
                document.getElementById('ev-billing').value = ev.billing;
                document.getElementById('ev-venue').value = ev.venue;
                document.getElementById('event-modal-title').innerText = "Update Event Info";
            } else {
                document.getElementById('edit-event-id').value = "";
                document.getElementById('event-modal-title').innerText = "Create New Event";
            }
            m.classList.add('active');
        }

        function openExpenseModal(id = null) {
            const m = document.getElementById('expense-modal');
            m.querySelector('form').reset();
            setDefaultDate();
            
            // Populate Dropdowns
            document.getElementById('ex-event').innerHTML = state.events.length > 0 
                ? state.events.map(e => `<option value="${e.id}">${e.client} (${e.date})</option>`).join('')
                : `<option value="">-- No Events Available --</option>`;
            
            document.getElementById('ex-cat').innerHTML = Object.keys(expenseHeadsDB).map(c => `<option>${c}</option>`).join('');
            updateHeads();

            document.getElementById('ex-vendor').innerHTML = `<option value="">Generic / Self</option>` + 
                state.vendors.map(v => `<option value="${v.id}">${v.name}</option>`).join('');

            if (id) {
                const ex = state.expenses.find(x => x.id === id);
                document.getElementById('edit-expense-id').value = id;
                document.getElementById('ex-event').value = ex.eventId;
                document.getElementById('ex-cat').value = ex.category;
                updateHeads();
                document.getElementById('ex-head').value = ex.head;
                document.getElementById('ex-amount').value = ex.amount;
                document.getElementById('ex-date').value = ex.date;
                document.getElementById('ex-vendor').value = ex.vendorId || "";
            }
            m.classList.add('active');
        }

        function updateHeads() {
            const cat = document.getElementById('ex-cat').value;
            const headSelect = document.getElementById('ex-head');
            headSelect.innerHTML = (expenseHeadsDB[cat] || []).map(h => `<option>${h}</option>`).join('');
        }

        // --- RENDERERS ---

        function renderAll() {
            renderDashboard();
            renderEvents();
            renderExpenses();
            renderVendors();
            updateFilters();
        }

        function renderEvents() {
            const list = document.getElementById('events-list');
            if (state.events.length === 0) {
                list.innerHTML = `<div class="col-span-full p-12 bg-white rounded-2xl border border-dashed text-slate-400 text-center">No events created yet. Start by clicking "Create Event".</div>`;
                return;
            }
            list.innerHTML = state.events.map(ev => {
                const exp = state.expenses.filter(x => x.eventId === ev.id).reduce((s, x) => s + x.amount, 0);
                return `
                <div class="bg-white p-6 rounded-2xl shadow-sm border hover:shadow-md transition cursor-pointer" onclick="showEventDetail('${ev.id}')">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-lg">${ev.client}</h3>
                        <button onclick="event.stopPropagation(); deleteItem('events', '${ev.id}', '${ev.client}')" class="text-slate-300 hover:text-red-500 text-xl">×</button>
                    </div>
                    <div class="text-sm space-y-1 mb-4 text-slate-500">
                        <p>₹${ev.billing.toLocaleString()} Billing</p>
                        <p class="text-red-400">₹${exp.toLocaleString()} Total Expense</p>
                    </div>
                    <div class="pt-3 border-t flex justify-between items-center text-xs font-bold uppercase tracking-tighter">
                        <span class="text-slate-400">${ev.date}</span>
                        <span class="text-blue-600">Profit: ₹${(ev.billing - exp).toLocaleString()}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderExpenses() {
            const fEvent = document.getElementById('filter-event').value;
            const fCat = document.getElementById('filter-cat').value;
            
            // SORT BY DATE DESC (Latest First)
            let filtered = state.expenses.slice().sort((a,b) => new Date(b.date) - new Date(a.date));
            if (fEvent) filtered = filtered.filter(x => x.eventId === fEvent);
            if (fCat) filtered = filtered.filter(x => x.category === fCat);

            const tbody = document.getElementById('expenses-table-body');
            const empty = document.getElementById('expense-empty-state');

            if (filtered.length === 0) {
                tbody.innerHTML = "";
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            tbody.innerHTML = filtered.map(ex => {
                const ev = state.events.find(e => e.id === ex.eventId);
                return `
                <tr class="border-b text-sm hover:bg-slate-50">
                    <td class="p-4">${ex.date}</td>
                    <td class="p-4 font-bold text-blue-800">${ev ? ev.client : 'MISSING LINK'}</td>
                    <td class="p-4"><span class="bg-slate-100 px-2 py-1 rounded text-[10px] font-black uppercase">${ex.category}</span></td>
                    <td class="p-4 font-black text-red-600">₹${ex.amount.toLocaleString()}</td>
                    <td class="p-4 text-slate-500">${ex.head}</td>
                    <td class="p-4 text-right">
                        <button onclick="openExpenseModal('${ex.id}')" class="text-blue-500 font-bold mr-3">Edit</button>
                        <button onclick="deleteItem('expenses', '${ex.id}', 'Expense of ₹${ex.amount}')" class="text-slate-300 hover:text-red-500">×</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function showEventDetail(id) {
            const ev = state.events.find(e => e.id === id);
            const exps = state.expenses.filter(x => x.eventId === id);
            const pays = state.payments.filter(p => p.eventId === id);
            const totalExp = exps.reduce((s, x) => s + x.amount, 0);
            const totalRec = pays.reduce((s, p) => s + p.amount, 0);

            switchTab('event-detail');
            document.getElementById('detail-content').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <div class="lg:col-span-2 bg-white p-8 rounded-3xl border shadow-sm">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h2 class="text-3xl font-black text-slate-800">${ev.client}</h2>
                                <p class="text-slate-400 font-bold uppercase text-xs tracking-widest">${ev.type} • ${ev.venue} • ${ev.date}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="openEventModal('${ev.id}')" class="bg-slate-100 p-3 rounded-xl text-sm font-bold">Edit</button>
                                <a href="https://wa.me/${ev.mobile.replace('+', '')}" target="_blank" class="bg-green-500 text-white p-3 rounded-xl text-sm font-bold shadow-lg shadow-green-100">WhatsApp Reminder</a>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pt-6 border-t">
                            <div><p class="text-[10px] font-black text-slate-400 uppercase">Billing</p><p class="text-xl font-bold">₹${ev.billing.toLocaleString()}</p></div>
                            <div><p class="text-[10px] font-black text-red-400 uppercase">Expense</p><p class="text-xl font-bold text-red-500">₹${totalExp.toLocaleString()}</p></div>
                            <div><p class="text-[10px] font-black text-green-400 uppercase">Collected</p><p class="text-xl font-bold text-green-600">₹${totalRec.toLocaleString()}</p></div>
                            <div class="bg-blue-600 p-3 rounded-2xl"><p class="text-[10px] font-black text-blue-200 uppercase">Net Profit</p><p class="text-xl font-bold text-white">₹${(ev.billing - totalExp).toLocaleString()}</p></div>
                        </div>
                    </div>
                    <div class="bg-amber-50 p-8 rounded-3xl border border-amber-200 text-center">
                        <p class="text-amber-600 font-bold text-xs uppercase tracking-widest">Pending Amount</p>
                        <p class="text-4xl font-black text-amber-700 mt-2">₹${(ev.billing - totalRec).toLocaleString()}</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h4 class="font-bold mb-4 uppercase text-xs text-slate-400">Expense Breakdown</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${exps.map(x => `
                            <div class="flex justify-between p-3 bg-slate-50 rounded-xl">
                                <span><b class="text-xs uppercase">${x.category}</b><br><small>${x.head}</small></span>
                                <span class="font-bold text-red-500">₹${x.amount}</span>
                            </div>
                        `).join('') || '<p class="col-span-full text-slate-400 italic">No expenses yet.</p>'}
                    </div>
                </div>
            `;
        }

        function deleteItem(type, id, name) {
            if (confirm(`Are you sure you want to delete "${name}"?`)) {
                state[type] = state[type].filter(item => item.id !== id);
                save();
                showToast("Item Deleted");
            }
        }

        // (Remaining render methods like Dashboard, Vendors, Filters follow same logic as v2.0)
        // ... omitted for brevity but strictly keeping the v2.0 dashboard logic intact ...

        function renderDashboard() {
            const totalBill = state.events.reduce((s, e) => s + e.billing, 0);
            const totalExp = state.expenses.reduce((s, e) => s + e.amount, 0);
            const totalRec = state.payments.reduce((s, p) => s + p.amount, 0);
            const profit = totalBill - totalExp;

            document.getElementById('stats-grid').innerHTML = `
                <div class="bg-white p-6 rounded-2xl border">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Portfolio Billing</p>
                    <p class="text-2xl font-black">₹${totalBill.toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border">
                    <p class="text-[10px] font-black text-red-400 uppercase text-red-500">Total Outflow</p>
                    <p class="text-2xl font-black text-red-600">₹${totalExp.toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border">
                    <p class="text-[10px] font-black text-green-400 uppercase">Received Cash</p>
                    <p class="text-2xl font-black text-green-600">₹${totalRec.toLocaleString()}</p>
                </div>
                <div class="bg-amber-50 p-6 rounded-2xl border border-amber-100">
                    <p class="text-[10px] font-black text-amber-600 uppercase text-amber-500">Net Pending</p>
                    <p class="text-2xl font-black text-amber-700">₹${(totalBill - totalRec).toLocaleString()}</p>
                </div>
                <div class="bg-blue-600 p-6 rounded-2xl shadow-xl shadow-blue-100 text-white">
                    <p class="text-[10px] font-black text-blue-200 uppercase">Projected Profit</p>
                    <p class="text-2xl font-black">₹${profit.toLocaleString()}</p>
                </div>
            `;
        }

        function renderVendors() {
            const container = document.getElementById('vendors-list');
            if (state.vendors.length === 0) {
                container.innerHTML = `<div class="col-span-full p-6 text-center text-slate-400 italic">No vendors added.</div>`;
                return;
            }
            container.innerHTML = state.vendors.map(v => `
                <div class="bg-white p-4 rounded-xl border">
                    <p class="font-bold">${v.name}</p>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">${v.category}</p>
                    <p class="text-sm mt-2 text-blue-600">${v.phone || '--'}</p>
                </div>
            `).join('');
        }

        function updateFilters() {
            const eF = document.getElementById('filter-event');
            const cF = document.getElementById('filter-cat');
            // Re-populate event filter but keep "All"
            const currentEvent = eF.value;
            eF.innerHTML = `<option value="">All Events</option>` + state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('');
            eF.value = currentEvent;

            if (cF.options.length <= 1) cF.innerHTML += Object.keys(expenseHeadsDB).map(c => `<option>${c}</option>`).join('');
        }

        // INIT APP
        renderAll();
    </script>
</body>
</html>
