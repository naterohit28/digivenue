<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavor Fusion Pro | Business Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .quick-btn { @apply bg-gray-100 hover:bg-blue-100 px-3 py-1 rounded text-sm font-medium transition; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white border-b p-4 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-700">Flavor Fusion <span class="text-slate-400 font-light text-sm italic">Pro v2.0</span></h1>
            <div class="flex space-x-6">
                <button onclick="switchTab('dashboard')" class="text-sm font-bold hover:text-blue-600 uppercase tracking-tight">Dashboard</button>
                <button onclick="switchTab('events')" class="text-sm font-bold hover:text-blue-600 uppercase tracking-tight">Events</button>
                <button onclick="switchTab('expenses')" class="text-sm font-bold hover:text-blue-600 uppercase tracking-tight">Expenses</button>
                <button onclick="switchTab('vendors')" class="text-sm font-bold hover:text-blue-600 uppercase tracking-tight">Vendors</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <section id="dashboard" class="tab-content active">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8" id="stats-grid"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border">
                    <h2 class="text-lg font-bold mb-4">Top Profitable Events</h2>
                    <div id="top-events" class="space-y-4"></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h2 class="text-lg font-bold mb-4">Quick Actions</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="openEventModal()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">+ New Event</button>
                        <button onclick="openExpenseModal()" class="w-full bg-red-500 text-white p-3 rounded-xl font-bold">+ Record Expense</button>
                        <button onclick="exportData()" class="w-full border border-gray-300 p-3 rounded-xl font-bold hover:bg-gray-50">Export to Excel (CSV)</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="events" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Event Portfolio</h2>
                <button onclick="openEventModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold shadow-lg shadow-blue-200">+ Create Event</button>
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="expenses" class="tab-content">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold">Expense Registry</h2>
                <div class="flex flex-wrap gap-2">
                    <select id="filter-event" onchange="renderExpenses()" class="border p-2 rounded-lg text-sm bg-white"><option value="">All Events</option></select>
                    <select id="filter-cat" onchange="renderExpenses()" class="border p-2 rounded-lg text-sm bg-white"><option value="">All Categories</option></select>
                    <button onclick="openExpenseModal()" class="bg-red-500 text-white px-5 py-2 rounded-xl font-bold">+ Add Expense</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-slate-500 text-sm">
                        <tr><th class="p-4">Date</th><th class="p-4">Event</th><th class="p-4">Category</th><th class="p-4">Amount</th><th class="p-4">Vendor</th><th class="p-4 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="expenses-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="vendors" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Vendor Management</h2>
                <button onclick="openVendorModal()" class="bg-slate-800 text-white px-5 py-2 rounded-xl font-bold">+ Add Vendor</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="vendors-list"></div>
        </section>

        <section id="event-detail" class="tab-content">
            <button onclick="switchTab('events')" class="text-blue-600 mb-6 font-bold flex items-center">← Back to Portfolio</button>
            <div id="detail-content"></div>
        </section>

    </main>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
            <h3 id="event-modal-title" class="text-2xl font-bold mb-6">New Event</h3>
            <input type="hidden" id="edit-event-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2"><label class="text-xs font-bold text-slate-400 uppercase">Client Name</label><input type="text" id="ev-client" required class="w-full border-b py-2 focus:border-blue-500 outline-none"></div>
                <div><label class="text-xs font-bold text-slate-400 uppercase">Event Date</label><input type="date" id="ev-date" required class="w-full border-b py-2 outline-none"></div>
                <div><label class="text-xs font-bold text-slate-400 uppercase">Mobile</label><input type="tel" id="ev-mobile" class="w-full border-b py-2 outline-none"></div>
                <div><label class="text-xs font-bold text-slate-400 uppercase">Event Type</label><select id="ev-type" class="w-full border-b py-2 outline-none"><option>Wedding</option><option>Corporate</option><option>Birthday</option><option>Other</option></select></div>
                <div><label class="text-xs font-bold text-slate-400 uppercase">Total Billing (₹)</label><input type="number" id="ev-billing" required class="w-full border-b py-2 outline-none font-bold text-blue-600"></div>
                <div class="md:col-span-2"><label class="text-xs font-bold text-slate-400 uppercase">Venue Location</label><input type="text" id="ev-venue" class="w-full border-b py-2 outline-none"></div>
            </div>
            <div class="flex justify-end mt-8 space-x-4">
                <button type="button" onclick="closeModals()" class="text-slate-400 font-bold">Cancel</button>
                <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">Save Event</button>
            </div>
        </form>
    </div>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
            <h3 id="expense-modal-title" class="text-2xl font-bold mb-6">Record Expense</h3>
            <input type="hidden" id="edit-expense-id">
            <div class="space-y-5">
                <div><label class="text-xs font-bold text-slate-400 uppercase">Link to Event</label><select id="ex-event" required class="w-full border-b py-2 bg-transparent outline-none"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-slate-400 uppercase">Category</label><select id="ex-cat" onchange="updateHeads()" class="w-full border-b py-2 outline-none"></select></div>
                    <div><label class="text-xs font-bold text-slate-400 uppercase">Sub-Head</label><select id="ex-head" class="w-full border-b py-2 outline-none"></select></div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase">Amount (₹)</label>
                    <input type="number" id="ex-amount" required class="w-full border-b py-2 text-xl font-bold text-red-600 outline-none">
                    <div class="flex gap-2 mt-2">
                        <button type="button" onclick="setAmount(500)" class="quick-btn">₹500</button>
                        <button type="button" onclick="setAmount(1000)" class="quick-btn">₹1k</button>
                        <button type="button" onclick="setAmount(2000)" class="quick-btn">₹2k</button>
                        <button type="button" onclick="setAmount(5000)" class="quick-btn">₹5k</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-slate-400 uppercase">Date</label><input type="date" id="ex-date" required class="w-full border-b py-2 outline-none"></div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase">Vendor</label>
                        <select id="ex-vendor" class="w-full border-b py-2 outline-none"></select>
                    </div>
                </div>
            </div>
            <div class="flex justify-end mt-8 space-x-4">
                <button type="button" onclick="closeModals()" class="text-slate-400 font-bold">Cancel</button>
                <button type="submit" class="bg-red-500 text-white px-8 py-3 rounded-2xl font-bold">Save Expense</button>
            </div>
        </form>
    </div>

    <div id="vendor-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleVendorSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Add New Vendor</h3>
            <div class="space-y-4">
                <div><label class="text-xs font-bold uppercase text-slate-400">Vendor Name</label><input type="text" id="vn-name" required class="w-full border-b py-2 outline-none"></div>
                <div><label class="text-xs font-bold uppercase text-slate-400">Category</label><select id="vn-cat" class="w-full border-b py-2 outline-none"></select></div>
                <div><label class="text-xs font-bold uppercase text-slate-400">Phone</label><input type="tel" id="vn-phone" class="w-full border-b py-2 outline-none"></div>
            </div>
            <div class="flex justify-end mt-8 space-x-4">
                <button type="button" onclick="closeModals()" class="text-slate-400 font-bold">Cancel</button>
                <button type="submit" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold">Add Vendor</button>
            </div>
        </form>
    </div>

    <div id="payment-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handlePaymentSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Record Payment</h3>
            <input type="hidden" id="pay-event-id">
            <div class="space-y-4">
                <div><label class="text-xs font-bold uppercase text-slate-400">Amount Received</label><input type="number" id="pay-amount" required class="w-full border-b py-2 text-xl font-bold text-green-600 outline-none"></div>
                <div><label class="text-xs font-bold uppercase text-slate-400">Date</label><input type="date" id="pay-date" required class="w-full border-b py-2 outline-none"></div>
                <div><label class="text-xs font-bold uppercase text-slate-400">Mode</label><select id="pay-mode" class="w-full border-b py-2 outline-none"><option>Cash</option><option>UPI</option><option>Bank Transfer</option></select></div>
            </div>
            <div class="flex justify-end mt-8 space-x-4">
                <button type="button" onclick="closeModals()" class="text-slate-400 font-bold">Cancel</button>
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold">Collect</button>
            </div>
        </form>
    </div>

    <script>
        // --- 1. DATA STRUCTURES ---
        const DB_KEYS = { EVENTS: 'ff_events_v2', EXPENSES: 'ff_exp_v2', PAYMENTS: 'ff_pay_v2', VENDORS: 'ff_ven_v2' };
        
        const expenseHeadsDB = {
            "Raw Material": ["Grocery – किराणा", "Vegetable – भाजी", "Fruits", "Juice – ज्यूस", "Water – पाणी", "Ice + Milk – बर्फ + दूध", "Bread – ब्रेड", "Pickle – लोणचे", "Sweet – मिठाई", "Dry Fruits", "Spices / Masala", "Oil / Ghee", "Paneer / Dairy"],
            "Live Counter": ["Chaat – चाट", "Starter – स्टार्टर", "Dosa – डोसा", "Chinese – चायनीज", "Ice Cream – आईस्क्रीम", "Paan Mukhwas – पान मुखवास", "Counter Setup – काउंटर", "Pav Bhaji Counter", "Pizza / Italian Counter", "Dessert Counter", "Beverage Counter"],
            "Labour": ["Rojiya Labour", "Boys", "Cook", "Helper Staff", "Cleaner", "Supervisor", "Loading Labour"],
            "Operations": ["Transport", "Fuel / Diesel", "Gas / Cylinder", "Rented Material", "Disposable", "Packaging Material", "Utensils", "Generator", "Water Tanker"],
            "Admin": ["Office Expense", "Phone / Internet", "Printing", "License", "Commission", "Marketing", "Tips", "Misc"],
            "Adjustment": ["Damage", "Refund", "Staff Advance", "Cash Difference"]
        };

        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || [],
            payments: JSON.parse(localStorage.getItem(DB_KEYS.PAYMENTS)) || [],
            vendors: JSON.parse(localStorage.getItem(DB_KEYS.VENDORS)) || []
        };

        // --- 2. CORE ENGINE ---
        function save() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            localStorage.setItem(DB_KEYS.PAYMENTS, JSON.stringify(state.payments));
            localStorage.setItem(DB_KEYS.VENDORS, JSON.stringify(state.vendors));
            renderAll();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            renderAll();
        }

        // --- 3. UI HELPERS ---
        function setAmount(val) { document.getElementById('ex-amount').value = val; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.querySelectorAll('input[type="date"]').forEach(i => i.value = today);
        }

        function updateHeads() {
            const cat = document.getElementById('ex-cat').value;
            const headSelect = document.getElementById('ex-head');
            headSelect.innerHTML = (expenseHeadsDB[cat] || []).map(h => `<option>${h}</option>`).join('');
        }

        // --- 4. CRUD OPERATIONS ---

        // Events
        function openEventModal(id = null) {
            const m = document.getElementById('event-modal');
            const form = m.querySelector('form');
            form.reset();
            setDefaultDate();
            if (id) {
                const ev = state.events.find(e => e.id === id);
                document.getElementById('edit-event-id').value = id;
                document.getElementById('ev-client').value = ev.client;
                document.getElementById('ev-date').value = ev.date;
                document.getElementById('ev-billing').value = ev.billing;
                document.getElementById('ev-mobile').value = ev.mobile;
                document.getElementById('ev-venue').value = ev.venue;
                document.getElementById('event-modal-title').innerText = "Update Event";
            } else {
                document.getElementById('edit-event-id').value = "";
                document.getElementById('event-modal-title').innerText = "New Event";
            }
            m.classList.add('active');
        }

        function handleEventSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-event-id').value;
            const data = {
                id: id || Date.now().toString(),
                client: document.getElementById('ev-client').value,
                date: document.getElementById('ev-date').value,
                billing: parseFloat(document.getElementById('ev-billing').value),
                mobile: document.getElementById('ev-mobile').value,
                venue: document.getElementById('ev-venue').value,
                type: document.getElementById('ev-type').value
            };
            if (id) state.events = state.events.map(ev => ev.id === id ? data : ev);
            else state.events.push(data);
            save(); closeModals();
        }

        // Expenses
        function openExpenseModal(id = null) {
            const m = document.getElementById('expense-modal');
            m.querySelector('form').reset();
            setDefaultDate();
            
            const evSel = document.getElementById('ex-event');
            evSel.innerHTML = state.events.map(e => `<option value="${e.id}">${e.client} (${e.date})</option>`).join('');
            
            const catSel = document.getElementById('ex-cat');
            catSel.innerHTML = Object.keys(expenseHeadsDB).map(c => `<option>${c}</option>`).join('');
            updateHeads();

            const venSel = document.getElementById('ex-vendor');
            venSel.innerHTML = `<option value="">Generic / Self</option>` + state.vendors.map(v => `<option value="${v.id}">${v.name}</option>`).join('');

            if (id) {
                const ex = state.expenses.find(x => x.id === id);
                document.getElementById('edit-expense-id').value = id;
                document.getElementById('ex-event').value = ex.eventId;
                document.getElementById('ex-cat').value = ex.category;
                updateHeads();
                document.getElementById('ex-head').value = ex.head;
                document.getElementById('ex-amount').value = ex.amount;
                document.getElementById('ex-date').value = ex.date;
                document.getElementById('ex-vendor').value = ex.vendorId || "";
            }
            m.classList.add('active');
        }

        function handleExpenseSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-expense-id').value;
            const data = {
                id: id || Date.now().toString(),
                eventId: document.getElementById('ex-event').value,
                category: document.getElementById('ex-cat').value,
                head: document.getElementById('ex-head').value,
                amount: parseFloat(document.getElementById('ex-amount').value),
                date: document.getElementById('ex-date').value,
                vendorId: document.getElementById('ex-vendor').value
            };
            if (id) state.expenses = state.expenses.map(x => x.id === id ? data : x);
            else state.expenses.push(data);
            save(); closeModals();
        }

        // Vendors
        function openVendorModal() {
            const m = document.getElementById('vendor-modal');
            document.getElementById('vn-cat').innerHTML = Object.keys(expenseHeadsDB).map(c => `<option>${c}</option>`).join('');
            m.classList.add('active');
        }

        function handleVendorSubmit(e) {
            e.preventDefault();
            state.vendors.push({
                id: Date.now().toString(),
                name: document.getElementById('vn-name').value,
                category: document.getElementById('vn-cat').value,
                phone: document.getElementById('vn-phone').value
            });
            save(); closeModals();
        }

        // Payments
        function openPaymentModal(eventId) {
            const m = document.getElementById('payment-modal');
            document.getElementById('pay-event-id').value = eventId;
            setDefaultDate();
            m.classList.add('active');
        }

        function handlePaymentSubmit(e) {
            e.preventDefault();
            state.payments.push({
                id: Date.now().toString(),
                eventId: document.getElementById('pay-event-id').value,
                amount: parseFloat(document.getElementById('pay-amount').value),
                date: document.getElementById('pay-date').value,
                mode: document.getElementById('pay-mode').value
            });
            save(); closeModals();
        }

        // Delete Logic
        function deleteItem(type, id) {
            if (!confirm("Are you sure? This cannot be undone.")) return;
            state[type] = state[type].filter(item => item.id !== id);
            save();
        }

        // --- 5. RENDERERS ---
        function renderAll() {
            renderDashboard();
            renderEvents();
            renderExpenses();
            renderVendors();
            updateFilterOptions();
        }

        function updateFilterOptions() {
            const eF = document.getElementById('filter-event');
            const cF = document.getElementById('filter-cat');
            if (eF.options.length <= 1) eF.innerHTML += state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('');
            if (cF.options.length <= 1) cF.innerHTML += Object.keys(expenseHeadsDB).map(c => `<option>${c}</option>`).join('');
        }

        function renderDashboard() {
            const totalBill = state.events.reduce((s, e) => s + e.billing, 0);
            const totalExp = state.expenses.reduce((s, e) => s + e.amount, 0);
            const totalRec = state.payments.reduce((s, p) => s + p.amount, 0);
            const pending = totalBill - totalRec;
            const profit = totalBill - totalExp;

            document.getElementById('stats-grid').innerHTML = `
                <div class="bg-white p-6 rounded-2xl border">
                    <p class="text-xs font-bold text-slate-400 uppercase">Total Billing</p>
                    <p class="text-2xl font-black">₹${totalBill.toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border">
                    <p class="text-xs font-bold text-slate-400 uppercase text-red-500">Expenses</p>
                    <p class="text-2xl font-black text-red-600">₹${totalExp.toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border">
                    <p class="text-xs font-bold text-slate-400 uppercase text-green-500">Received</p>
                    <p class="text-2xl font-black text-green-600">₹${totalRec.toLocaleString()}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border ${pending > 0 ? 'border-amber-200 bg-amber-50' : ''}">
                    <p class="text-xs font-bold text-amber-600 uppercase">Total Pending</p>
                    <p class="text-2xl font-black text-amber-700">₹${pending.toLocaleString()}</p>
                </div>
                <div class="bg-blue-600 p-6 rounded-2xl shadow-xl shadow-blue-100">
                    <p class="text-xs font-bold text-blue-200 uppercase tracking-widest">Total Profit</p>
                    <p class="text-2xl font-black text-white">₹${profit.toLocaleString()}</p>
                </div>
            `;

            // Top Events
            const eventProfits = state.events.map(e => {
                const exp = state.expenses.filter(x => x.eventId === e.id).reduce((s, x) => s + x.amount, 0);
                return { ...e, profit: e.billing - exp };
            }).sort((a,b) => b.profit - a.profit).slice(0,3);

            document.getElementById('top-events').innerHTML = eventProfits.map(e => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                    <span><b class="text-blue-700">${e.client}</b> <small class="text-slate-400 ml-2">${e.date}</small></span>
                    <span class="font-black text-green-600">₹${e.profit.toLocaleString()}</span>
                </div>
            `).join('');
        }

        function renderEvents() {
            document.getElementById('events-list').innerHTML = state.events.map(ev => {
                const exp = state.expenses.filter(x => x.eventId === ev.id).reduce((s, x) => s + x.amount, 0);
                const rec = state.payments.filter(p => p.eventId === ev.id).reduce((s, p) => s + p.amount, 0);
                return `
                <div class="bg-white p-6 rounded-2xl shadow-sm border hover:shadow-md transition cursor-pointer" onclick="showEventDetail('${ev.id}')">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-lg leading-tight">${ev.client}</h3>
                        <button onclick="event.stopPropagation(); deleteItem('events', '${ev.id}')" class="text-slate-300 hover:text-red-500">×</button>
                    </div>
                    <div class="space-y-2 mb-4">
                        <div class="flex justify-between text-sm"><span>Billing</span><span class="font-bold">₹${ev.billing}</span></div>
                        <div class="flex justify-between text-sm"><span>Expense</span><span class="text-red-500 font-bold">₹${exp}</span></div>
                        <div class="flex justify-between text-sm"><span>Collected</span><span class="text-green-600 font-bold">₹${rec}</span></div>
                    </div>
                    <div class="pt-3 border-t flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400">${ev.date}</span>
                        <span class="text-sm font-black ${ev.billing - exp > 0 ? 'text-blue-600' : 'text-red-600'}">Profit: ₹${ev.billing - exp}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderExpenses() {
            const fEvent = document.getElementById('filter-event').value;
            const fCat = document.getElementById('filter-cat').value;
            
            let filtered = state.expenses;
            if (fEvent) filtered = filtered.filter(x => x.eventId === fEvent);
            if (fCat) filtered = filtered.filter(x => x.category === fCat);

            document.getElementById('expenses-table-body').innerHTML = filtered.map(ex => {
                const ev = state.events.find(e => e.id === ex.eventId);
                const ven = state.vendors.find(v => v.id === ex.vendorId);
                return `
                <tr class="border-b text-sm group hover:bg-slate-50">
                    <td class="p-4">${ex.date}</td>
                    <td class="p-4 font-bold">${ev ? ev.client : '---'}</td>
                    <td class="p-4"><span class="bg-slate-100 px-2 py-1 rounded text-xs uppercase font-bold">${ex.category}</span><br><small>${ex.head}</small></td>
                    <td class="p-4 font-black text-red-600">₹${ex.amount}</td>
                    <td class="p-4 text-slate-500">${ven ? ven.name : 'Other'}</td>
                    <td class="p-4 text-right">
                        <button onclick="openExpenseModal('${ex.id}')" class="text-blue-500 mr-3">Edit</button>
                        <button onclick="deleteItem('expenses', '${ex.id}')" class="text-slate-300 hover:text-red-500">Delete</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderVendors() {
            document.getElementById('vendors-list').innerHTML = state.vendors.map(v => `
                <div class="bg-white p-4 rounded-xl border">
                    <p class="font-bold">${v.name}</p>
                    <p class="text-xs text-slate-400 uppercase">${v.category}</p>
                    <p class="text-sm mt-2">${v.phone || '--'}</p>
                </div>
            `).join('');
        }

        function showEventDetail(id) {
            const ev = state.events.find(e => e.id === id);
            const exps = state.expenses.filter(x => x.eventId === id);
            const pays = state.payments.filter(p => p.eventId === id);
            
            const totalExp = exps.reduce((s, x) => s + x.amount, 0);
            const totalRec = pays.reduce((s, p) => s + p.amount, 0);

            // Group by Category
            const catSummary = {};
            exps.forEach(x => {
                catSummary[x.category] = (catSummary[x.category] || 0) + x.amount;
            });

            switchTab('event-detail');
            document.getElementById('detail-content').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <div class="lg:col-span-2 bg-white p-8 rounded-3xl border shadow-sm">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h2 class="text-3xl font-black text-slate-800">${ev.client}</h2>
                                <p class="text-slate-400">${ev.type} | ${ev.venue} | ${ev.date}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="openEventModal('${ev.id}')" class="bg-slate-100 p-2 rounded-lg text-sm font-bold">Edit Info</button>
                                <button onclick="sendRemind('${ev.mobile}', '${ev.billing - totalRec}')" class="bg-green-100 text-green-700 p-2 rounded-lg text-sm font-bold">WhatsApp Remind</button>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pt-6 border-t">
                            <div><p class="text-xs font-bold text-slate-400">BILLING</p><p class="text-xl font-bold">₹${ev.billing}</p></div>
                            <div><p class="text-xs font-bold text-slate-400">EXPENSE</p><p class="text-xl font-bold text-red-500">₹${totalExp}</p></div>
                            <div><p class="text-xs font-bold text-slate-400">COLLECTED</p><p class="text-xl font-bold text-green-600">₹${totalRec}</p></div>
                            <div class="bg-blue-50 p-3 rounded-xl"><p class="text-xs font-bold text-blue-600">PROFIT</p><p class="text-xl font-bold text-blue-700">₹${ev.billing - totalExp}</p></div>
                        </div>
                    </div>

                    <div class="bg-amber-50 p-8 rounded-3xl border border-amber-200">
                        <p class="text-amber-600 font-bold text-sm uppercase">Pending Collection</p>
                        <p class="text-4xl font-black text-amber-700 mt-2">₹${ev.billing - totalRec}</p>
                        <button onclick="openPaymentModal('${ev.id}')" class="w-full bg-amber-500 text-white mt-6 py-3 rounded-xl font-bold shadow-lg shadow-amber-200">Record Collection</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <h4 class="font-bold mb-4 uppercase text-xs tracking-widest text-slate-400">Category Wise Expenses</h4>
                        <div class="space-y-3">
                            ${Object.entries(catSummary).map(([cat, amt]) => `
                                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                    <span class="font-medium text-sm">${cat}</span>
                                    <span class="font-black text-slate-700">₹${amt}</span>
                                </div>
                            `).join('') || '<p class="text-slate-300">No expenses recorded yet</p>'}
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <h4 class="font-bold mb-4 uppercase text-xs tracking-widest text-slate-400">Payment History</h4>
                        <div class="space-y-2">
                            ${pays.map(p => `
                                <div class="flex justify-between items-center text-sm p-3 bg-green-50 border border-green-100 rounded-xl">
                                    <span><b>${p.date}</b> • ${p.mode}</span>
                                    <div class="flex items-center gap-3">
                                        <span class="font-bold text-green-700">₹${p.amount}</span>
                                        <button onclick="deleteItem('payments', '${p.id}'); showEventDetail('${ev.id}')" class="text-red-300 hover:text-red-500">×</button>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-slate-300">No payments found</p>'}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- 6. BONUS FEATURES ---
        function sendRemind(phone, amt) {
            if (!phone || amt <= 0) return alert("Missing phone or amount!");
            const msg = `Namaste! This is a reminder regarding the pending payment of ₹${amt} for your event. Please clear it at your earliest convenience. Thank you! - Flavor Fusion Catering`;
            window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
        }

        function exportData() {
            let csv = "Category,Date,Event,Amount,Vendor\n";
            state.expenses.forEach(x => {
                const ev = state.events.find(e => e.id === x.eventId);
                csv += `${x.category},${x.date},${ev ? ev.client : ''},${x.amount},${x.vendorId}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'FF_Expenses.csv');
            a.click();
        }

        // INIT
        renderAll();
    </script>
</body>
</html>
