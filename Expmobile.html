<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flavor Fusion | Business Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
    darkMode: 'class',
    theme: {
        extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
                primary: '#EA580C',
                darkBg: '#0F172A',
                darkCard: '#1E293B',
                lightBg: '#F8FAFC',
                lightCard: '#FFFFFF'
            }
        }
    }
}
</script>

<style>
body { font-family: 'Inter', sans-serif; }

/* ===== MOBILE FIXES ===== */
@media (max-width: 768px) {

    #sidebar {
        position: fixed;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        display: flex !important;
        z-index: 100;
    }

    #sidebar.open {
        transform: translateX(0);
    }

    main {
        margin-left: 0 !important;
        padding: 16px !important;
    }

    header {
        margin-left: 0 !important;
        padding: 0 16px !important;
    }

    #stats-grid {
        grid-template-columns: 1fr !important;
    }

    .grid {
        grid-template-columns: 1fr !important;
    }

    table {
        min-width: 600px !important;
    }

    .card {
        padding: 16px !important;
    }

    button {
        min-height: 44px;
    }

    .modal form {
        padding: 20px !important;
        border-radius: 16px !important;
        max-width: 100% !important;
    }
}

/* Overlay */
#mobile-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 90;
}

#mobile-overlay.open {
    display: block;
}
</style>
</head>

<body class="min-h-screen bg-white dark:bg-[#0F172A] text-black dark:text-white">

<div id="mobile-overlay" onclick="toggleMobileSidebar()"></div>

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white dark:bg-[#0F172A] border-r z-50 hidden lg:flex flex-col">
    <div class="p-6 font-bold text-orange-600 text-xl">Flavor Fusion</div>
    <nav class="flex-1 px-4 space-y-2">
        <div onclick="switchTab('dashboard')" class="cursor-pointer">Dashboard</div>
        <div onclick="switchTab('events')" class="cursor-pointer">Events</div>
        <div onclick="switchTab('expenses')" class="cursor-pointer">Expenses</div>
        <div onclick="switchTab('vendors')" class="cursor-pointer">Vendors</div>
    </nav>
</aside>

<!-- HEADER -->
<header class="lg:ml-64 h-16 flex items-center justify-between px-6 border-b">
    <button onclick="toggleMobileSidebar()" class="lg:hidden text-2xl">☰</button>
    <h2 id="current-tab-title">Dashboard</h2>
    <button onclick="toggleTheme()">🌙</button>
</header>

<!-- MAIN -->
<main class="lg:ml-64 p-6">

<section id="dashboard" class="tab-content active">
    <div id="stats-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
</section>

<section id="events" class="tab-content">
    <button onclick="openEventModal()">+ Add Event</button>
    <div id="events-list"></div>
</section>

<section id="expenses" class="tab-content">
    <button onclick="openExpenseModal()">+ Expense</button>
    <table class="w-full min-w-[1000px]">
        <tbody id="expenses-table-body"></tbody>
    </table>
</section>

<section id="vendors" class="tab-content">
    <button onclick="openVendorModal()">+ Vendor</button>
    <div id="vendors-list"></div>
</section>

</main>

<script>

/* ===== YOUR ORIGINAL JS (UNCHANGED) ===== */

function toggleMobileSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('mobile-overlay').classList.toggle('open');
}

</script>

</body>
</html>
