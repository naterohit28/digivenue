<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flavor Fusion Pro | Data Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .dark body { background-color: #0F172A; color: #F1F5F9; }
        .light body { background-color: #F8FAFC; color: #0F172A; }

        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); width: 280px; z-index: 100; }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }
            #sidebar-overlay.open { display: block; }
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Data Sync Styles */
        .val-profit { color: #22C55E; }
        .val-expense { color: #EF4444; }
        .val-pending { color: #F59E0B; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <div id="toast" class="fixed bottom-6 right-6 hidden z-[200] bg-slate-900 border border-slate-700 text-white px-6 py-4 rounded-2xl shadow-2xl font-semibold flex items-center gap-3">
        <span id="toast-msg">Success</span>
    </div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 border-r bg-white dark:bg-[#0F172A] border-slate-200 dark:border-slate-800 flex flex-col overflow-y-auto">
        <div class="p-6 border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="h-10 w-auto object-contain" onerror="this.src='https://via.placeholder.com/40?text=FF'">
                <div>
                    <h1 class="text-lg font-bold text-orange-600 leading-none">FLAVOR FUSION</h1>
                    <p class="text-[10px] font-semibold text-slate-400 uppercase mt-1">Real-time Sync</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500"><span>📊</span> Dashboard</button>
            <button onclick="switchTab('events')" id="nav-events" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500"><span>📅</span> Events</button>
            <button onclick="switchTab('expenses')" id="nav-expenses" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500"><span>💸</span> Expenses</button>
            <button onclick="switchTab('vendors')" id="nav-vendors" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500"><span>🤝</span> Vendors</button>
        </nav>
    </aside>

    <header class="lg:ml-64 h-16 border-b bg-white/80 dark:bg-[#0F172A]/80 border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 md:px-8 sticky top-0 backdrop-blur-md z-40">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-600 dark:text-slate-300 text-2xl">☰</button>
            <h2 id="page-title" class="font-bold text-lg tracking-tight">Dashboard</h2>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-500/10 text-xl" id="theme-icon">🌙</button>
    </header>

    <main class="lg:ml-64 p-4 md:p-8">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="stats-grid"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white dark:bg-[#1E293B] rounded-2xl border border-slate-200 dark:border-slate-800 p-6">
                    <h2 class="text-lg font-bold mb-4 text-amber-600">Pending Collections</h2>
                    <div id="overdue-list" class="space-y-3"></div>
                </div>
                <div class="bg-white dark:bg-[#1E293B] rounded-2xl border border-slate-200 dark:border-slate-800 p-6 space-y-4">
                    <p class="text-[10px] font-bold uppercase text-slate-400">Add New Data</p>
                    <button onclick="openEventModal()" class="w-full bg-[#EA580C] text-white py-4 rounded-2xl font-bold active:scale-95 transition-all">+ Add Event</button>
                    <button onclick="openExpenseModal()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all">+ Add Expense</button>
                </div>
            </div>
        </section>

        <section id="events" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Portfolio</h2>
                <button onclick="openEventModal()" class="bg-[#EA580C] text-white px-6 py-3 rounded-xl font-bold text-sm">+ Add Event</button>
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="expenses" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Ledger</h2>
                <button onclick="openExpenseModal()" class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold text-sm">+ Record Expense</button>
            </div>
            <div id="expense-container" class="space-y-4">
                <div id="expenses-table-body" class="space-y-4"></div>
            </div>
        </section>

    </main>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-[2.5rem] p-8 md:p-12 w-full max-w-lg shadow-2xl space-y-6 border dark:border-slate-700">
            <h3 class="text-2xl font-bold text-orange-600">New Event Details</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Client Name</label><input type="text" id="ev-client" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></div>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Date</label><input type="date" id="ev-date" required class="w-full bg-transparent border-b border-slate-500/30 py-3 outline-none text-slate-800 dark:text-white"></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Billing (₹)</label><input type="number" id="ev-billing" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold text-orange-600 text-2xl outline-none"></div>
                </div>
            </div>
            <button type="submit" class="w-full bg-[#EA580C] text-white py-4 rounded-2xl font-bold uppercase tracking-widest">Save Event</button>
            <button type="button" onclick="closeModals()" class="w-full font-bold text-slate-500 py-2">Cancel</button>
        </form>
    </div>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-[2.5rem] p-8 md:p-12 w-full max-w-lg shadow-2xl space-y-6 border dark:border-slate-700">
            <h3 class="text-2xl font-bold text-red-500">Record Expense</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Select Event</label><select id="ex-event" class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></select></div>
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Expense Head</label><input type="text" id="ex-head" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></div>
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Amount (₹)</label><input type="number" id="ex-amount" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold text-red-500 text-3xl outline-none"></div>
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Date</label><input type="date" id="ex-date" required class="w-full bg-transparent border-b border-slate-500/30 py-3 outline-none text-slate-800 dark:text-white"></div>
            </div>
            <button type="submit" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold uppercase tracking-widest">Save Expense</button>
            <button type="button" onclick="closeModals()" class="w-full font-bold text-slate-500 py-2">Cancel</button>
        </form>
    </div>

    <script>
        // --- DATA & STATE ---
        const DB_KEYS = { EVENTS: 'ff_events_v2', EXPENSES: 'ff_exp_v2' };

        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || []
        };

        function save() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            renderAll();
        }

        // --- CORE UI FUNCTIONS ---
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            if(window.innerWidth < 768) toggleSidebar();
            renderAll();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function showToast(m) { const t = document.getElementById('toast'); t.querySelector('#toast-msg').innerText = m; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }

        // --- HANDLERS ---
        function handleEventSubmit(e) {
            e.preventDefault();
            const data = { 
                id: "EV"+Date.now(), 
                client: document.getElementById('ev-client').value, 
                date: document.getElementById('ev-date').value, 
                billing: parseFloat(document.getElementById('ev-billing').value) 
            };
            state.events.push(data);
            save(); closeModals(); showToast("Event Added");
        }

        function handleExpenseSubmit(e) {
            e.preventDefault();
            const data = { 
                id: "EX"+Date.now(), 
                eventId: document.getElementById('ex-event').value, 
                head: document.getElementById('ex-head').value, 
                amount: parseFloat(document.getElementById('ex-amount').value), 
                date: document.getElementById('ex-date').value 
            };
            state.expenses.push(data);
            save(); closeModals(); showToast("Expense Recorded");
        }

        // --- RENDERING (THE SYNC ENGINE) ---
        function renderEvents() {
            const list = document.getElementById('events-list');
            if(state.events.length === 0) {
                list.innerHTML = `<div class="col-span-full py-12 text-center text-slate-500 italic">No events yet. Add your first event.</div>`;
                return;
            }

            list.innerHTML = state.events.map(ev => {
                // Calculation Logic
                const evExpenses = state.expenses.filter(ex => ex.eventId === ev.id);
                const totalExp = evExpenses.reduce((sum, ex) => sum + ex.amount, 0);
                const totalReceived = 0; // Standard for now
                const pending = ev.billing - totalReceived;
                const profit = ev.billing - totalExp;

                return `
                <div class="bg-white dark:bg-[#1E293B] p-6 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm hover:border-orange-500 transition-all">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-bold text-lg leading-none text-slate-800 dark:text-slate-100">${ev.client}</h3>
                        <button onclick="deleteItem('events', '${ev.id}')" class="text-slate-400 text-xl">×</button>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">${ev.date}</p>
                    
                    <div class="space-y-3">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500">Billing</span>
                            <span class="font-bold">₹${ev.billing.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500">Expense</span>
                            <span class="font-bold text-red-500">₹${totalExp.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-center text-sm border-t border-slate-500/10 pt-2">
                            <span class="font-bold text-slate-500">Profit</span>
                            <span class="font-black text-green-500">₹${profit.toLocaleString()}</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500">Pending</span>
                            <span class="font-bold text-amber-500">₹${pending.toLocaleString()}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderExpenses() {
            const list = document.getElementById('expenses-table-body');
            const sorted = state.expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
            
            list.innerHTML = sorted.map(ex => {
                const ev = state.events.find(e => e.id === ex.eventId);
                return `
                <div class="bg-white dark:bg-[#1E293B] p-5 rounded-2xl border border-slate-200 dark:border-slate-800 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${ex.date}</p>
                        <h4 class="font-bold text-slate-800 dark:text-slate-200">${ex.head}</h4>
                        <p class="text-xs text-orange-500 font-semibold">${ev?.client || 'No Event'}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-red-500 text-lg">₹${ex.amount.toLocaleString()}</p>
                        <button onclick="deleteItem('expenses', '${ex.id}')" class="text-[10px] font-bold text-slate-500 uppercase hover:text-red-500 mt-1">Delete</button>
                    </div>
                </div>`;
            }).join('') || `<p class="text-center py-10 text-slate-500 italic">No expenses recorded.</p>`;
        }

        function renderDashboard() {
            const bill = state.events.reduce((s, e) => s + e.billing, 0);
            const exp = state.expenses.reduce((s, e) => s + e.amount, 0);
            document.getElementById('stats-grid').innerHTML = `
                <div class="bg-white dark:bg-[#1E293B] p-5 rounded-2xl border border-slate-200 dark:border-slate-800"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Portfolio</p><p class="text-xl font-bold text-slate-700 dark:text-slate-200">₹${bill.toLocaleString()}</p></div>
                <div class="bg-white dark:bg-[#1E293B] p-5 rounded-2xl border border-slate-200 dark:border-slate-800"><p class="text-[10px] font-bold text-red-500 uppercase mb-1">Expenses</p><p class="text-xl font-bold text-red-500">₹${exp.toLocaleString()}</p></div>
                <div class="bg-orange-600 p-5 rounded-2xl shadow-lg text-white md:col-span-2"><p class="text-[10px] font-bold uppercase opacity-80 mb-1">Net Profit</p><p class="text-2xl font-bold">₹${(bill-exp).toLocaleString()}</p></div>
            `;
        }

        function openEventModal() { document.getElementById('event-modal').classList.add('active'); }
        function openExpenseModal() {
            const m = document.getElementById('expense-modal');
            document.getElementById('ex-event').innerHTML = state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('') || '<option>Add Event First</option>';
            document.getElementById('ex-date').value = new Date().toISOString().split('T')[0];
            m.classList.add('active');
        }

        function deleteItem(type, id) {
            if(confirm("Are you sure?")) {
                state[type] = state[type].filter(x => x.id !== id);
                save();
            }
        }

        function renderAll() {
            renderDashboard();
            renderEvents();
            renderExpenses();
        }

        // --- INIT ---
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.className = savedTheme;
        document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '🌙' : '☀️';
        switchTab('dashboard');
    </script>
</body>
</html>
