<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flavor Fusion Pro | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #EA580C;
            --bg: #0F172A;
            --card: #1E293B;
            --text: #F1F5F9;
            --border: #334155;
        }
        .light {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #0F172A;
            --border: #E2E8F0;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            transition: all 0.2s ease;
        }
        .sidebar { background-color: var(--card); border-right: 1px solid var(--border); }
        .card { background-color: var(--card); border: 1px solid var(--border); border-radius: 1rem; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Mobile Optimization */
        @media (max-width: 1024px) {
            #sidebar { transform: translateX(-100%); width: 280px; position: fixed; height: 100%; z-index: 200; }
            #sidebar.open { transform: translateX(0); }
            #overlay.open { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 190; }
        }

        /* Mobile Table to Card Transformation */
        @media (max-width: 768px) {
            .resp-table thead { display: none; }
            .resp-table tr { display: flex; flex-direction: column; margin-bottom: 1rem; padding: 1rem; background: var(--card); border: 1px solid var(--border); border-radius: 1rem; }
            .resp-table td { display: flex; justify-content: space-between; padding: 0.5rem 0; border: none !important; font-size: 0.85rem; }
            .resp-table td::before { content: attr(data-label); font-weight: 700; opacity: 0.5; text-transform: uppercase; font-size: 0.7rem; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="sidebar fixed left-0 top-0 h-full w-64 flex flex-col transition-transform duration-300">
        <div class="p-6 border-b border-slate-500/10">
            <div class="flex items-center gap-3">
                <svg width="40" height="40" viewBox="0 0 512 512" fill="none">
                    <path d="M124.9 334.8c-23.7-18.4-56.8-11.8-73.9 14.7-15.5 24.1-10.9 56 10.2 74.3 21.1 18.4 54.2 11.8 71.3-12.3 17.1-24.1 16.3-58.4-7.6-76.7z" fill="#EA580C"/>
                    <path d="M256 32C172.1 32 104 100.1 104 184c0 38.8 14.5 74.2 38.4 101.1l-4.1 4.1c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l4.1-4.1c26.9 23.9 62.3 38.4 101.1 38.4s74.2-14.5 101.1-38.4l4.1 4.1c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-4.1-4.1c23.9-26.9 38.4-62.3 38.4-101.1 0-83.9-68.1-152-152-152z" fill="#334155"/>
                </svg>
                <div>
                    <h1 class="text-lg font-black text-orange-600 leading-none">FLAVOR FUSION</h1>
                    <p class="text-[9px] font-bold text-slate-500 uppercase mt-1">Management Pro</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-sm hover:bg-orange-500/10"><span>📊</span> Dashboard</button>
            <button onclick="switchTab('events')" id="nav-events" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-sm hover:bg-orange-500/10"><span>📅</span> Events</button>
            <button onclick="switchTab('expenses')" id="nav-expenses" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-sm hover:bg-orange-500/10"><span>💸</span> Expenses</button>
            <button onclick="switchTab('vendors')" id="nav-vendors" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-sm hover:bg-orange-500/10"><span>🤝</span> Vendors</button>
        </nav>
    </aside>

    <header class="lg:ml-64 h-16 border-b border-slate-500/10 flex items-center justify-between px-6 sticky top-0 bg-opacity-80 backdrop-blur-md z-40">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden text-2xl">☰</button>
            <h2 id="page-title" class="font-bold text-xl">Dashboard</h2>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-500/10 text-xl" id="theme-btn">🌙</button>
    </header>

    <main class="lg:ml-64 p-4 md:p-8 space-y-8">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="stats-grid"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 card p-6">
                    <h2 class="text-lg font-bold mb-4 text-amber-500">Overdue Follow-up</h2>
                    <div id="overdue-list" class="space-y-3"></div>
                </div>
                <div class="card p-6 flex flex-col gap-3">
                    <button onclick="openEventModal()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold">+ New Event</button>
                    <button onclick="openExpenseModal()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold">+ Record Expense</button>
                </div>
            </div>
        </section>

        <section id="events" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Event Portfolio</h2>
                <button onclick="openEventModal()" class="bg-orange-600 text-white px-6 py-2.5 rounded-xl font-bold">+ Add Event</button>
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="expenses" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Financial Ledger</h2>
                <button onclick="openExpenseModal()" class="bg-red-600 text-white px-6 py-2.5 rounded-xl font-bold">+ Add Expense</button>
            </div>
            <div class="card overflow-hidden">
                <table class="w-full resp-table">
                    <thead class="bg-slate-500/5 text-[10px] font-black uppercase text-slate-500 border-b border-slate-500/10">
                        <tr><th class="p-4 text-left">Date</th><th class="p-4 text-left">Event</th><th class="p-4 text-left">Vendor</th><th class="p-4 text-left">Head</th><th class="p-4 text-left">Amount</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="expenses-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="vendors" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Vendors</h2>
                <button onclick="openVendorModal()" class="bg-slate-800 text-white px-6 py-2.5 rounded-xl font-bold">+ Add Vendor</button>
            </div>
            <div id="vendors-list" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="event-detail" class="tab-content"></section>
    </main>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="card p-8 w-full max-w-lg shadow-2xl space-y-6 border-none">
            <h3 id="event-modal-title" class="text-2xl font-bold text-orange-600">Event Details</h3>
            <input type="hidden" id="edit-event-id">
            <div class="space-y-4 text-slate-800 dark:text-white">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Client Name</label><input type="text" id="ev-client" required class="w-full bg-transparent border-b border-slate-500/30 py-2 font-bold outline-none"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Date</label><input type="date" id="ev-date" required class="w-full bg-transparent border-b border-slate-500/30 py-2 outline-none"></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Billing (₹)</label><input type="number" id="ev-billing" required class="w-full bg-transparent border-b border-slate-500/30 py-2 font-bold text-orange-500"></div>
                </div>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="flex
