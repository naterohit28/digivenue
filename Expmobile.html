<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flavor Fusion Pro | Business Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #EA580C; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; -webkit-tap-highlight-color: transparent; }
        
        .dark body { background-color: #0F172A; color: #F1F5F9; }
        .light body { background-color: #F8FAFC; color: #0F172A; }

        /* Sidebar Transition */
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); width: 280px; }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay { display: none; }
            #sidebar-overlay.open { display: block; }
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Table-to-Card CSS */
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { 
                display: flex; flex-direction: column; margin-bottom: 1rem; 
                padding: 1rem; border-radius: 1rem; border: 1px solid #334155;
                background: rgba(30, 41, 59, 0.5);
            }
            .responsive-table td { 
                display: flex; justify-content: space-between; padding: 0.5rem 0;
                border: none !important; font-size: 0.875rem;
            }
            .responsive-table td::before { content: attr(data-label); font-weight: 700; color: #94A3B8; text-transform: uppercase; font-size: 10px; }
            .responsive-table td.actions-cell { justify-content: center; margin-top: 10px; border-top: 1px solid #334155 !important; padding-top: 15px; }
        }

        .btn-primary { @apply bg-[#EA580C] text-white px-5 py-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-all min-h-[44px]; }
        .btn-ghost { @apply p-2 rounded-full hover:bg-slate-500/10 transition-all; }
        .card { @apply rounded-2xl border transition-all; }
        .dark .card { @apply bg-[#1E293B] border-[#334155]; }
        .light .card { @apply bg-white border-[#E2E8F0]; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-[45]"></div>

    <div id="toast" class="fixed bottom-6 right-6 hidden z-[200] bg-slate-900 border border-slate-700 text-white px-6 py-4 rounded-2xl shadow-2xl font-bold flex items-center gap-3">
        <span class="w-2 h-2 bg-orange-500 rounded-full animate-ping"></span> <span id="toast-msg">Success</span>
    </div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 border-r z-50 bg-white dark:bg-[#0F172A] dark:border-slate-800 border-slate-200 flex flex-col">
        <div class="p-6 border-b dark:border-slate-800">
            <div class="flex items-center gap-3 mb-1">
                <img src="logo.png" class="h-8 w-auto object-contain" onerror="this.src='https://via.placeholder.com/40?text=FF'">
                <h1 class="text-xl font-black text-orange-600 tracking-tighter">FLAVOR FUSION</h1>
            </div>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Business Control Panel</p>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-orange-600/10 hover:text-orange-500 transition-all font-semibold">
                <span>📊</span> Dashboard
            </button>
            <button onclick="switchTab('events')" id="nav-events" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-orange-600/10 hover:text-orange-500 transition-all font-semibold">
                <span>📅</span> Events
            </button>
            <button onclick="switchTab('expenses')" id="nav-expenses" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-orange-600/10 hover:text-orange-500 transition-all font-semibold">
                <span>💸</span> Expenses
            </button>
            <button onclick="switchTab('vendors')" id="nav-vendors" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-orange-600/10 hover:text-orange-500 transition-all font-semibold">
                <span>🤝</span> Vendors
            </button>
        </nav>
        
        <div class="p-6 text-[10px] text-slate-500 font-bold opacity-50 uppercase">v4.5 Stable | Mumbai</div>
    </aside>

    <header class="lg:ml-64 h-16 border-b dark:border-slate-800 border-slate-200 flex items-center justify-between px-4 md:px-8 sticky top-0 bg-white/80 dark:bg-[#0F172A]/80 backdrop-blur-md z-40">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden text-2xl btn-ghost">☰</button>
            <h2 id="page-title" class="font-bold text-lg md:text-xl tracking-tight">Dashboard</h2>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="btn-ghost text-xl" id="theme-icon">🌙</button>
            <div class="h-8 w-8 rounded-full bg-orange-600 flex items-center justify-center text-white text-[10px] font-bold">PRO</div>
        </div>
    </header>

    <main class="lg:ml-64 p-4 md:p-8 max-w-full">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="stats-grid"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 card p-6">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-amber-500">
                        <span class="w-1.5 h-6 bg-amber-500 rounded-full"></span> Overdue Collections
                    </h2>
                    <div id="overdue-list" class="space-y-3"></div>
                </div>
                <div class="card p-6 flex flex-col gap-3">
                    <h3 class="text-xs font-bold uppercase text-slate-500 mb-2">Quick Entry</h3>
                    <button onclick="openEventModal()" class="btn-primary w-full">+ Add Event</button>
                    <button onclick="openExpenseModal()" class="btn-primary w-full bg-red-600 hover:bg-red-700">+ Add Expense</button>
                </div>
            </div>
        </section>

        <section id="events" class="tab-content space-y-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h2 class="text-2xl font-black">Events</h2>
                <button onclick="openEventModal()" class="btn-primary">+ Add Event</button>
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="expenses" class="tab-content space-y-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h2 class="text-2xl font-black">Expense Ledger</h2>
                <button onclick="openExpenseModal()" class="btn-primary bg-red-600 hover:bg-red-700">+ Add Expense</button>
            </div>
            <div class="card overflow-hidden">
                <table class="w-full responsive-table">
                    <thead class="bg-slate-500/5 text-[10px] font-black uppercase text-slate-500 border-b dark:border-slate-800">
                        <tr>
                            <th class="p-4 text-left">Date</th>
                            <th class="p-4 text-left">Event</th>
                            <th class="p-4 text-left">Head</th>
                            <th class="p-4 text-left">Amount</th>
                            <th class="p-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="vendors" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Vendors</h2>
                <button onclick="openVendorModal()" class="btn-primary bg-slate-800">+ Add Vendor</button>
            </div>
            <div id="vendors-list" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="event-detail" class="tab-content"></section>
        <section id="vendor-detail" class="tab-content"></section>
    </main>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl space-y-4">
            <h3 id="event-modal-title" class="text-xl font-bold text-orange-600">Event Details</h3>
            <input type="hidden" id="edit-event-id">
            <div class="grid grid-cols-1 gap-4">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Client Name</label><input type="text" id="ev-client" required class="w-full bg-transparent border-b border-slate-500/20 py-2 font-bold outline-none focus:border-orange-500"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Date</label><input type="date" id="ev-date" required class="w-full bg-transparent border-b border-slate-500/20 py-2 outline-none"></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Billing (₹)</label><input type="number" id="ev-billing" required class="w-full bg-transparent border-b border-slate-500/20 py-2 font-bold text-orange-500 outline-none"></div>
                </div>
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Venue</label><input type="text" id="ev-venue" class="w-full bg-transparent border-b border-slate-500/20 py-2 outline-none"></div>
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Mobile</label><input type="tel" id="ev-mobile" class="w-full bg-transparent border-b border-slate-500/20 py-2 outline-none"></div>
            </div>
            <div class="flex flex-col md:flex-row gap-3 pt-4">
                <button type="submit" class="btn-primary flex-1">Save Event</button>
                <button type="button" onclick="closeModals()" class="font-bold text-slate-500 py-3">Cancel</button>
            </div>
        </form>
    </div>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-3xl p-6 md:p-8 w-full max-w-md shadow-2xl space-y-4">
            <h3 class="text-xl font-bold text-red-500">Record Expense</h3>
            <input type="hidden" id="edit-expense-id">
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Event</label><select id="ex-event" class="w-full bg-transparent border-b py-2 border-slate-500/20 font-bold outline-none"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Category</label><select id="ex-cat" onchange="updateHeads('ex-cat', 'ex-head')" class="w-full bg-transparent border-b py-2 border-slate-500/20 outline-none"></select></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Sub-Head</label><select id="ex-head" class="w-full bg-transparent border-b py-2 border-slate-500/20 font-bold outline-none"></select></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Amount (₹)</label>
                    <input type="number" id="ex-amount" required class="w-full bg-transparent border-b py-2 font-black text-red-500 text-2xl outline-none">
                    <div class="flex flex-wrap gap-2 mt-2">
                        <button type="button" onclick="setAmt(500)" class="px-3 py-1 bg-slate-500/10 rounded-lg text-xs font-bold">₹500</button>
                        <button type="button" onclick="setAmt(1000)" class="px-3 py-1 bg-slate-500/10 rounded-lg text-xs font-bold">₹1k</button>
                        <button type="button" onclick="setAmt(5000)" class="px-3 py-1 bg-slate-500/10 rounded-lg text-xs font-bold">₹5k</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Date</label><input type="date" id="ex-date" required class="w-full bg-transparent border-b py-2 border-slate-500/20 outline-none"></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Vendor</label><select id="ex-vendor" class="w-full bg-transparent border-b py-2 border-slate-500/20 outline-none font-bold text-orange-500"></select></div>
                </div>
            </div>
            <div class="flex flex-col md:flex-row gap-3 pt-4">
                <button type="submit" class="btn-primary flex-1 bg-red-600 hover:bg-red-700">Save Expense</button>
                <button type="button" onclick="closeModals()" class="font-bold text-slate-500 py-3">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        // --- DATA & STATE ---
        const DB_KEYS = { EVENTS: 'ff_events_v2', EXPENSES: 'ff_exp_v2', PAYMENTS: 'ff_pay_v2', VENDORS: 'ff_ven_v2' };
        const expenseHeadsDB = {
            "Raw Material": ["Grocery", "Vegetables", "Fruits", "Dairy", "Spices", "Meat"],
            "Labour": ["Waiters", "Cooks", "Cleaning", "Supervisor"],
            "Logistics": ["Transport", "Fuel", "Gas"],
            "Inventory": ["Rented Material", "Disposable", "Packaging"]
        };

        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || [],
            payments: JSON.parse(localStorage.getItem(DB_KEYS.PAYMENTS)) || [],
            vendors: JSON.parse(localStorage.getItem(DB_KEYS.VENDORS)) || []
        };

        // --- THEME & UI ---
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sb.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#sidebar button').forEach(b => b.classList.remove('text-orange-500', 'bg-orange-600/10'));
            
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id)?.classList.add('text-orange-500', 'bg-orange-600/10');
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            
            if(window.innerWidth < 768) toggleSidebar();
            renderAll();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function showToast(m) { 
            const t = document.getElementById('toast'); 
            document.getElementById('toast-msg').innerText = m; 
            t.classList.remove('hidden'); 
            setTimeout(() => t.classList.add('hidden'), 3000); 
        }

        function setAmt(v) { document.getElementById('ex-amount').value = v; }

        function updateHeads(catId, subCatId) {
            const cat = document.getElementById(catId).value;
            const sub = document.getElementById(subCatId);
            sub.innerHTML = (expenseHeadsDB[cat] || []).map(h => `<option value="${h}">${h}</option>`).join('');
        }

        // --- HANDLERS ---
        function handleEventSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('edit-event-id').value;
            const data = { id: id || "EV"+Date.now(), client: document.getElementById('ev-client').value, date: document.getElementById('ev-date').value, mobile: document.getElementById('ev-mobile').value, billing: parseFloat(document.getElementById('ev-billing').value), venue: document.getElementById('ev-venue').value };
            if(id) state.events = state.events.map(ev => ev.id === id ? data : ev);
            else state.events.push(data);
            save(); closeModals(); showToast("Event Saved");
        }

        function handleExpenseSubmit(e) {
            e.preventDefault();
            const data = { id: "EX"+Date.now(), eventId: document.getElementById('ex-event').value, category: document.getElementById('ex-cat').value, head: document.getElementById('ex-head').value, amount: parseFloat(document.getElementById('ex-amount').value), date: document.getElementById('ex-date').value, vendorId: document.getElementById('ex-vendor').value };
            state.expenses.push(data);
            save(); closeModals(); showToast("Expense Recorded");
        }

        function save() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            renderAll();
        }

        // --- RENDERERS ---
        function renderDashboard() {
            const totalBill = state.events.reduce((s, e) => s + e.billing, 0);
            const totalExp = state.expenses.reduce((s, e) => s + e.amount, 0);
            const profit = totalBill - totalExp;

            document.getElementById('stats-grid').innerHTML = `
                <div class="card p-5"><p class="text-[10px] font-bold uppercase text-slate-500 mb-1">Portfolio</p><p class="text-xl font-black">₹${totalBill.toLocaleString()}</p></div>
                <div class="card p-5"><p class="text-[10px] font-bold uppercase text-red-500 mb-1">Expenses</p><p class="text-xl font-black text-red-500">₹${totalExp.toLocaleString()}</p></div>
                <div class="card p-5 bg-orange-600 text-white border-none shadow-lg shadow-orange-600/20 lg:col-span-2">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Net Profit</p>
                    <p class="text-2xl font-black">₹${profit.toLocaleString()}</p>
                </div>
                <div class="card p-5"><p class="text-[10px] font-bold uppercase text-amber-500 mb-1">Events</p><p class="text-xl font-black">${state.events.length}</p></div>
            `;
        }

        function renderExpenses() {
            const tbody = document.getElementById('expenses-table-body');
            const list = state.expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
            
            document.getElementById('exp-count').innerText = list.length;
            document.getElementById('exp-total-val').innerText = '₹' + list.reduce((s, x) => s + x.amount, 0).toLocaleString();

            tbody.innerHTML = list.map(ex => {
                const ev = state.events.find(e => e.id === ex.eventId);
                return `<tr>
                    <td data-label="Date" class="p-4 font-mono text-[11px] text-slate-500">${ex.date}</td>
                    <td data-label="Event" class="p-4 font-bold">${ev?.client || '---'}</td>
                    <td data-label="Head" class="p-4 uppercase text-[10px] font-black opacity-60">${ex.head}</td>
                    <td data-label="Amount" class="p-4 font-black text-red-500">₹${ex.amount.toLocaleString()}</td>
                    <td class="p-4 text-right actions-cell"><button onclick="deleteItem('expenses', '${ex.id}')" class="text-red-500 font-bold px-4 py-2 hover:bg-red-500/10 rounded-lg">Delete</button></td>
                </tr>`;
            }).join('');
        }

        function renderEvents() {
            const list = document.getElementById('events-list');
            if(state.events.length === 0) { list.innerHTML = `<p class="col-span-full py-10 text-center text-slate-500 italic">No events created yet.</p>`; return; }
            list.innerHTML = state.events.map(ev => `
                <div class="card p-6 hover:border-orange-500 cursor-pointer group" onclick="showEventDetail('${ev.id}')">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="font-black text-lg group-hover:text-orange-500 transition-colors">${ev.client}</h3>
                        <button onclick="event.stopPropagation(); deleteItem('events', '${ev.id}')" class="text-slate-400">×</button>
                    </div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6">${ev.date}</p>
                    <div class="flex justify-between items-end">
                        <p class="text-lg font-black text-orange-500">₹${ev.billing.toLocaleString()}</p>
                        <span class="text-[10px] font-bold bg-slate-500/10 px-2 py-1 rounded">Quoted</span>
                    </div>
                </div>
            `).join('');
        }

        function openEventModal() { document.getElementById('event-modal').classList.add('active'); }
        function openExpenseModal() {
            const m = document.getElementById('expense-modal');
            document.getElementById('ex-event').innerHTML = state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('') || '<option>Add Event First</option>';
            document.getElementById('ex-cat').innerHTML = Object.keys(expenseHeadsDB).map(c => `<option value="${c}">${c}</option>`).join('');
            updateHeads('ex-cat', 'ex-head');
            document.getElementById('ex-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('ex-vendor').innerHTML = `<option value="">Generic</option>` + state.vendors.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
            m.classList.add('active');
        }

        function deleteItem(type, id) {
            const item = state[type].find(x => x.id === id);
            const label = item.client || item.head || "this item";
            if(confirm(`Delete ${label}?`)) {
                state[type] = state[type].filter(x => x.id !== id);
                save();
                showToast("Removed Successfully");
            }
        }

        function renderAll() { renderDashboard(); renderEvents(); renderExpenses(); }

        // --- INIT ---
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.className = savedTheme;
        document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '🌙' : '☀️';
        renderAll();
    </script>
</body>
</html>
