<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flavor Fusion | Business Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .dark body { background-color: #0F172A; color: #F1F5F9; }
        .light body { background-color: #F8FAFC; color: #0F172A; }

        /* Sidebar Overlay Logic */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); width: 280px; z-index: 100; }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay { display: none; }
            #sidebar-overlay.open { display: block; z-index: 90; }
        }

        /* Modal styling */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Mobile Table -> Card UI */
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { 
                display: flex; flex-direction: column; margin-bottom: 1.25rem; 
                padding: 1.25rem; border-radius: 1rem; border: 1px solid #334155;
                background-color: #1E293B; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            }
            .light .responsive-table tr { background-color: #FFFFFF; border-color: #E2E8F0; }
            .responsive-table td { 
                display: flex; justify-content: space-between; padding: 6px 0;
                border: none !important; font-size: 0.9rem;
            }
            .responsive-table td::before { 
                content: attr(data-label); font-weight: 600; color: #94A3B8; 
                text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; 
            }
            .actions-cell { justify-content: center !important; margin-top: 12px; border-top: 1px solid #334155 !important; padding-top: 12px !important; gap: 1rem; }
            .light .actions-cell { border-top-color: #E2E8F0 !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 transition-opacity"></div>

    <div id="toast" class="fixed bottom-6 right-6 hidden z-[200] bg-slate-900 border border-slate-700 text-white px-6 py-4 rounded-2xl shadow-2xl font-semibold flex items-center gap-3">
        <span id="toast-msg">Success</span>
    </div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 border-r bg-white dark:bg-[#0F172A] dark:border-slate-800 border-slate-200 flex flex-col overflow-y-auto">
        <div class="p-6 border-b dark:border-slate-800">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="h-10 w-auto object-contain" onerror="this.src='https://via.placeholder.com/40?text=FF'">
                <div>
                    <h1 class="text-lg font-bold text-orange-600 leading-none">FLAVOR FUSION</h1>
                    <p class="text-[10px] font-semibold text-slate-400 uppercase mt-1">Control Panel</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-orange-600/10 hover:text-orange-500 transition-all font-semibold text-sm">
                <span>📊</span> Dashboard
            </button>
            <button onclick="switchTab('events')" id="nav-events" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-orange-600/10 hover:text-orange-500 transition-all font-semibold text-sm">
                <span>📅</span> Events
            </button>
            <button onclick="switchTab('expenses')" id="nav-expenses" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-orange-600/10 hover:text-orange-500 transition-all font-semibold text-sm">
                <span>💸</span> Expenses
            </button>
            <button onclick="switchTab('vendors')" id="nav-vendors" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-orange-600/10 hover:text-orange-500 transition-all font-semibold text-sm">
                <span>🤝</span> Vendors
            </button>
        </nav>
    </aside>

    <header class="lg:ml-64 h-16 border-b dark:border-slate-800 border-slate-200 flex items-center justify-between px-4 md:px-8 sticky top-0 bg-white/80 dark:bg-[#0F172A]/80 backdrop-blur-md z-40">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-full hover:bg-slate-500/10 text-xl">☰</button>
            <h2 id="page-title" class="font-semibold text-lg tracking-tight">Dashboard</h2>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-500/10 text-xl" id="theme-icon">🌙</button>
    </header>

    <main class="lg:ml-64 p-4 md:p-8">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="stats-grid"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-[#1E293B] dark:bg-[#1E293B] light:bg-white rounded-2xl border dark:border-slate-800 border-slate-200 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold mb-4 text-amber-500 flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-amber-500 rounded-full"></span> Overdue Collections
                    </h2>
                    <div id="overdue-list" class="space-y-3"></div>
                </div>
                <div class="bg-[#1E293B] dark:bg-[#1E293B] light:bg-white rounded-2xl border dark:border-slate-800 border-slate-200 p-6 flex flex-col gap-3">
                    <p class="text-xs font-bold uppercase text-slate-500">Quick Actions</p>
                    <button onclick="openEventModal()" class="bg-[#EA580C] text-white px-5 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95 transition-all min-h-[44px]">+ Add Event</button>
                    <button onclick="openExpenseModal()" class="bg-red-600 text-white px-5 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95 transition-all min-h-[44px]">+ Record Expense</button>
                </div>
            </div>
        </section>

        <section id="expenses" class="tab-content space-y-6">
            <div class="flex flex-col md:flex-row justify-between gap-4">
                <h2 class="text-2xl font-bold">Expense Ledger</h2>
                <button onclick="openExpenseModal()" class="bg-red-600 text-white px-5 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95 transition-all min-h-[44px] w-full md:w-auto">+ Add Expense</button>
            </div>
            <div class="rounded-2xl border dark:border-slate-800 border-slate-200 overflow-hidden bg-white dark:bg-transparent">
                <table class="w-full responsive-table">
                    <thead class="bg-slate-500/5 text-[10px] font-bold uppercase text-slate-500 border-b dark:border-slate-800">
                        <tr><th class="p-4 text-left">Date</th><th class="p-4 text-left">Event</th><th class="p-4 text-left">Head</th><th class="p-4 text-left">Amount</th><th class="p-4 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="expenses-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="events" class="tab-content space-y-6">
             <div class="flex justify-between items-center"><h2 class="text-2xl font-bold">Events</h2><button onclick="openEventModal()" class="bg-[#EA580C] text-white px-5 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95 transition-all min-h-[44px]">+ Add Event</button></div>
             <div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="vendors" class="tab-content space-y-6">
             <div class="flex justify-between items-center"><h2 class="text-2xl font-bold">Vendors</h2><button onclick="openVendorModal()" class="bg-slate-800 text-white px-5 py-3 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95 transition-all min-h-[44px]">+ Add Vendor</button></div>
             <div id="vendors-list" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="event-detail" class="tab-content"></section>
    </main>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-[2rem] p-6 md:p-10 w-full max-w-lg shadow-2xl space-y-6 border dark:border-slate-700 border-slate-100">
            <h3 class="text-2xl font-bold text-red-500">Record Expense</h3>
            <input type="hidden" id="edit-expense-id">
            
            <div class="space-y-5">
                <div><label class="text-xs font-bold uppercase text-slate-400">Event</label><select id="ex-event" class="w-full bg-transparent border-b border-slate-500/20 py-3 font-bold outline-none"></select></div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-xs font-bold uppercase text-slate-400">Category</label><select id="ex-cat" onchange="updateHeads('ex-cat', 'ex-head')" class="w-full bg-transparent border-b border-slate-500/20 py-3 outline-none"></select></div>
                    <div><label class="text-xs font-bold uppercase text-slate-400">Sub-Head</label><select id="ex-head" class="w-full bg-transparent border-b border-slate-500/20 py-3 font-bold outline-none"></select></div>
                </div>

                <div>
                    <label class="text-xs font-bold uppercase text-slate-400">Amount (₹)</label>
                    <input type="number" id="ex-amount" required class="w-full bg-transparent border-b border-slate-500/20 py-3 font-bold text-red-500 text-3xl outline-none">
                    <div class="flex flex-wrap gap-2 mt-4">
                        <button type="button" onclick="setAmt(500)" class="px-4 py-2 rounded-lg text-sm font-semibold bg-slate-500/10 hover:bg-slate-500/20">₹500</button>
                        <button type="button" onclick="setAmt(1000)" class="px-4 py-2 rounded-lg text-sm font-semibold bg-slate-500/10 hover:bg-slate-500/20">₹1000</button>
                        <button type="button" onclick="setAmt(5000)" class="px-4 py-2 rounded-lg text-sm font-semibold bg-slate-500/10 hover:bg-slate-500/20">₹5000</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-xs font-bold uppercase text-slate-400">Date</label><input type="date" id="ex-date" required class="w-full bg-transparent border-b border-slate-500/20 py-3 outline-none"></div>
                    <div><label class="text-xs font-bold uppercase text-slate-400">Vendor</label><select id="ex-vendor" class="w-full bg-transparent border-b border-slate-500/20 py-3 font-bold text-orange-500 outline-none"></select></div>
                </div>
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button type="submit" class="bg-red-600 text-white px-5 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-all">Save Expense</button>
                <button type="button" onclick="closeModals()" class="font-bold text-slate-500 py-2">Cancel</button>
            </div>
        </form>
    </div>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-[2rem] p-6 md:p-10 w-full max-w-lg shadow-2xl space-y-6 border dark:border-slate-700 border-slate-100">
            <h3 class="text-2xl font-bold text-orange-600">Event Details</h3>
            <div class="space-y-5">
                <div><label class="text-xs font-bold uppercase text-slate-400">Client Name</label><input type="text" id="ev-client" required class="w-full bg-transparent border-b border-slate-500/20 py-3 font-bold outline-none focus:border-orange-500"></div>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-xs font-bold uppercase text-slate-400">Date</label><input type="date" id="ev-date" required class="w-full bg-transparent border-b border-slate-500/20 py-3 outline-none"></div>
                    <div><label class="text-xs font-bold uppercase text-slate-400">Billing (₹)</label><input type="number" id="ev-billing" required class="w-full bg-transparent border-b border-slate-500/20 py-3 font-bold text-orange-600 outline-none"></div>
                </div>
            </div>
            <button type="submit" class="bg-[#EA580C] text-white w-full py-4 rounded-2xl font-bold active:scale-95 transition-all">Save Event</button>
        </form>
    </div>

    <script>
        // --- DATA & STATE ---
        const DB_KEYS = { EVENTS: 'ff_events_v2', EXPENSES: 'ff_exp_v2', PAYMENTS: 'ff_pay_v2', VENDORS: 'ff_ven_v2' };
        const expenseHeadsDB = {
            "Raw Material": ["Grocery", "Vegetables", "Fruits", "Dairy"],
            "Labour": ["Waiters", "Cooks", "Cleaning"],
            "Logistics": ["Transport", "Gas"]
        };

        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || [],
            vendors: JSON.parse(localStorage.getItem(DB_KEYS.VENDORS)) || []
        };

        // --- THEME & UI ---
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            if(window.innerWidth < 768) toggleSidebar();
            renderAll();
        }

        function setAmt(v) { document.getElementById('ex-amount').value = v; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function showToast(m) { 
            const t = document.getElementById('toast'); t.querySelector('#toast-msg').innerText = m;
            t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); 
        }

        // --- HANDLERS ---
        function handleExpenseSubmit(e) {
            e.preventDefault();
            const data = { id: "EX"+Date.now(), eventId: document.getElementById('ex-event').value, category: document.getElementById('ex-cat').value, head: document.getElementById('ex-head').value, amount: parseFloat(document.getElementById('ex-amount').value), date: document.getElementById('ex-date').value, vendorId: document.getElementById('ex-vendor').value };
            state.expenses.push(data);
            save(); closeModals(); showToast("Expense Recorded");
        }

        function handleEventSubmit(e) {
            e.preventDefault();
            const data = { id: "EV"+Date.now(), client: document.getElementById('ev-client').value, date: document.getElementById('ev-date').value, billing: parseFloat(document.getElementById('ev-billing').value) };
            state.events.push(data);
            save(); closeModals(); showToast("Event Added");
        }

        function save() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            renderAll();
        }

        function updateHeads(catId, subCatId) {
            const cat = document.getElementById(catId).value;
            const sub = document.getElementById(subCatId);
            sub.innerHTML = (expenseHeadsDB[cat] || []).map(h => `<option value="${h}">${h}</option>`).join('');
        }

        // --- RENDERERS ---
        function renderExpenses() {
            const list = state.expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('expenses-table-body').innerHTML = list.map(ex => {
                const ev = state.events.find(e => e.id === ex.eventId);
                return `<tr class="dark:border-slate-800 border-slate-100 border-b">
                    <td data-label="Date" class="p-4 font-mono text-xs text-slate-500">${ex.date}</td>
                    <td data-label="Event" class="p-4 font-bold text-sm">${ev?.client || '---'}</td>
                    <td data-label="Head" class="p-4 uppercase text-[10px] font-bold opacity-60">${ex.head}</td>
                    <td data-label="Amount" class="p-4 font-bold text-red-500">₹${ex.amount.toLocaleString()}</td>
                    <td class="p-4 text-right actions-cell"><button onclick="deleteItem('expenses', '${ex.id}')" class="text-red-500 font-bold px-3 py-1">Delete</button></td>
                </tr>`;
            }).join('') || '<tr><td colspan="5" class="p-10 text-center text-slate-400">No expenses.</td></tr>';
        }

        function renderDashboard() {
            const bill = state.events.reduce((s, e) => s + e.billing, 0);
            const exp = state.expenses.reduce((s, e) => s + e.amount, 0);
            document.getElementById('stats-grid').innerHTML = `
                <div class="card p-5"><p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Portfolio</p><p class="text-xl font-bold">₹${bill.toLocaleString()}</p></div>
                <div class="card p-5"><p class="text-xs font-bold text-red-500 uppercase tracking-widest mb-1">Expenses</p><p class="text-xl font-bold">₹${exp.toLocaleString()}</p></div>
                <div class="card p-5 bg-[#EA580C] text-white border-none shadow-lg shadow-orange-600/20 lg:col-span-2">
                    <p class="text-xs font-bold uppercase opacity-80 mb-1">Total Profit</p><p class="text-2xl font-bold">₹${(bill-exp).toLocaleString()}</p>
                </div>
            `;
        }

        function openExpenseModal() {
            const m = document.getElementById('expense-modal');
            document.getElementById('ex-event').innerHTML = state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('');
            document.getElementById('ex-cat').innerHTML = Object.keys(expenseHeadsDB).map(c => `<option value="${c}">${c}</option>`).join('');
            updateHeads('ex-cat', 'ex-head');
            m.classList.add('active');
        }

        function openEventModal() { document.getElementById('event-modal').classList.add('active'); }

        function deleteItem(type, id) { if(confirm("Confirm Delete?")) { state[type] = state[type].filter(x => x.id !== id); save(); } }
        function renderAll() { renderDashboard(); renderExpenses(); }

        // --- INIT ---
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.className = savedTheme;
        document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '🌙' : '☀️';
        renderAll();
    </script>
</body>
</html>
