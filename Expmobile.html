<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flavor Fusion Pro | Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .dark body { background-color: #0F172A; color: #F1F5F9; }
        .light body { background-color: #F8FAFC; color: #0F172A; }

        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); width: 280px; z-index: 100; }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }
            #sidebar-overlay.open { display: block; }
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { 
                display: flex; flex-direction: column; margin-bottom: 1.25rem; 
                padding: 1.25rem; border-radius: 1.25rem; border: 1px solid #334155;
                background-color: #1E293B; 
            }
            .light .responsive-table tr { background-color: #FFFFFF; border-color: #E2E8F0; }
            .responsive-table td { display: flex; justify-content: space-between; padding: 8px 0; border: none !important; }
            .responsive-table td::before { content: attr(data-label); font-weight: 700; color: #94A3B8; text-transform: uppercase; font-size: 0.65rem; }
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="toast" class="fixed bottom-6 right-6 hidden z-[200] bg-slate-900 border border-slate-700 text-white px-6 py-4 rounded-2xl shadow-2xl font-semibold flex items-center gap-3">
        <span id="toast-msg">Success</span>
    </div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 border-r bg-white dark:bg-[#0F172A] border-slate-200 dark:border-slate-800 flex flex-col overflow-y-auto">
        <div class="p-6 border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="h-10 w-auto object-contain" onerror="this.src='https://via.placeholder.com/40?text=FF'">
                <div>
                    <h1 class="text-lg font-bold text-orange-600 leading-none tracking-tighter">FLAVOR FUSION</h1>
                    <p class="text-[10px] font-semibold text-slate-400 uppercase mt-1">Business Engine</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500"><span>📊</span> Dashboard</button>
            <button onclick="switchTab('events')" id="nav-events" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500"><span>📅</span> Events</button>
            <button onclick="switchTab('expenses')" id="nav-expenses" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500"><span>💸</span> Expenses</button>
            <button onclick="switchTab('vendors')" id="nav-vendors" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500"><span>🤝</span> Vendors</button>
        </nav>
    </aside>

    <header class="lg:ml-64 h-16 border-b bg-white/80 dark:bg-[#0F172A]/80 border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 md:px-8 sticky top-0 backdrop-blur-md z-40">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-600 dark:text-slate-300 text-2xl">☰</button>
            <h2 id="page-title" class="font-bold text-lg">Dashboard</h2>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-500/10 text-xl" id="theme-icon">🌙</button>
    </header>

    <main class="lg:ml-64 p-4 md:p-8">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="stats-grid"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white dark:bg-[#1E293B] rounded-2xl border border-slate-200 dark:border-slate-800 p-6">
                    <h2 class="text-lg font-bold mb-4 text-amber-600">Pending Collections</h2>
                    <div id="overdue-list" class="space-y-3 text-sm"></div>
                </div>
                <div class="bg-white dark:bg-[#1E293B] rounded-2xl border border-slate-200 dark:border-slate-800 p-6 space-y-3">
                    <button onclick="openEventModal()" class="w-full bg-[#EA580C] text-white py-4 rounded-xl font-bold active:scale-95 transition-all text-sm uppercase tracking-widest">+ Add Event</button>
                    <button onclick="openExpenseModal()" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold active:scale-95 transition-all text-sm uppercase tracking-widest">+ Add Expense</button>
                </div>
            </div>
        </section>

        <section id="events" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Portfolio</h2>
                <button onclick="openEventModal()" class="bg-[#EA580C] text-white px-6 py-3 rounded-xl font-bold text-sm">+ Add Event</button>
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="expenses" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Ledger</h2>
                <button onclick="openExpenseModal()" class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold text-sm">+ Add Expense</button>
            </div>
            <div class="rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
                <table class="w-full responsive-table">
                    <thead class="bg-slate-500/5 text-[10px] font-black uppercase text-slate-500 border-b dark:border-slate-800">
                        <tr><th class="p-4 text-left">Date</th><th class="p-4 text-left">Event</th><th class="p-4 text-left">Head</th><th class="p-4 text-left">Amount</th><th class="p-4 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="expenses-table-body" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                </table>
            </div>
        </section>

        <section id="vendors" class="tab-content space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Vendors</h2>
                <button onclick="openVendorModal()" class="bg-slate-800 dark:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold text-sm">+ Add Vendor</button>
            </div>
            <div id="vendors-list" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="event-detail" class="tab-content"></section>
    </main>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-[2.5rem] p-8 md:p-12 w-full max-w-lg shadow-2xl space-y-6 border dark:border-slate-700">
            <h3 class="text-2xl font-bold text-orange-600">Event Details</h3>
            <input type="hidden" id="edit-event-id">
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Client Name</label><input type="text" id="ev-client" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white focus:border-orange-500"></div>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Date</label><input type="date" id="ev-date" required class="w-full bg-transparent border-b border-slate-500/30 py-3 outline-none text-slate-800 dark:text-white"></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Billing (₹)</label><input type="number" id="ev-billing" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold text-orange-600 text-2xl outline-none"></div>
                </div>
            </div>
            <div class="flex flex-col gap-3 pt-4">
                <button type="submit" class="w-full bg-[#EA580C] text-white py-4 rounded-2xl font-bold active:scale-95 transition-all uppercase tracking-widest">Save Event</button>
                <button type="button" onclick="closeModals()" class="w-full font-bold text-slate-500 py-2">Cancel</button>
            </div>
        </form>
    </div>

    <div id="vendor-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleVendorSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-[2.5rem] p-8 md:p-12 w-full max-w-lg shadow-2xl space-y-6 border dark:border-slate-700">
            <h3 class="text-2xl font-bold text-slate-800 dark:text-white">Register Vendor</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Business Name</label><input type="text" id="vn-name" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></div>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Category</label><select id="vn-cat" onchange="updateHeads('vn-cat', 'vn-head')" required class="w-full bg-transparent border-b border-slate-500/30 py-3 outline-none text-slate-800 dark:text-white"></select></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Specialty</label><select id="vn-head" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></select></div>
                </div>
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Phone</label><input type="tel" id="vn-phone" class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white" placeholder="9876543210"></div>
            </div>
            <div class="flex flex-col gap-3 pt-4">
                <button type="submit" class="w-full bg-slate-800 dark:bg-slate-700 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all uppercase tracking-widest">Register</button>
                <button type="button" onclick="closeModals()" class="w-full font-bold text-slate-500 py-2">Cancel</button>
            </div>
        </form>
    </div>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-[2.5rem] p-8 md:p-12 w-full max-w-lg shadow-2xl space-y-6 border dark:border-slate-700">
            <h3 class="text-2xl font-bold text-red-500">Expense Entry</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Event</label><select id="ex-event" class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></select></div>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Category</label><select id="ex-cat" onchange="updateHeads('ex-cat', 'ex-head')" class="w-full bg-transparent border-b border-slate-500/30 py-3 outline-none text-slate-800 dark:text-white"></select></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Sub-Head</label><select id="ex-head" class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></select></div>
                </div>
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Amount (₹)</label><input type="number" id="ex-amount" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold text-red-500 text-4xl outline-none"></div>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Date</label><input type="date" id="ex-date" required class="w-full bg-transparent border-b border-slate-500/30 py-3 outline-none text-slate-800 dark:text-white"></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Vendor</label><select id="ex-vendor" class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold text-orange-500 outline-none"></select></div>
                </div>
            </div>
            <button type="submit" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold uppercase tracking-widest">Save Expense</button>
        </form>
    </div>

    <script>
        const DB_KEYS = { EVENTS: 'ff_events_v2', EXPENSES: 'ff_exp_v2', VENDORS: 'ff_ven_v2' };
        const headsDB = {
            "Raw Material": ["Grocery", "Vegetables", "Dairy", "Meat"],
            "Labour": ["Waiters", "Cooks", "Cleaner"],
            "Operations": ["Transport", "Gas", "Generator"]
        };

        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || [],
            vendors: JSON.parse(localStorage.getItem(DB_KEYS.VENDORS)) || []
        };

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            const mode = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', mode);
            document.getElementById('theme-icon').innerText = mode === 'dark' ? '🌙' : '☀️';
            renderAll();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            document.querySelectorAll('#sidebar button').forEach(b => b.classList.remove('bg-orange-600/10', 'text-orange-500'));
            document.getElementById('nav-' + id)?.classList.add('bg-orange-600/10', 'text-orange-500');
            if(window.innerWidth < 768 && document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
            renderAll();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function showToast(m) { const t = document.getElementById('toast'); t.querySelector('#toast-msg').innerText = m; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }

        function save() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            localStorage.setItem(DB_KEYS.VENDORS, JSON.stringify(state.vendors));
            renderAll();
        }

        function handleEventSubmit(e) {
            e.preventDefault();
            const data = { id: "EV"+Date.now(), client: document.getElementById('ev-client').value, date: document.getElementById('ev-date').value, billing: parseFloat(document.getElementById('ev-billing').value) };
            state.events.push(data);
            save(); closeModals(); showToast("Event Added");
        }

        function handleVendorSubmit(e) {
            e.preventDefault();
            const data = { id: "VN"+Date.now(), name: document.getElementById('vn-name').value, category: document.getElementById('vn-cat').value, head: document.getElementById('vn-head').value, phone: document.getElementById('vn-phone').value };
            state.vendors.push(data);
            save(); closeModals(); showToast("Vendor Registered");
        }

        function handleExpenseSubmit(e) {
            e.preventDefault();
            const data = { id: "EX"+Date.now(), eventId: document.getElementById('ex-event').value, head: document.getElementById('ex-head').value, amount: parseFloat(document.getElementById('ex-amount').value), date: document.getElementById('ex-date').value, vendorId: document.getElementById('ex-vendor').value };
            state.expenses.push(data);
            save(); closeModals(); showToast("Expense Recorded");
        }

        function updateHeads(catId, headId) {
            const cat = document.getElementById(catId).value;
            document.getElementById(headId).innerHTML = (headsDB[cat] || []).map(h => `<option value="${h}">${h}</option>`).join('');
        }

        function openEventModal() { document.getElementById('event-modal').classList.add('active'); }
        function openVendorModal() {
            const m = document.getElementById('vendor-modal');
            document.getElementById('vn-cat').innerHTML = Object.keys(headsDB).map(c => `<option value="${c}">${c}</option>`).join('');
            updateHeads('vn-cat', 'vn-head');
            m.classList.add('active');
        }
        function openExpenseModal() {
            const m = document.getElementById('expense-modal');
            document.getElementById('ex-event').innerHTML = state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('');
            document.getElementById('ex-cat').innerHTML = Object.keys(headsDB).map(c => `<option value="${c}">${c}</option>`).join('');
            updateHeads('ex-cat', 'ex-head');
            document.getElementById('ex-vendor').innerHTML = `<option value="">Generic</option>` + state.vendors.map(v => `<option value="${v.id}">${v.name}</option>`).join('');
            document.getElementById('ex-date').value = new Date().toISOString().split('T')[0];
            m.classList.add('active');
        }

        function renderDashboard() {
            const bill = state.events.reduce((s, e) => s + e.billing, 0);
            const exp = state.expenses.reduce((s, e) => s + e.amount, 0);
            document.getElementById('stats-grid').innerHTML = `
                <div class="bg-white dark:bg-[#1E293B] p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Portfolio</p><p class="text-xl font-bold">₹${bill.toLocaleString()}</p></div>
                <div class="bg-white dark:bg-[#1E293B] p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm"><p class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Expenses</p><p class="text-xl font-bold text-red-500">₹${exp.toLocaleString()}</p></div>
                <div class="bg-orange-600 p-5 rounded-2xl shadow-lg text-white md:col-span-2"><p class="text-[10px] font-bold uppercase opacity-80">Net Profit</p><p class="text-2xl font-bold">₹${(bill-exp).toLocaleString()}</p></div>
            `;
        }

        function renderExpenses() {
            const list = state.expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
            document.getElementById('expenses-table-body').innerHTML = list.map(ex => {
                const ev = state.events.find(e => e.id === ex.eventId);
                return `<tr class="table-row border-b dark:border-slate-800 border-slate-100">
                    <td data-label="Date" class="p-4 font-mono text-xs text-slate-500">${ex.date}</td>
                    <td data-label="Event" class="p-4 font-bold">${ev?.client || '---'}</td>
                    <td data-label="Head" class="p-4 uppercase text-[10px] font-bold text-slate-400">${ex.head}</td>
                    <td data-label="Amount" class="p-4 font-bold text-red-500">₹${ex.amount.toLocaleString()}</td>
                    <td class="p-4 text-right"><button onclick="deleteItem('expenses', '${ex.id}')" class="text-red-500 font-bold">×</button></td>
                </tr>`;
            }).join('') || '<tr><td colspan="5" class="p-10 text-center text-slate-400">No records found.</td></tr>';
        }

        function deleteItem(type, id) { if(confirm("Confirm Delete?")) { state[type] = state[type].filter(x => x.id !== id); save(); } }
        function renderAll() { renderDashboard(); renderExpenses(); }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.className = savedTheme;
        document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '🌙' : '☀️';
        switchTab('dashboard');
    </script>
</body>
</html>
