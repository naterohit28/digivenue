<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flavor Fusion | Business Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; -webkit-tap-highlight-color: transparent; }
        
        /* Explicit Theme Colors */
        .dark body { background-color: #0F172A; color: #F1F5F9; }
        .light body { background-color: #F8FAFC; color: #0F172A; }

        /* Sidebar Visibility Fixes */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); width: 280px; z-index: 100; }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }
            #sidebar-overlay.open { display: block; }
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Responsive Cards for Mobile */
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { 
                display: flex; flex-direction: column; margin-bottom: 1.25rem; 
                padding: 1.25rem; border-radius: 1.25rem; border: 1px solid transparent;
                background-color: #1E293B; 
            }
            .light .responsive-table tr { background-color: #FFFFFF; border-color: #E2E8F0; }
            .responsive-table td { display: flex; justify-content: space-between; padding: 8px 0; border: none !important; }
            .responsive-table td::before { content: attr(data-label); font-weight: 700; color: #94A3B8; text-transform: uppercase; font-size: 0.65rem; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="toast" class="fixed bottom-6 right-6 hidden z-[200] bg-slate-900 border border-slate-700 text-white px-6 py-4 rounded-2xl shadow-2xl font-semibold flex items-center gap-3">
        <span id="toast-msg">Success</span>
    </div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 border-r bg-white dark:bg-[#0F172A] border-slate-200 dark:border-slate-800 flex flex-col overflow-y-auto">
        <div class="p-6 border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="h-10 w-auto object-contain" onerror="this.src='https://via.placeholder.com/40?text=FF'">
                <div>
                    <h1 class="text-lg font-bold text-orange-600 leading-none">FLAVOR FUSION</h1>
                    <p class="text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase mt-1">Enterprise Control</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500">
                <span>📊</span> Dashboard
            </button>
            <button onclick="switchTab('events')" id="nav-events" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500">
                <span>📅</span> Events
            </button>
            <button onclick="switchTab('expenses')" id="nav-expenses" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500">
                <span>💸</span> Expenses
            </button>
            <button onclick="switchTab('vendors')" id="nav-vendors" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-slate-600 dark:text-slate-300 hover:bg-orange-600/10 hover:text-orange-500">
                <span>🤝</span> Vendors
            </button>
        </nav>
        
        <div class="p-6 text-[9px] text-slate-400 font-bold opacity-50 uppercase tracking-tighter">Powered by Flavor Fusion v4.7</div>
    </aside>

    <header class="lg:ml-64 h-16 border-b bg-white/80 dark:bg-[#0F172A]/80 border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 md:px-8 sticky top-0 backdrop-blur-md z-40">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-600 dark:text-slate-300 text-2xl">☰</button>
            <h2 id="page-title" class="font-bold text-lg tracking-tight">Dashboard</h2>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-500/10 text-xl" id="theme-icon">🌙</button>
    </header>

    <main class="lg:ml-64 p-4 md:p-8">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="stats-grid"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white dark:bg-[#1E293B] rounded-2xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm">
                    <h2 class="text-lg font-bold mb-4 text-amber-600 flex items-center gap-2">
                        <span class="w-1.5 h-6 bg-amber-500 rounded-full"></span> Overdue Collections
                    </h2>
                    <div id="overdue-list" class="space-y-3"></div>
                </div>
                
                <div class="bg-white dark:bg-[#1E293B] rounded-2xl border border-slate-200 dark:border-slate-800 p-6 space-y-3">
                    <p class="text-[10px] font-bold uppercase text-slate-400">Operations</p>
                    <button onclick="openEventModal()" class="w-full bg-[#EA580C] text-white py-3 rounded-xl font-bold active:scale-95 transition-all">+ Add New Event</button>
                    <button onclick="openExpenseModal()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold active:scale-95 transition-all">+ Record Expense</button>
                </div>
            </div>
        </section>

        <section id="expenses" class="tab-content space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <h2 class="text-2xl font-black">Expenses</h2>
                <button onclick="openExpenseModal()" class="w-full md:w-auto bg-red-600 text-white px-6 py-3 rounded-xl font-bold">+ New Expense</button>
            </div>
            <div class="rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
                <table class="w-full responsive-table">
                    <thead class="bg-slate-500/5 text-[10px] font-bold uppercase text-slate-500 border-b dark:border-slate-800">
                        <tr><th class="p-4 text-left">Date</th><th class="p-4 text-left">Event</th><th class="p-4 text-left">Head</th><th class="p-4 text-left">Amount</th><th class="p-4 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="expenses-table-body" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                </table>
            </div>
        </section>

        <section id="events" class="tab-content space-y-6">
            <div class="flex justify-between items-center"><h2 class="text-2xl font-black">Events</h2><button onclick="openEventModal()" class="bg-[#EA580C] text-white px-6 py-3 rounded-xl font-bold">+ New Event</button></div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="vendors" class="tab-content space-y-6">
            <div class="flex justify-between items-center"><h2 class="text-2xl font-black">Vendors</h2><button onclick="openVendorModal()" class="bg-slate-800 dark:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold">+ Add Vendor</button></div>
            <div id="vendors-list" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

    </main>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white dark:bg-[#1E293B] rounded-[2.5rem] p-8 md:p-12 w-full max-w-lg shadow-2xl space-y-6 border dark:border-slate-700">
            <h3 class="text-2xl font-bold text-red-500">Record Expense</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold uppercase text-slate-400">Select Event</label><select id="ex-event" class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></select></div>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Category</label><select id="ex-cat" onchange="updateHeads('ex-cat', 'ex-head')" class="w-full bg-transparent border-b border-slate-500/30 py-3 outline-none text-slate-800 dark:text-white"></select></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Sub-Head</label><select id="ex-head" class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold outline-none text-slate-800 dark:text-white"></select></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-slate-400">Amount (₹)</label>
                    <input type="number" id="ex-amount" required class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold text-red-500 text-4xl outline-none">
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Date</label><input type="date" id="ex-date" required class="w-full bg-transparent border-b border-slate-500/30 py-3 outline-none text-slate-800 dark:text-white"></div>
                    <div><label class="text-[10px] font-bold uppercase text-slate-400">Vendor</label><select id="ex-vendor" class="w-full bg-transparent border-b border-slate-500/30 py-3 font-bold text-orange-500 outline-none"></select></div>
                </div>
            </div>
            <div class="flex flex-col gap-3 pt-4">
                <button type="submit" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all">Save Expense</button>
                <button type="button" onclick="closeModals()" class="w-full font-bold text-slate-500 py-2">Close</button>
            </div>
        </form>
    </div>

    <script>
        // --- LOGIC ---
        const DB_KEYS = { EVENTS: 'ff_events_v2', EXPENSES: 'ff_exp_v2', VENDORS: 'ff_ven_v2' };
        const expenseHeadsDB = {
            "Raw Material": ["Grocery", "Vegetables", "Dairy", "Meat"],
            "Labour": ["Waiters", "Cooks", "Cleaner"],
            "Operations": ["Transport", "Gas", "Generator"]
        };

        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || [],
            vendors: JSON.parse(localStorage.getItem(DB_KEYS.VENDORS)) || []
        };

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            const isLight = document.documentElement.classList.toggle('light');
            const theme = isDark ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
            document.getElementById('theme-icon').innerText = theme === 'dark' ? '🌙' : '☀️';
            renderAll(); // Re-render to apply theme specific table styling
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            
            // Update sidebar active state
            document.querySelectorAll('#sidebar button').forEach(btn => btn.classList.remove('bg-orange-600/10', 'text-orange-500'));
            document.getElementById('nav-' + id)?.classList.add('bg-orange-600/10', 'text-orange-500');

            if(window.innerWidth < 768) toggleSidebar();
            renderAll();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function renderExpenses() {
            const tbody = document.getElementById('expenses-table-body');
            tbody.innerHTML = state.expenses.sort((a,b) => new Date(b.date) - new Date(a.date)).map(ex => {
                const ev = state.events.find(e => e.id === ex.eventId);
                return `<tr class="table-row">
                    <td data-label="Date" class="p-4 font-mono text-[11px] text-slate-500">${ex.date}</td>
                    <td data-label="Event" class="p-4 font-bold text-slate-700 dark:text-slate-200">${ev?.client || '---'}</td>
                    <td data-label="Head" class="p-4 uppercase text-[10px] font-bold text-slate-400">${ex.head}</td>
                    <td data-label="Amount" class="p-4 font-bold text-red-500">₹${ex.amount.toLocaleString()}</td>
                    <td class="p-4 text-right actions-cell"><button onclick="deleteItem('expenses', '${ex.id}')" class="text-red-500 font-bold">Delete</button></td>
                </tr>`;
            }).join('') || '<tr><td colspan="5" class="p-10 text-center text-slate-400">No data found.</td></tr>';
        }

        function renderDashboard() {
            const bill = state.events.reduce((s, e) => s + e.billing, 0);
            const exp = state.expenses.reduce((s, e) => s + e.amount, 0);
            document.getElementById('stats-grid').innerHTML = `
                <div class="bg-white dark:bg-[#1E293B] p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Portfolio</p>
                    <p class="text-xl font-bold">₹${bill.toLocaleString()}</p>
                </div>
                <div class="bg-white dark:bg-[#1E293B] p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest mb-1">Expenses</p>
                    <p class="text-xl font-bold text-red-500">₹${exp.toLocaleString()}</p>
                </div>
                <div class="bg-orange-600 p-5 rounded-2xl shadow-lg shadow-orange-500/20 text-white lg:col-span-2">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Total Profit</p>
                    <p class="text-2xl font-bold">₹${(bill-exp).toLocaleString()}</p>
                </div>
            `;
        }

        function openExpenseModal() {
            const m = document.getElementById('expense-modal');
            document.getElementById('ex-event').innerHTML = state.events.map(e => `<option value="${e.id}">${e.client}</option>`).join('');
            document.getElementById('ex-cat').innerHTML = Object.keys(expenseHeadsDB).map(c => `<option value="${c}">${c}</option>`).join('');
            updateHeads('ex-cat', 'ex-head');
            m.classList.add('active');
        }

        function openEventModal() { document.getElementById('event-modal').classList.add('active'); }
        function openVendorModal() { document.getElementById('vendor-modal').classList.add('active'); }

        function deleteItem(type, id) { if(confirm("Are you sure?")) { state[type] = state[type].filter(x => x.id !== id); save(); } }
        function save() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            renderAll();
        }

        function updateHeads(catId, subCatId) {
            const cat = document.getElementById(catId).value;
            const sub = document.getElementById(subCatId);
            sub.innerHTML = (expenseHeadsDB[cat] || []).map(h => `<option value="${h}">${h}</option>`).join('');
        }

        function renderAll() { renderDashboard(); renderExpenses(); }

        // --- INIT ---
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.className = savedTheme;
        document.getElementById('theme-icon').innerText = savedTheme === 'dark' ? '🌙' : '☀️';
        switchTab('dashboard');
    </script>
</body>
</html>
