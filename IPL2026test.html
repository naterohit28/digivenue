<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 Fantasy League</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#f8fafc;font-family:'Inter',sans-serif;padding:20px;min-height:100vh}
    .wrap{max-width:1200px;margin:0 auto;background:rgba(30,41,59,0.7);backdrop-filter:blur(10px);border-radius:20px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 25px 50px -12px rgba(0,0,0,0.6);overflow:hidden;padding:30px}
    .header{text-align:center;margin-bottom:25px}
    .header h1{font-family:'Poppins',sans-serif;font-size:32px;font-weight:800;background:linear-gradient(to right,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:2px}
    .banner{display:inline-block;margin-top:12px;background:rgba(220,38,38,0.1);border:1px solid rgba(239,68,68,0.5);color:#fca5a5;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600}
    .tab-bar{display:flex;gap:10px;overflow-x:auto;padding-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:25px}
    .tab-btn{background:rgba(255,255,255,0.05);color:#94a3b8;border:1px solid rgba(255,255,255,0.1);padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-size:14px}
    .tab-btn.active{background:rgba(251,191,36,0.1);color:#fbbf24;border-color:#fbbf24}
    
    /* Table & Leaderboard Styles (Kept as per successful version) */
    .tw{overflow-x:auto;background:rgba(15,23,42,0.6);border-radius:12px;border:1px solid rgba(255,255,255,0.05);max-height:70vh}
    table{width:100%;border-collapse:separate;border-spacing:0;text-align:left;white-space:nowrap}
    th,td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;color:#e2e8f0}
    th{background:#0f172a;color:#fbbf24;font-weight:600;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(255,255,255,0.1)}
    .sc1{position:sticky;left:0;background:#1e293b;z-index:5;font-weight:600;min-width:170px}
    .sc2{position:sticky;left:170px;background:#1e293b;z-index:5;font-weight:800;color:#fbbf24;min-width:100px;border-right:2px solid rgba(255,255,255,0.1);text-align:center}
    th.sc1,th.sc2{z-index:15;background:#0f172a}

    /* Report Card - Visibility & Alignment Fixes */
    .rc-container { max-width: 900px; margin: 0 auto; } /* Centered alignment fix */
    .rc-bar{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:20px}
    .rcg{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
    .rcl{font-size:11px;font-weight:700;text-transform:uppercase;color:#94a3b8}
    .rcsel{background:#0f172a;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:11px;border-radius:10px;width:100%;outline:none}
    .rcbtn{height:44px;padding:0 26px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0f172a;border:none;border-radius:10px;font-weight:700;cursor:pointer}
    
    .rccard{background:rgba(15,23,42,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:16px;overflow:hidden}
    .rchero{background:rgba(251,191,36,0.05);padding:25px;display:flex;align-items:center;gap:20px}
    .rcav{width:60px;height:60px;border-radius:50%;background:#fbbf24;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#0f172a}
    .rchn{font-size:24px;font-weight:700;color:#fff}
    .rchr{margin-left:auto;text-align:right}
    .rcrn{font-size:40px;font-weight:800;color:#fbbf24;line-height:1}

    .cw{padding:20px 25px;border-bottom:1px solid rgba(255,255,255,0.05)}
    .ct{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .chips{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px}
    .chip{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;text-align:center;min-width:70px;cursor:pointer}
    .chip.on{border-color:#fbbf24;background:rgba(251,191,36,0.15)}
    
    /* Brighter color codes for visibility */
    .rl{flex:1;font-size:14px;color:#cbd5e1;margin-left:12px} /* Brighter gray for labels */
    .rv{font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;color:#f8fafc;text-align:right;min-width:110px} /* White for values */
    .rv.dim{color:#94a3b8;font-weight:400} /* Brighter dash */
    .rv.pos{color:#4ade80}.rv.neg{color:#f87171}.rv.gold{color:#fbbf24}
    
    .gh{background:rgba(255,255,255,0.03);padding:10px 25px;font-size:11px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:1px}
    .rr{display:flex;align-items:center;padding:14px 25px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .rr.sub{background:rgba(251,191,36,0.03)}
    .rr.tot{background:rgba(251,191,36,0.1);padding:20px 25px}
    .rr.tot .rl{font-size:16px;font-weight:700;color:#fbbf24}
    .rv.grand{font-size:28px;color:#fbbf24}

    .loading,.spinner{display:flex;justify-content:center;align-items:center}.spinner{width:30px;height:30px;border:3px solid #334155;border-top-color:#fbbf24;border-radius:50%;animation:spin 1s infinite linear}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>IPL 2026 Fantasy League</h1>
    <div class="banner" id="banner">Data Updating...</div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="area"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzm3ScYdmSRgcXhMVB3xv9fKVdLVfUl3w7jlyY03byNZZtvFnw8ZKydLglbpo3XJH3TSQ/exec';
const SHEET_ID = '1SErG-urDF7KqwU5inV6wwaqJfADXjY73Xss5BRDYY-Q';
const TABS = [
  {name:'Leaderboard', key:'leaderboard', type:'lb'},
  {name:'Your Report Card', key:'reportcard', type:'rc'},
  {name:'Match Scores', key:'matchscores', type:'dt'},
  {name:'SS Scores', key:'ssscores', type:'dt'},
  {name:'Daily Score', key:'dailyscore', type:'dt'},
  {name:'IPL Player Points', key:'playerpoints', type:'dt'},
];

const LC={rank:1,name:3,total:13,match:4,bonus:5,star:6,duo:7,resurrector:8,risk:9,special:10,superBonus:11,superSelector:12};

let cur=TABS[0], players=[], rcName='', rcMatch=7;

async function load(){
  document.getElementById('area').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const d = await fetch(`${API}?tab=${cur.key}`).then(r=>r.json());
    if(cur.type==='lb'){ buildPlayers(d.rows); renderLB(d.rows); }
    else if(cur.type==='rc'){ renderRCShell(); }
    else renderDT(d.rows);
  } catch(e){ document.getElementById('area').innerHTML='Error Loading Data'; }
}

function buildPlayers(rows){
  players = rows.filter(r => parseInt(r[LC.rank]) > 0).map(r => ({
    rank: parseInt(r[LC.rank]), name: String(r[LC.name]).trim(), total: pn(r[LC.total])
  })).sort((a,b)=>a.rank-b.rank);
}

function renderLB(rows){
  // Banner Update
  const bRow = rows.find(r => String(r).includes('Match'));
  if(bRow) document.getElementById('banner').innerText = 'Data Updated till ' + String(bRow).match(/Match \d+/)[0];

  let h = '<div class="lb">';
  rows.forEach(row => {
    const rn = parseInt(row[LC.rank]);
    if(isNaN(rn)) return;
    h += `<div class="pc"><div class="ph"><div class="pl"><div class="rb ${rn<=3?'r1':''}">${rn}</div><div class="pname">${row[LC.name]}</div></div><div class="ptot">${fmt(row[LC.total])}</div></div>
    <div class="sg">${[['Match',row[LC.match]],['Bonus',row[LC.bonus]],['Star',row[LC.star]],['Duo',row[LC.duo]],['Resurrect',row[LC.resurrector]],['Risk',row[LC.risk]],['Special',row[LC.special]],['Selector',row[LC.superSelector]]].map(([l,v])=>`<div class="sb"><span class="sl">${l}</span><span class="sv">${fmt(v)}</span></div>`).join('')}</div></div>`;
  });
  document.getElementById('area').innerHTML = h + '</div>';
}

function renderDT(rows){
  const isP = cur.key==='playerpoints';
  let h = '<div class="tw"><table><thead><tr>';
  const hdrs = rows[0];
  hdrs.forEach((hd,i)=>{
    if(isP ? (i<2) : (i===0 || i===3)) return;
    let cls = '';
    if(isP){ if(i===2)cls='sc1'; if(i===3)cls='sc2'; }
    else { if(i===1)cls='sc1'; if(i===2)cls='sc2'; }
    h += `<th class="${cls}">${hd||''}</th>`;
  });
  h += '</tr></thead><tbody>';
  rows.slice(1).forEach(row => {
    h += '<tr>';
    row.forEach((c,i)=>{
      if(isP ? (i<2) : (i===0 || i===3)) return;
      let cls = '';
      if(isP){ if(i===2)cls='sc1'; if(i===3)cls='sc2'; }
      else { if(i===1)cls='sc1'; if(i===2)cls='sc2'; }
      h += `<td class="${cls}">${c||'—'}</td>`;
    });
    h += '</tr>';
  });
  document.getElementById('area').innerHTML = h + '</table></div>';
}

function renderRCShell(){
  let names = players.map(p=>`<option value="${p.name}" ${p.name===rcName?'selected':''}>${p.name}</option>`).join('');
  let matches = ''; for(let i=1;i<=74;i++) matches+=`<option value="${i}" ${i===rcMatch?'selected':''}>Match ${i}</option>`;
  
  document.getElementById('area').innerHTML = `
    <div class="rc-container">
      <div class="rc-bar">
        <div class="rcg"><div class="rcl">Participant</div><select class="rcsel" id="selN">${names}</select></div>
        <div class="rcg"><div class="rcl">Match No.</div><select class="rcsel" id="selM">${matches}</select></div>
        <button class="rcbtn" onclick="fetchRC()">▶ View Report Card</button>
      </div>
      <div id="rcArea"></div>
    </div>`;
}

async function fetchRC(){
  rcName = document.getElementById('selN').value;
  rcMatch = document.getElementById('selM').value;
  document.getElementById('rcArea').innerHTML = '<div class="spinner"></div>';
  const d = await fetch(`${API}?tab=reportcard`).then(r=>r.json());
  
  // Find player data in Report Card sheet
  const g = d.rows;
  let mCol = -1;
  for(let c=0; c<g[1].length; c++) { if(String(g[2][c]) == rcMatch) mCol = c; }
  
  const mapping = {
    'Match Points': 4, 'Bonus Points': 5, 'Risk Incentive': 6, 'Special Incentive': 7, 'Match Related Points': 9,
    'SP Individual Performance': 12, 'SP Points (incl link effect)': 15,
    'D1 Individual Performance': 17, 'D2 Individual Performance': 18, 'DD Points (incl prem. effect)': 21,
    'THE RESURRECTOR': 25, 'Super Selector': 41
  };

  let rowsHtml = '';
  for(let label in mapping) {
    let val = mCol > -1 ? g[mapping[label]][mCol] : '—';
    let isSub = label.includes('Points') || label === 'THE RESURRECTOR' || label === 'Super Selector';
    rowsHtml += `<div class="rr ${isSub?'sub':''}"><span class="rl">${label}</span><span class="rv">${fmt(val)}</span></div>`;
  }

  const pl = players.find(p=>p.name===rcName);
  document.getElementById('rcArea').innerHTML = `
    <div class="rccard">
      <div class="rchero">
        <div class="rcav">${rcName[0]}</div>
        <div><div class="rchn">${rcName}</div><div style="color:#94a3b8">Match ${rcMatch}</div></div>
        <div class="rchr"><div class="rcrn">#${pl?pl.rank:'—'}</div><div style="font-size:10px;text-transform:uppercase">Rank</div></div>
      </div>
      ${rowsHtml}
      <div class="rr tot"><span class="rl">Season Total</span><span class="rv grand">${pl?fmt(pl.total):'—'}</span></div>
    </div>`;
}

function pn(v){ if(!v)return 0; return parseFloat(String(v).replace
