<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 Fantasy League</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#f8fafc;font-family:'Inter',sans-serif;padding:15px;min-height:100vh}
    .wrap{max-width:1300px;margin:0 auto;background:rgba(30,41,59,0.7);backdrop-filter:blur(10px);border-radius:12px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 40px rgba(0,0,0,0.5);padding:15px}
    .header{text-align:center;margin-bottom:15px}
    .header h1{font-family:'Poppins',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(to right,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:1px}
    .banner{display:inline-block;margin-top:5px;background:rgba(220,38,38,0.1);border:1px solid rgba(239,68,68,0.5);color:#fca5a5;padding:4px 12px;border-radius:10px;font-size:11px;font-weight:600}
    .tab-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:15px}
    .tab-btn{background:rgba(255,255,255,0.05);color:#94a3b8;border:1px solid rgba(255,255,255,0.1);padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;white-space:nowrap;transition:0.2s;font-size:12px;flex-shrink:0}
    .tab-btn.active{background:rgba(251,191,36,0.1);color:#fbbf24;border-color:#fbbf24}
    .tw{overflow:auto;background:rgba(15,23,42,0.6);border-radius:8px;border:1px solid rgba(255,255,255,0.05);max-height:75vh}
    table{width:100%;border-collapse:separate;border-spacing:0;text-align:left;white-space:nowrap}
    th,td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;color:#f8fafc}
    th{background:#0f172a;color:#fbbf24;font-weight:700;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(255,255,255,0.1);text-transform:uppercase;font-size:10px;letter-spacing:.5px}
    .sc1{position:sticky;left:0;background:#1e293b;z-index:5;font-weight:600;min-width:180px}
    .sc2{position:sticky;left:180px;background:#1e293b;z-index:5;font-weight:800;color:#fbbf24;min-width:90px;border-right:1px solid rgba(255,255,255,0.1);text-align:center}
    th.sc1,th.sc2{z-index:15;background:#0f172a}
    .pos{color:#4ade80}.neg{color:#f87171}.v-gold{color:#fbbf24;font-weight:800}.v-dim{color:#475569}

    /* ── REPORT CARD STYLING ── */
    .rc-wrap{max-width:860px;margin:0 auto}
    .rc-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
    .rcsel{background:#0f172a;border:1px solid rgba(255,255,255,0.15);color:#f8fafc;padding:9px 12px;border-radius:8px;font-size:13px;width:100%;outline:none}
    .rcbtn{height:40px;padding:0 22px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0f172a;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
    .rccard{background:rgba(15,23,42,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden}
    .rchero{background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(245,158,11,0.04));border-bottom:1px solid rgba(251,191,36,0.15);padding:14px 18px;display:flex;align-items:center;gap:14px}
    .rcav{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#d97706);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#0f172a}
    .rchn{font-size:18px;font-weight:700;color:#f8fafc}
    .rcrn{font-family:'Poppins',sans-serif;font-size:32px;font-weight:800;color:#fbbf24;line-height:1}
    .rchr{margin-left:auto;text-align:right}
    .rr{display:flex;align-items:center;padding:9px 18px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .ri{width:22px;font-size:13px;text-align:center;flex-shrink:0}
    .rl{flex:1;font-size:12px;color:#94a3b8;margin-left:8px}
    .rd{font-size:11px;color:#cbd5e1;text-align:right;margin-right:15px;font-style:italic;max-width:250px;overflow:hidden;text-overflow:ellipsis}
    .rv{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:#ffffff;text-align:right;min-width:70px}
    .gh{background:rgba(251,191,36,0.07);padding:6px 18px;font-size:9px;font-weight:800;text-transform:uppercase;color:#fbbf24;letter-spacing:1.5px}
    .rr.sub{background:rgba(251,191,36,0.04)}
    .rr.tot{background:rgba(251,191,36,0.15);padding:12px 18px;border-top:2px solid rgba(251,191,36,0.2)}
    .rv.grand{font-size:24px;color:#fbbf24}
    .loading{text-align:center;padding:40px;color:#94a3b8}
    .spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,0.1);border-top-color:#fbbf24;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>IPL 2026 Fantasy League</h1>
    <div class="banner" id="banner">Syncing Scores...</div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="area"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzm3ScYdmSRgcXhMVB3xv9fKVdLVfUl3w7jlyY03byNZZtvFnw8ZKydLglbpo3XJH3TSQ/exec';
const SHEET_ID = '1SErG-urDF7KqwU5inV6wwaqJfADXjY73Xss5BRDYY-Q';

const TABS = [
  {name:'Leaderboard', key:'leaderboard', type:'lb'},
  {name:'Your Report Card', key:'reportcard', type:'rc'},
  {name:'Match Scores', key:'matchscores', type:'dt'},
  {name:'SS Scores', key:'ssscores', type:'dt'},
  {name:'Daily Score', key:'dailyscore', type:'dt'},
  {name:'IPL Player Points', key:'playerpoints', type:'dt'},
];

const RC_GROUPS = [
  {t:'🏏 Match Related', rows:[
    {k:'match_pts', i:'🏏', l:'Match Points', r:4},
    {k:'bonus_pts', i:'🎯', l:'Bonus Points', r:5},
    {k:'risk_inc', i:'⚡', l:'Risk Incentive', r:6},
    {k:'special_inc', i:'🎁', l:'Special Incentive', r:7},
    {k:'match_total', i:'➕', l:'Match Related Points', r:9, sub:1},
  ]},
  {t:'⭐ Star Performer', rows:[
    {k:'sp_name', i:'⭐', l:'Star Performer', r:12, dual:1},
    {k:'sp_pts', i:'⭐', l:'SP Points (incl link effect)', r:15, sub:1},
  ]},
  {t:'👥 Dynamic Duo', rows:[
    {k:'dd1_name', i:'👤', l:'Duo 1', r:17, dual:1},
    {k:'dd2_name', i:'👤', l:'Duo 2', r:18, dual:1},
    {k:'dd_pts', i:'👥', l:'DD Points (incl prem. effect)', r:21, sub:1},
  ]},
  {t:'🔁 The Resurrector', rows:[
    {k:'res1_name', i:'💀', l:'Ressurector 1', r:23, dual:1},
    {k:'res2_name', i:'💀', l:'Ressurector 2', r:24, dual:1},
    {k:'res_pts', i:'🔁', l:'THE RESURRECTOR', r:25, sub:1},
  ]},
  {t:'🔮 Super Selector', rows:[
    {k:'wk', i:'🧤', l:'Wicket Keeper', r:28, dual:1}, {k:'vc', i:'🏅', l:'Vice Captain', r:29, dual:1}, {k:'cap', i:'©️', l:'Captain', r:30, dual:1},
    {k:'b1', i:'🏏', l:'Bat 1', r:31, dual:1}, {k:'b2', i:'🏏', l:'Bat 2', r:32, dual:1}, {k:'b3', i:'🏏', l:'Bat 3', r:33, dual:1},
    {k:'bw1', i:'🏐', l:'Bow 1', r:34, dual:1}, {k:'bw2', i:'🏐', l:'Bow 2', r:35, dual:1}, {k:'bw3', i:'🏐', l:'Bow 3', r:36, dual:1},
    {k:'ar1', i:'🔄', l:'AR 1', r:37, dual:1}, {k:'ar2', i:'🔄', l:'AR 2', r:38, dual:1},
    {k:'p1', i:'▶️', l:'Play 1', r:39, dual:1}, {k:'p2', i:'▶️', l:'Play 2', r:40, dual:1},
    {k:'ss_pts', i:'🔮', l:'Super Selector Score', r:42, sub:1},
  ]},
];

let cur = TABS[0], players = [], rcName = '', rcMatch = 7;

async function loadContent() {
  document.getElementById('area').innerHTML = '<div class="loading"><div class="spinner"></div>Loading…</div>';
  try {
    const res = await fetch(`${API}?id=${SHEET_ID}&tab=${cur.key}`);
    const d = await res.json();
    if (d.status === "error") throw new Error(d.message);
    const rows = d.rows;

    if (cur.type === 'lb') { buildPlayers(rows); renderLB(rows); updateBanner(rows); }
    else if (cur.type === 'rc') { if(!players.length) await loadLBOnly(); renderRCShell(); }
    else renderDT(rows);
  } catch(e) { document.getElementById('area').innerHTML = '<div class="loading">Offline / Connection Error.</div>'; }
}

async function loadLBOnly(){
  const d = await fetch(`${API}?id=${SHEET_ID}&tab=leaderboard`).then(r=>r.json());
  buildPlayers(d.rows);
}

function updateBanner(rows) {
  const matchRow = rows.find(r => String(r).includes('Match'));
  if (matchRow) {
    const m = String(matchRow).match(/Match\s*#?\s*(\d+)/i);
    if (m) document.getElementById('banner').innerText = `Data Updated till Match ${m[1]}`;
  }
}

function renderTabs(){
  document.getElementById('tabBar').innerHTML = TABS.map(t => `<button class="tab-btn ${t.name===cur.name?'active':''}" onclick="go('${t.name}')">${t.name}</button>`).join('');
}

function buildPlayers(rows){
  players = rows.filter(r => r && !isNaN(parseInt(r[1]))).map(r => ({
    rank: parseInt(r[1]), name: String(r[3] || '').trim(), total: pn(r[13])
  })).sort((a,b) => a.rank - b.rank);
}

function renderLB(rows){
  let h = `<div class="tw"><table><thead><tr><th class="sc1">Rank & Name</th><th class="sc2">Total</th><th>Match</th><th>Bonus</th><th>Star</th><th>Duo</th><th>Resurrect</th><th>Risk</th><th>Special</th><th>Sup Bonus</th><th>Selector</th><th>Daily</th><th>Weekly</th><th>Cum Daily</th><th>Cum Weekly</th></tr></thead><tbody>`;
  rows.filter(r => !isNaN(parseInt(r[1]))).forEach(row => {
    h += `<tr><td class="sc1"><span style="color:#fbbf24;font-weight:800;margin-right:10px">#${row[1]}</span>${row[3]}</td><td class="sc2">${fmt(row[13])}</td><td>${fmt(row[4])}</td><td>${fmt(row[5])}</td><td>${fmt(row[6])}</td><td>${fmt(row[7])}</td><td>${fmt(row[8])}</td><td>${fmt(row[9])}</td><td>${fmt(row[10])}</td><td>${fmt(row[11])}</td><td>${fmt(row[12])}</td><td>${fmt(row[16])}</td><td>${fmt(row[17])}</td><td>${fmt(row[18])}</td><td>${fmt(row[19])}</td></tr>`;
  });
  document.getElementById('area').innerHTML = h + '</tbody></table></div>';
}

function renderDT(rows){
  if (!rows || rows.length < 2) return;
  const cfg = { name: 0, total: 1 };
  const hdrs = rows[0];
  let h = '<div class="tw"><table><thead><tr>';
  for (let i = 0; i < hdrs.length; i++) {
    let cls = (i === cfg.name) ? 'sc1' : (i === cfg.total) ? 'sc2' : '';
    h += `<th class="${cls}">${hdrs[i] || '—'}</th>`;
  }
  h += '</tr></thead><tbody>';
  rows.slice(1).forEach(row => {
    h += '<tr>';
    for (let i = 0; i < hdrs.length; i++) {
      let cls = (i === cfg.name) ? 'sc1' : (i === cfg.total) ? 'sc2' : '';
      h += `<td class="${cls}">${fmt(row[i] ?? '')}</td>`;
    }
    h += '</tr>';
  });
  document.getElementById('area').innerHTML = h + '</tbody></table></div>';
}

function renderRCShell() {
  let no = '<option value="">— Select Player —</option>';
  players.forEach(p => { no += `<option value="${esc(p.name)}" ${p.name===rcName?'selected':''}>${esc(p.name)}</option>`; });
  let mo = ''; for(let m=1; m<=74; m++) mo += `<option value="${m}" ${m===rcMatch?'selected':''}>Match ${m}</option>`;
  document.getElementById('area').innerHTML = `<div class="rc-wrap"><div class="rc-bar"><div style="flex:1"><select class="rcsel" id="rcSN">${no}</select></div><div style="flex:0.5"><select class="rcsel" id="rcSM">${mo}</select></div><button class="rcbtn" id="rcb" onclick="loadRC()">▶ View</button></div><div id="rcA"></div></div>`;
}

async function loadRC() {
  rcName = document.getElementById('rcSN').value;
  rcMatch = parseInt(document.getElementById('rcSM').value);
  if (!rcName) return;
  const btn = document.getElementById('rcb'); btn.disabled = true; btn.textContent = '...';
  try {
    const d = await fetch(`${API}?id=${SHEET_ID}&tab=reportcard`).then(r => r.json());
    const g = d.rows || [];
    let matchCol = -1;
    for (let c = 0; c < g[2].length; c++) { if (String(g[2][c]).trim() == rcMatch) { matchCol = c; break; } }
    if (matchCol === -1) throw new Error();

    let groupHtml = '';
    RC_GROUPS.forEach(grp => {
      groupHtml += `<div class="gh">${grp.t}</div>`;
      grp.rows.forEach(rd => {
        let selectionName = (rd.dual) ? (g[rd.r][8] || '') : ''; 
        let scoreValue = (rd.dual) ? (g[rd.r][9] || '—') : (g[rd.r][3] || '—');
        let num = pn(scoreValue);
        let valHtml = `<span class="rv ${!isNaN(num)?(num>0?'pos':num<0?'neg':'v-dim'):'v-dim'}">${!isNaN(num)?(num>0?'+':'')+num.toLocaleString():esc(scoreValue)}</span>`;
        groupHtml += `<div class="rr ${rd.sub?'sub':''}"><span class="ri">${rd.i}</span><span class="rl">${rd.l}</span><span class="rd">${selectionName}</span>${valHtml}</div>`;
      });
    });
    const pl = players.find(p => p.name === rcName);
    document.getElementById('rcA').innerHTML = `<div class="rccard"><div class="rchero"><div class="rcav">${rcName[0]}</div><div><div class="rchn">${esc(rcName)}</div><div style="font-size:11px;color:#64748b">Match ${rcMatch}</div></div>${pl?`<div class="rchr"><div class="rcrn">#${pl.rank}</div><div style="font-size:9px;text-transform:uppercase">Rank</div></div>`:''}</div>${groupHtml}<div class="rr tot"><span class="ri">🏆</span><span class="rl">Season Total</span><span class="rv grand">${pl?fmt(pl.total):'—'}</span></div></div>`;
  } catch(e) { document.getElementById('rcA').innerHTML = `<div class="loading">Data for Match ${rcMatch} unavailable.</div>`; }
  finally { btn.disabled = false; btn.textContent = '▶ View'; }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pn(v){ if(!v || v==='—' || v==='-') return NaN; const s=String(v).replace(/,/g,''); if(/^\([\d.]+\)$/.test(s)) return -parseFloat(s.slice(1,-1)); return parseFloat(s); }
function fmt(n){ const x=typeof n==='number'?n:pn(n); return isNaN(x)?String(n||'—'):x.toLocaleString(); }
function go(n){ cur = TABS.find(t => t.name === n); loadContent(); }

renderTabs();
loadContent();
</script>
</body>
</html>
