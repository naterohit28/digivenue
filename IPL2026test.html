<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 Fantasy League</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#f8fafc;font-family:'Inter',sans-serif;padding:15px;min-height:100vh}
    .wrap{max-width:1300px;margin:0 auto;background:rgba(30,41,59,0.7);backdrop-filter:blur(10px);border-radius:15px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 40px rgba(0,0,0,0.5);padding:20px}
    .header{text-align:center;margin-bottom:15px}
    .header h1{font-family:'Poppins',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(to right,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:1px}
    .banner{display:inline-block;margin-top:8px;background:rgba(220,38,38,0.1);border:1px solid rgba(239,68,68,0.5);color:#fca5a5;padding:4px 12px;border-radius:15px;font-size:12px;font-weight:600}
    .tab-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:15px}
    .tab-btn{background:rgba(255,255,255,0.05);color:#94a3b8;border:1px solid rgba(255,255,255,0.1);padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-size:13px}
    .tab-btn.active{background:rgba(251,191,36,0.1);color:#fbbf24;border-color:#fbbf24}
    
    /* Global Table Viewport */
    .tw{overflow-x:auto;background:rgba(15,23,42,0.6);border-radius:10px;border:1px solid rgba(255,255,255,0.05);max-height:75vh}
    table{width:100%;border-collapse:separate;border-spacing:0;text-align:left;white-space:nowrap}
    th,td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;color:#f8fafc}
    th{background:#0f172a;color:#fbbf24;font-weight:600;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(255,255,255,0.1);text-transform:uppercase;font-size:11px;letter-spacing:0.5px}
    
    /* Sticky Frozen Columns */
    .sc1{position:sticky;left:0;background:#1e293b;z-index:5;font-weight:600;min-width:180px}
    .sc2{position:sticky;left:180px;background:#1e293b;z-index:5;font-weight:800;color:#fbbf24;min-width:100px;border-right:1px solid rgba(255,255,255,0.1);text-align:center}
    th.sc1,th.sc2{z-index:15;background:#0f172a}
    tr:hover td{background:rgba(255,255,255,0.04)}

    /* Report Card & Helper Classes */
    .rc-container { max-width: 850px; margin: 0 auto; }
    .rc-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:15px}
    .rcsel{background:#0f172a;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px;border-radius:8px;width:100%;outline:none;font-size:13px}
    .rcbtn{height:38px;padding:0 20px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0f172a;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
    .rccard{background:rgba(15,23,42,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden}
    .rchero{background:rgba(251,191,36,0.1);padding:15px 20px;display:flex;align-items:center;gap:15px;border-bottom:1px solid rgba(251,191,36,0.2)}
    .rcav{width:45px;height:45px;border-radius:50%;background:#fbbf24;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#0f172a}
    .rchn{font-size:20px;font-weight:700;color:#fff}
    .rcrn{font-size:32px;font-weight:800;color:#fbbf24;line-height:1}
    .rr{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .rl{font-size:13px;color:#cbd5e1;flex:1}
    .rd{font-size:12px;color:#94a3b8;text-align:right;margin-right:15px;font-style:italic;max-width:250px;overflow:hidden;text-overflow:ellipsis}
    .rv{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:#fff;text-align:right;width:80px}
    .rv.neg{color:#f87171 !important}

    .gh{background:rgba(255,255,255,0.05);padding:8px 20px;font-size:10px;font-weight:700;color:#fbbf24;text-transform:uppercase}
    .rv.grand{font-size:24px;color:#fbbf24}
    .loading{text-align:center;padding:30px;color:#94a3b8}
    .spinner{width:25px;height:25px;border:3px solid #334155;border-top-color:#fbbf24;border-radius:50%;animation:spin 1s infinite linear;margin:0 auto 5px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>IPL 2026 Fantasy League</h1>
    <div class="banner" id="banner">Connecting Live...</div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="area"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzm3ScYdmSRgcXhMVB3xv9fKVdLVfUl3w7jlyY03byNZZtvFnw8ZKydLglbpo3XJH3TSQ/exec';
const SHEET_ID = '1SErG-urDF7KqwU5inV6wwaqJfADXjY73Xss5BRDYY-Q';

const TABS = [
  {name:'Leaderboard', key:'leaderboard', type:'lb'},
  {name:'Your Report Card', key:'reportcard', type:'rc'},
  {name:'Match Scores', key:'matchscores', type:'dt'},
  {name:'SS Scores', key:'ssscores', type:'dt'},
  {name:'Daily Score', key:'dailyscore', type:'dt'},
  {name:'IPL Player Points', key:'playerpoints', type:'dt'},
];

// Clean Configuration for Data Tables
const DT_CONFIG = {
  matchscores: { name: 1, total: 2 },      // B, C
  ssscores: { name: 1, total: 2 },         // B, C
  dailyscore: { name: 1, total: 2 },       // B, C
  playerpoints: { name: 2, total: 3 }      // C, D
};

const LC = { rank:1, name:3, total:13 }; // Leaderboard Mapping

let cur = TABS[0], players = [], rcName = '', rcMatch = 7;

async function load(){
  renderTabs();
  document.getElementById('area').innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  try {
    const res = await fetch(`${API}?id=${SHEET_ID}&tab=${cur.key}`);
    const d = await res.json();
    updateBanner(d.rows);
    if (cur.type === 'lb') { buildPlayers(d.rows); renderLB(d.rows); }
    else if (cur.type === 'rc') { renderRCShell(); }
    else renderDT(d.rows);
  } catch(e) { document.getElementById('area').innerHTML = "Failed to load data."; }
}

function updateBanner(rows) {
  if (!rows) return;
  const matchRow = rows.find(r => String(r).includes('Match'));
  if (matchRow) {
    const m = String(matchRow).match(/Match\s*#?\s*(\d+)/i);
    if (m) document.getElementById('banner').innerText = `Data Updated till Match ${m[1]}`;
  }
}

function renderTabs(){
  document.getElementById('tabBar').innerHTML = TABS.map(t => `<button class="tab-btn ${t.name===cur.name?'active':''}" onclick="go('${t.name}')">${t.name}</button>`).join('');
}

function buildPlayers(rows){
  players = rows.filter(r => r && parseInt(r[LC.rank]) > 0).map(r => ({
    rank: parseInt(r[LC.rank]), name: String(r[LC.name] || '').trim(), total: pn(r[LC.total])
  })).sort((a,b) => a.rank - b.rank);
}

function renderLB(rows){
  let h = `<div class="tw"><table><thead><tr><th class="sc1">Rank & Name</th><th class="sc2">Total</th><th>Match</th><th>Bonus</th><th>Star</th><th>Duo</th><th>Resurrect</th><th>Risk</th><th>Special</th><th>Sup Bonus</th><th>Selector</th><th>Daily Win</th><th>Weekly Win</th><th>Cum Daily</th><th>Cum Weekly</th></tr></thead><tbody>`;
  rows.forEach(row => {
    const rn = parseInt(row[LC.rank]); if (isNaN(rn)) return;
    h += `<tr><td class="sc1"><span style="color:#fbbf24;font-weight:800;margin-right:10px">#${rn}</span><span style="font-weight:700">${row[LC.name]}</span></td><td class="sc2">${fmt(row[LC.total])}</td><td>${fmt(row[4])}</td><td>${fmt(row[5])}</td><td>${fmt(row[6])}</td><td>${fmt(row[7])}</td><td>${fmt(row[8])}</td><td>${fmt(row[9])}</td><td>${fmt(row[10])}</td><td>${fmt(row[11])}</td><td>${fmt(row[12])}</td><td>${fmt(row[16])}</td><td>${fmt(row[17])}</td><td>${fmt(row[18])}</td><td>${fmt(row[19])}</td></tr>`;
  });
  document.getElementById('area').innerHTML = h + '</tbody></table></div>';
}

function renderDT(rows){
  if (!rows || rows.length < 2) return;
  const cfg = DT_CONFIG[cur.key] || { name: 1, total: 2 };
  const hdrs = rows[0];

  let h = '<div class="tw"><table><thead><tr>';
  for (let i = cfg.name; i < hdrs.length; i++) {
    let cls = '';
    if (i === cfg.name) cls = 'sc1';
    if (i === cfg.total) cls = 'sc2';
    h += `<th class="${cls}">${hdrs[i] || '—'}</th>`;
  }
  h += '</tr></thead><tbody>';

  rows.slice(1).forEach(row => {
    if (!row[cfg.name]) return;
    h += '<tr>';
    for (let i = cfg.name; i < row.length; i++) {
      let cls = '';
      if (i === cfg.name) cls = 'sc1';
      if (i === cfg.total) cls = 'sc2';
      h += `<td class="${cls}">${fmt(row[i])}</td>`;
    }
    h += '</tr>';
  });
  document.getElementById('area').innerHTML = h + '</tbody></table></div>';
}

function renderRCShell(){
  let names = players.map(p=>`<option value="${p.name}" ${p.name===rcName?'selected':''}>${p.name}</option>`).join('');
  let matches = ''; for(let i=1;i<=74;i++) matches+=`<option value="${i}" ${i===rcMatch?'selected':''}>Match ${i}</option>`;
  document.getElementById('area').innerHTML = `<div class="rc-container"><div class="rc-bar"><div style="flex:1"><select class="rcsel" id="selN">${names}</select></div><div style="flex:0.5"><select class="rcsel" id="selM">${matches}</select></div><button class="rcbtn" onclick="fetchRC()">▶ View Report Card</button></div><div id="rcArea"></div></div>`;
}

async function fetchRC(){
  rcName = document.getElementById('selN').value; rcMatch = document.getElementById('selM').value;
  document.getElementById('rcArea').innerHTML = '<div class="spinner"></div>';
  try {
    const d = await fetch(`${API}?id=${SHEET_ID}&tab=reportcard`).then(r => r.json());
    const g = d.rows || [];
    let col = -1;
    for(let c=0; c < (g[2] ? g[2].length : 0); c++) { if(String(g[2][c]).trim() == rcMatch) { col = c; break; } }
    const mapping = [{l:'Match Related Points',r:9,sub:1},{l:'Match Points',r:4,dual:1},{l:'Bonus Points',r:5},{l:'Risk Incentive',r:6},{l:'Special Incentive',r:7},{l:'SP Points (incl link effect)',r:15,sub:1},{l:'Star Performer',r:12,dual:1},{l:'Linked?',r:13},{l:'DD Points (incl prem. effect)',r:21,sub:1},{l:'Duo 1',r:17,dual:1},{l:'Duo 2',r:18,dual:1},{l:'Premium?',r:19},{l:'THE RESURRECTOR',r:25,sub:1},{l:'Resurrector 1',r:23,dual:1},{l:'Resurrector 2',r:24,dual:1},{l:'Super Selector Score',r:42,sub:1},{l:'Wicket Keeper',r:28,dual:1},{l:'Vice Captain',r:29,dual:1},{l:'Captain',r:30,dual:1},{l:'Bat 1',r:31,dual:1},{l:'Bat 2',r:32,dual:1},{l:'Bat 3',r:33,dual:1},{l:'Bow 1',r:34,dual:1},{l:'Bow 2',r:35,dual:1},{l:'Bow 3',r:36,dual:1},{l:'AR 1',r:37,dual:1},{l:'AR 2',r:38,dual:1},{l:'Play 1',r:39,dual:1},{l:'Play 2',r:40,dual:1}];
    let rowsHTML = '';
    mapping.forEach(item => {
      let nameVal = item.dual && col > -1 ? (g[item.r] ? g[item.r][col] || '' : '') : '';
      let scoreVal = col > -1 ? (g[item.r] ? g[item.r][col+1] || '—' : '—') : '—';
      rowsHTML += `<div class="rr ${item.sub?'sub':''}"><span class="rl">${item.l}</span><span class="rd">${nameVal}</span><span class="rv ${isNeg(scoreVal)?'neg':''}">${fmt(scoreVal)}</span></div>`;
    });
    const pl = players.find(p=>p.name===rcName);
    const mTotal = col > -1 ? (g[44] ? g[44][col+1] : '—') : '—';
    document.getElementById('rcArea').innerHTML = `<div class="rccard"><div class="rchero"><div class="rcav">${rcName[0]}</div><div><div class="rchn">${rcName}</div><div style="color:#94a3b8;font-size:11px">Match ${rcMatch}</div></div><div style="margin-left:auto"><div class="rcrn">#${pl?pl.rank:'—'}</div><div style="font-size:9px;text-transform:uppercase">Rank</div></div></div><div class="gh">Details</div>${rowsHTML}<div class="rr sub" style="background:rgba(251,191,36,0.3)"><span class="rl" style="font-weight:800;color:#fff">MATCH GRAND TOTAL</span><span class="rv ${isNeg(mTotal)?'neg':''} gold" style="font-size:22px">${fmt(mTotal)}</span></div><div class="rr tot"><span class="rl">Season Total Score</span><span class="rv grand">${pl?fmt(pl.total):'—'}</span></div></div>`;
  } catch(e) { document.getElementById('rcArea').innerHTML = "Error loading Report Card."; }
}

function pn(v){ if(!v || v==='—' || v==='-') return 0; return parseFloat(String(v).replace(/,/g,'').replace(/[()]/g,'')) || 0; }
function isNeg(v){ const str = String(v).trim(); return str.startsWith('-') || str.startsWith('('); }
function fmt(v){
  if(!v || v==='0' || v===0 || v==='-') return '<span style="color:#64748b">—</span>';
  const val = pn(v);
  if (isNaN(val)) return `<span style="color:#fff">${v}</span>`;
  return val < 0 ? `<span class="neg">(${Math.abs(val).toLocaleString()})</span>` : val.toLocaleString();
}
function go(n){ cur = TABS.find(t=>t.name===n); load(); }
load();
</script>
</body>
</html>
