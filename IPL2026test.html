<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 Fantasy League App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* BACKGROUND & APP COLORS */
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
      margin: 0; padding: 20px; min-height: 100vh;
    }
    .dashboard-container {
      max-width: 1200px; margin: 0 auto;
      background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
      border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      overflow: hidden; padding: 30px;
    }

    /* HEADER & TABS */
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 {
      font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 800; margin: 0;
      background: linear-gradient(to right, #fbbf24, #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-transform: uppercase; letter-spacing: 2px;
    }
    
    .tab-bar {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 25px;
    }
    .tab-bar::-webkit-scrollbar { height: 6px; }
    .tab-bar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
    .tab-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    .tab-button {
      background: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .tab-button:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .tab-button.active {
      background: rgba(251, 191, 36, 0.1); color: #fbbf24; border-color: #fbbf24;
    }

    /* DASHBOARD CARDS (Leaderboard) */
    .leaderboard { display: flex; flex-direction: column; gap: 15px; }
    .player-card {
      background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); 
      border-radius: 12px; padding: 20px; transition: transform 0.2s;
    }
    .player-card:hover {
      transform: translateY(-2px); background: rgba(51, 65, 85, 0.8);
      border-color: rgba(251, 191, 36, 0.4); 
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; margin-bottom: 15px;
    }
    .card-header-left { display: flex; align-items: center; }
    .rank {
      font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 800; width: 45px; height: 45px;
      display: flex; align-items: center; justify-content: center; border-radius: 50%;
      background: #334155; color: #cbd5e1; margin-right: 15px; flex-shrink: 0;
    }
    .rank-1 { background: linear-gradient(135deg, #fbbf24, #d97706); color: #fff; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
    .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
    .rank-3 { background: linear-gradient(135deg, #b45309, #78350f); color: #fff; }
    .player-name { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 20px; color: #f8fafc; }
    .total-score { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 800; color: #fbbf24; text-align: right; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; }
    .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; text-align: center; }
    .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; }
    .stat-value { font-size: 14px; font-weight: 600; color: #e2e8f0; font-family: 'Poppins', sans-serif;}

    /* NATIVE DATA TABLES (With Dynamic Frozen Columns) */
    .table-container { 
      overflow-x: auto; background: rgba(15, 23, 42, 0.6); 
      border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); 
      max-height: 70vh;
    }
    table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; white-space: nowrap; }
    
    th, td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #e2e8f0; }
    th { background: #0f172a; color: #fbbf24; font-weight: 600; font-size: 14px; position: sticky; top: 0; z-index: 1; border-bottom: 2px solid rgba(255,255,255,0.1); }
    tr:hover td { background: rgba(255,255,255,0.03); }

    /* The "Freeze Panes" CSS Classes */
    .sticky-col1 { position: sticky; left: 0; background: #1e293b; z-index: 2; font-weight: 600; min-width: 130px; }
    .sticky-col2 { position: sticky; left: 160px; background: #1e293b; z-index: 2; font-weight: 800; color: #fbbf24; min-width: 60px; border-right: 2px solid rgba(255,255,255,0.1); }
    th.sticky-col1, th.sticky-col2 { z-index: 3; background: #0f172a; }

    /* IFRAME CONTAINER */
    .iframe-container { width: 100%; height: 75vh; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
    iframe { width: 100%; height: 100%; border: none; }

    .loading { text-align: center; color: #94a3b8; padding: 40px; font-weight: 500; }

    @media (max-width: 600px) {
      .card-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .total-score { align-self: flex-start; margin-left: 60px; font-size: 24px;}
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .dashboard-container { padding: 15px; }
      .sticky-col1 { min-width: 100px; left: 0; }
      .sticky-col2 { min-width: 50px; left: 130px; }
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <div class="header">
      <h1>IPL 2026 Fantasy League</h1>
    </div>

    <div class="tab-bar" id="tabBar"></div>

    <div id="contentArea">
      <div class="loading">Loading dashboard...</div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1SErG-urDF7KqwU5inV6wwaqJfADXjY73Xss5BRDYY-Q';
    
    const TABS = [
      { name: 'Leaderboard', gid: '1775142554', type: 'leaderboard' },
      { name: 'Your Report Card', gid: '1383665756', type: 'iframe' }, 
      { name: 'Match Scores', gid: '1509870547', type: 'datatable' },
      { name: 'SS Scores', gid: '130216061', type: 'datatable' },
      { name: 'Daily Score', gid: '1884747051', type: 'datatable' },
      { name: 'IPL Player Points', gid: '1991041599', type: 'datatable' }
    ];

    const DASH_COLS = { 
      name: 3, match: 4, bonus: 5, star: 6, duo: 7, 
      resurrector: 8, risk: 9, special: 10, 
      superBonus: 11, superSelector: 12, total: 13 
    };

    let currentTab = TABS[0];

    function renderTabs() {
      const tabBar = document.getElementById('tabBar');
      tabBar.innerHTML = '';
      TABS.forEach(tab => {
        const btn = document.createElement('button');
        btn.className = `tab-button ${tab.name === currentTab.name ? 'active' : ''}`;
        btn.innerText = tab.name;
        btn.onclick = () => {
          currentTab = tab;
          renderTabs();
          loadContent();
        };
        tabBar.appendChild(btn);
      });
    }

    async function loadContent() {
      const content = document.getElementById('contentArea');
      
      if (currentTab.type === 'leaderboard' || currentTab.type === 'datatable') {
        content.innerHTML = '<div class="loading">Fetching live data from Digivenue HQ...</div>';
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${currentTab.gid}`;
        
        try {
          const res = await fetch(url);
          const text = await res.text();
          const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
          if (!jsonString) throw new Error("Could not parse data.");
          
          const json = JSON.parse(jsonString[1]);
          
          if (currentTab.type === 'leaderboard') {
            renderLeaderboard(json.table.rows);
          } else {
            renderDataTable(json.table.rows, json.table.cols);
          }
        } catch (error) {
          content.innerHTML = `<div class="loading" style="color:#ef4444;">Error: ${error.message}</div>`;
        }
      } 
      // REPORT CARD: Embedded specifically focusing on D2:R45 so dropdowns are clickable
      else if (currentTab.type === 'iframe') {
        content.innerHTML = '<div class="loading">Loading Report Card...</div>';
        const iframeUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=${currentTab.gid}&rm=minimal&range=D2:R45`;
        
        setTimeout(() => {
          content.innerHTML = `
            <div style="margin-bottom: 10px; font-size: 12px; color: #94a3b8; text-align: center;">
              Use the dropdowns to view specific player data.
            </div>
            <div class="iframe-container">
              <iframe src="${iframeUrl}" title="${currentTab.name}"></iframe>
            </div>
          `;
        }, 100);
      }
    }

    // ==========================================
    // 🛠️ EDIT 1: DYNAMIC FREEZE PANES
    // ==========================================
    function renderDataTable(rows, cols) {
      let html = '<div class="table-container"><table><thead><tr>';
      
      // Check if we are on the IPL Player Points tab
      const isPlayerPoints = currentTab.name === 'IPL Player Points';

      cols.forEach((c, i) => {
        // Hide Column A and D on regular tabs, but show everything on IPL Player Points
        if (!isPlayerPoints && (i === 0 || i === 3)) return; 
        
        let cls = '';
        if (isPlayerPoints) {
          if (i === 2) cls = 'sticky-col1'; // Freeze Col C
          if (i === 3) cls = 'sticky-col2'; // Freeze Col D
        } else {
          if (i === 1) cls = 'sticky-col1'; // Freeze Col B
          if (i === 2) cls = 'sticky-col2'; // Freeze Col C
        }
        
        html += `<th class="${cls}">${c.label || ''}</th>`;
      });
      html += '</tr></thead><tbody>';

      rows.forEach(row => {
        html += '<tr>';
        row.c.forEach((cell, i) => {
          if (!isPlayerPoints && (i === 0 || i === 3)) return; 
          
          let cls = '';
          if (isPlayerPoints) {
            if (i === 2) cls = 'sticky-col1'; 
            if (i === 3) cls = 'sticky-col2'; 
          } else {
            if (i === 1) cls = 'sticky-col1'; 
            if (i === 2) cls = 'sticky-col2'; 
          }
          
          const val = cell ? (cell.f || cell.v || '') : '';
          html += `<td class="${cls}">${val}</td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table></div>';
      document.getElementById('contentArea').innerHTML = html;
    }

    // ==========================================
    // 🛠️ EDIT 2: REMOVE DECIMALS (Leaderboard)
    // ==========================================
    const getCleanVal = (row, colIndex) => {
      if (row && row.c && row.c[colIndex] && row.c[colIndex].v !== null) {
        let val = row.c[colIndex].v;
        // Force rounding to remove all decimals
        if (typeof val === 'number') return Math.round(val);
        let parsed = parseFloat(String(val).replace(/,/g, ''));
        return isNaN(parsed) ? val : Math.round(parsed);
      }
      return 0;
    };

    function renderLeaderboard(rows) {
      let html = '<div class="leaderboard">';
      let validPlayers = [];
      
      rows.forEach(row => {
        // Name doesn't need rounding, so we extract it directly
        const nameRaw = row.c && row.c[DASH_COLS.name] ? row.c[DASH_COLS.name].v : '';
        const name = String(nameRaw).trim();
        
        if (name !== '' && name !== 'Participant' && name !== '0' && name !== 'null') {
          // Every single stat is now passed through the decimal-killer function!
          validPlayers.push({
            name: name, 
            score: getCleanVal(row, DASH_COLS.total),
            match: getCleanVal(row, DASH_COLS.match),
            bonus: getCleanVal(row, DASH_COLS.bonus),
            star: getCleanVal(row, DASH_COLS.star),
            duo: getCleanVal(row, DASH_COLS.duo),
            resurrector: getCleanVal(row, DASH_COLS.resurrector),
            risk: getCleanVal(row, DASH_COLS.risk),
            special: getCleanVal(row, DASH_COLS.special),
            superBonus: getCleanVal(row, DASH_COLS.superBonus),
            superSelector: getCleanVal(row, DASH_COLS.superSelector),
          });
        }
      });

      // Sort by Total Score
      validPlayers.sort((a, b) => b.score - a.score);

      validPlayers.forEach((p, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        
        // Use .toLocaleString() to keep commas (like 9,443) but decimals are gone!
        html += `
          <div class="player-card">
            <div class="card-header">
              <div class="card-header-left">
                <div class="rank ${rankClass}">${rank}</div>
                <div class="player-name">${p.name}</div>
              </div>
              <div class="total-score">${p.score.toLocaleString('en-US')}</div>
            </div>
            <div class="stats-grid">
              <div class="stat-box"><span class="stat-label">Match</span><span class="stat-value">${p.match.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Bonus</span><span class="stat-value">${p.bonus.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Star</span><span class="stat-value">${p.star.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Duo</span><span class="stat-value">${p.duo.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Resurrect</span><span class="stat-value">${p.resurrector.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Risk</span><span class="stat-value">${p.risk.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Special</span><span class="stat-value">${p.special.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Sup Bonus</span><span class="stat-value">${p.superBonus === 0 ? '-' : p.superBonus.toLocaleString('en-US')}</span></div>
              <div class="stat-box"><span class="stat-label">Selector</span><span class="stat-value">${p.superSelector.toLocaleString('en-US')}</span></div>
            </div>
          </div>`;
      });
      document.getElementById('contentArea').innerHTML = html + '</div>';
    }

    renderTabs();
    loadContent();
    setInterval(() => { if(currentTab.type === 'leaderboard') loadContent(); }, 120000);
  </script>

</body>
</html>
