<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 Fantasy League</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#f8fafc;font-family:'Inter',sans-serif;padding:15px;min-height:100vh}
    .wrap{max-width:1250px;margin:0 auto;background:rgba(30,41,59,0.7);backdrop-filter:blur(10px);border-radius:15px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 40px rgba(0,0,0,0.5);padding:20px}
    .header{text-align:center;margin-bottom:15px}
    .header h1{font-family:'Poppins',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(to right,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:1px}
    .banner{display:inline-block;margin-top:8px;background:rgba(220,38,38,0.1);border:1px solid rgba(239,68,68,0.5);color:#fca5a5;padding:4px 12px;border-radius:15px;font-size:12px;font-weight:600}
    .tab-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:15px}
    .tab-btn{background:rgba(255,255,255,0.05);color:#94a3b8;border:1px solid rgba(255,255,255,0.1);padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-size:13px}
    .tab-btn.active{background:rgba(251,191,36,0.1);color:#fbbf24;border-color:#fbbf24}
   
    .tw{overflow-x:auto;background:rgba(15,23,42,0.6);border-radius:10px;border:1px solid rgba(255,255,255,0.05);max-height:75vh}
    table{width:100%;border-collapse:separate;border-spacing:0;text-align:left;white-space:nowrap}
    th,td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;color:#f8fafc}
    th{background:#0f172a;color:#fbbf24;font-weight:600;position:sticky;top:0;z-index:10;border-bottom:2px solid rgba(255,255,255,0.1);text-transform:uppercase;font-size:11px;letter-spacing:0.5px}
   
    .sc1{position:sticky;left:0;background:#1e293b;z-index:5;font-weight:600;min-width:220px}
    .sc2{position:sticky;left:220px;background:#1e293b;z-index:5;font-weight:800;color:#fbbf24;min-width:110px;border-right:1px solid rgba(255,255,255,0.1);text-align:center}
    th.sc1,th.sc2{z-index:15;background:#0f172a}
    tr:hover td{background:rgba(255,255,255,0.03)}

    .lb-row td { padding: 12px; }
    .rank-cell { width: 35px; text-align: center; font-weight: 800; color: #fbbf24; }
    .name-cell { font-weight: 700; color: #fff; }

    .rc-container { max-width: 850px; margin: 0 auto; }
    .rc-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:15px}
    .rcg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
    .rcl{font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8}
    .rcsel{background:#0f172a;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px;border-radius:8px;width:100%;outline:none;font-size:13px}
    .rcbtn{height:38px;padding:0 20px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0f172a;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
   
    .rccard{background:rgba(15,23,42,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden}
    .rchero{background:rgba(251,191,36,0.1);padding:15px 20px;display:flex;align-items:center;gap:15px;border-bottom:1px solid rgba(251,191,36,0.2)}
    .rcav{width:45px;height:45px;border-radius:50%;background:#fbbf24;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#0f172a}
    .rchn{font-size:20px;font-weight:700;color:#fff}
    .rcrn{font-size:32px;font-weight:800;color:#fbbf24;line-height:1}
    .rr{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.03)}
    .rl{font-size:13px;color:#cbd5e1;font-weight:500; flex:1}
    .rd{font-size:12px;color:#94a3b8; text-align:right; margin-right: 15px; font-style: italic; max-width: 250px; overflow: hidden; text-overflow: ellipsis;}
    .rv{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;color:#fff;text-align:right;width:80px}
    .rv.dim{color:#64748b;font-weight:400}
    .rv.negative { color: #f87171 !important; font-weight: 700; }

    .gh{background:rgba(255,255,255,0.05);padding:8px 20px;font-size:10px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:1px}
    .rr.sub{background:rgba(251,191,36,0.05); border-top:1px solid rgba(251,191,36,0.1)}
    .rr.tot{background:rgba(251,191,36,0.15);padding:15px 20px}
    .rv.grand{font-size:24px;color:#fbbf24}
    .loading{text-align:center;padding:30px;color:#94a3b8}
    .spinner{width:25px;height:25px;border:3px solid #334155;border-top-color:#fbbf24;border-radius:50%;animation:spin 1s infinite linear;margin:0 auto 5px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>IPL 2026 Fantasy League</h1>
    <div class="banner" id="banner">Syncing Scores...</div>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="area"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzm3ScYdmSRgcXhMVB3xv9fKVdLVfUl3w7jlyY03byNZZtvFnw8ZKydLglbpo3XJH3TSQ/exec';
const SHEET_ID = '1SErG-urDF7KqwU5inV6wwaqJfADXjY73Xss5BRDYY-Q';

const TABS = [
  {name:'Leaderboard', key:'leaderboard', type:'lb'},
  {name:'Your Report Card', key:'reportcard', type:'rc'},
  {name:'Match Scores', key:'matchscores', type:'dt'},
  {name:'SS Scores', key:'ssscores', type:'dt'},
  {name:'Daily Score', key:'dailyscore', type:'dt'},
  {name:'IPL Player Points', key:'playerpoints', type:'dt'},
];

const LC = { rank:1, name:3, total:13 };

let cur = TABS[0];
let players = [];
let rcName = '';
let rcMatch = 7;

async function load(){
  renderTabs();
  document.getElementById('area').innerHTML = '<div class="loading"><div class="spinner"></div>Loading live data...</div>';

  try {
    const res = await fetch(`${API}?id=${SHEET_ID}&tab=${cur.key}`);
    if (!res.ok) throw new Error('Network error');
    const d = await res.json();

    updateBanner(d.rows);

    if (cur.type === 'lb') {
      buildPlayers(d.rows);
      renderLB(d.rows);
    } else if (cur.type === 'rc') {
      renderRCShell();
    } else {
      renderDT(d.rows);
    }
  } catch(e) {
    console.error(e);
    document.getElementById('area').innerHTML = `<div class="loading">Failed to load data.<br><small>${e.message}</small><br><button onclick="load()" style="margin-top:12px;padding:8px 20px;background:#fbbf24;color:#0f172a;border:none;border-radius:8px;cursor:pointer;font-weight:700">Retry</button></div>`;
  }
}

function updateBanner(rows) {
  const bannerEl = document.getElementById('banner');
  if (!rows) return;
  const matchRow = rows.find(r => String(r).includes('Match'));
  if (matchRow) {
    const matchNum = String(matchRow).match(/Match\s*(\d+)/i);
    if (matchNum) bannerEl.innerText = `Data Updated till Match ${matchNum[1]}`;
  }
}

function renderDT(rows){
  if (!rows || rows.length < 2) return;

  const hdrs = rows[0];
  const cfg = DT_CONFIG[cur.key] || { name: 1, total: 2 };

  let h = '<div class="tw"><table><thead><tr>';

  for (let i = 0; i < hdrs.length; i++) {
    let cls = '';
    if (i === cfg.name) cls = 'sc1';
    if (i === cfg.total) cls = 'sc2';
    h += `<th class="${cls}">${hdrs[i] || '—'}</th>`;
  }

  h += '</tr></thead><tbody>';

  rows.slice(1).forEach(row => {
    h += '<tr>';
    for (let i = 0; i < row.length; i++) {
      let cls = '';
      if (i === cfg.name) cls = 'sc1';
      if (i === cfg.total) cls = 'sc2';
      h += `<td class="${cls}">${fmt(row[i])}</td>`;
    }
    h += '</tr>';
  });

  document.getElementById('area').innerHTML = h + '</tbody></table></div>';
}
function renderDT(rows){
  if (!rows || rows.length < 2) return;

  const hdrs = rows[0];

  let h = '<div class="tw"><table><thead><tr>';

  // Start from Column B (Name) - index 1
  for (let i = 1; i < hdrs.length; i++) {
    let cls = '';
    if (i === 1) cls = 'sc1';   // Name
    if (i === 2) cls = 'sc2';   // Total
    h += `<th class="${cls}">${hdrs[i] || '—'}</th>`;
  }
  h += '</tr></thead><tbody>';

  rows.slice(1).forEach(row => {
    h += '<tr>';
    for (let i = 1; i < row.length; i++) {
      let cls = '';
      if (i === 1) cls = 'sc1';
      if (i === 2) cls = 'sc2';
      h += `<td class="${cls}">${fmt(row[i])}</td>`;
    }
    h += '</tr>';
  });

  document.getElementById('area').innerHTML = h + '</tbody></table></div>';
}

function renderRCShell(){
  let names = players.map(p=>`<option value="${p.name}" ${p.name===rcName?'selected':''}>${p.name}</option>`).join('');
  let matches = ''; for(let i=1;i<=74;i++) matches+=`<option value="${i}" ${i===rcMatch?'selected':''}>Match ${i}</option>`;
  document.getElementById('area').innerHTML = `
    <div class="rc-container">
      <div class="rc-bar"><div class="rcg"><div class="rcl">Participant</div><select class="rcsel" id="selN">${names}</select></div><div class="rcg"><div class="rcl">Match No.</div><select class="rcsel" id="selM">${matches}</select></div><button class="rcbtn" onclick="fetchRC()">▶ View Report Card</button></div>
      <div id="rcArea"></div>
    </div>`;
}

async function fetchRC(){
  rcName = document.getElementById('selN').value;
  rcMatch = document.getElementById('selM').value;
  document.getElementById('rcArea').innerHTML = '<div class="loading"><div class="spinner"></div>Loading Report Card...</div>';

  try {
    const res = await fetch(`${API}?id=${SHEET_ID}&tab=reportcard`);
    const d = await res.json();
    const g = d.rows || [];
    let col = -1;
    for(let c=0; c < (g[2] ? g[2].length : 0); c++) { 
      if(String(g[2][c]).trim() == rcMatch) { col = c; break; } 
    }

    const mapping = [
      {l:'Match Related Points', r:9, sub:true},
      {l:'Match Points', r:4, dual:1}, {l:'Bonus Points', r:5}, {l:'Risk Incentive', r:6}, {l:'Special Incentive', r:7},
      {l:'SP Points (incl link effect)', r:15, sub:true},
      {l:'Star Performer', r:12, dual:1}, {l:'Linked?', r:13},
      {l:'DD Points (incl prem. effect)', r:21, sub:true},
      {l:'Duo 1', r:17, dual:1}, {l:'Duo 2', r:18, dual:1}, {l:'Premium?', r:19},
      {l:'THE RESURRECTOR', r:25, sub:true},
      {l:'Resurrector 1', r:23, dual:1}, {l:'Resurrector 2', r:24, dual:1},
      {l:'Super Selector Score', r:42, sub:true},
      {l:'Wicket Keeper', r:28, dual:1}, {l:'Vice Captain', r:29, dual:1}, {l:'Captain', r:30, dual:1},
      {l:'Bat 1', r:31, dual:1}, {l:'Bat 2', r:32, dual:1}, {l:'Bat 3', r:33, dual:1},
      {l:'Bow 1', r:34, dual:1}, {l:'Bow 2', r:35, dual:1}, {l:'Bow 3', r:36, dual:1},
      {l:'AR 1', r:37, dual:1}, {l:'AR 2', r:38, dual:1}, {l:'Play 1', r:39, dual:1}, {l:'Play 2', r:40, dual:1}
    ];

    let rowsHTML = '';
    mapping.forEach(item => {
      let nameVal = (item.dual && col > -1) ? (g[item.r] ? g[item.r][col] || '' : '') : '';
      let scoreVal = col > -1 ? (g[item.r] ? g[item.r][col+1] || '—' : '—') : '—';
      if(item.sub && !item.dual) scoreVal = col > -1 ? (g[item.r] ? g[item.r][col+1] || '—' : '—') : '—';
      rowsHTML += `<div class="rr ${item.sub?'sub':''}"><span class="rl">${item.l}</span><span class="rd">${nameVal}</span><span class="rv ${isNegative(scoreVal) ? 'negative' : ''}">${fmt(scoreVal)}</span></div>`;
    });

    const pl = players.find(p=>p.name===rcName);
    const matchTotal = col > -1 ? (g[44] ? g[44][col+1] || '—' : '—') : '—';

    document.getElementById('rcArea').innerHTML = `
      <div class="rccard">
        <div class="rchero">
          <div class="rcav">${rcName ? rcName[0] : 'P'}</div>
          <div><div class="rchn">${rcName}</div><div style="color:#94a3b8;font-size:11px">Performance Report · Match ${rcMatch}</div></div>
          <div style="margin-left:auto"><div class="rcrn">#${pl?pl.rank:'—'}</div><div style="font-size:9px;text-transform:uppercase">Rank</div></div>
        </div>
        <div class="gh">Detailed Statistics</div>
        ${rowsHTML}
        <div class="rr sub" style="background:rgba(251,191,36,0.3)"><span class="rl" style="font-weight:800;color:#fff">MATCH GRAND TOTAL</span><span class="rv ${isNegative(matchTotal)?'negative':''} gold" style="font-size:22px">${fmt(matchTotal)}</span></div>
        <div class="rr tot"><span class="rl">Overall Season Total</span><span class="rv grand">${pl?fmt(pl.total):'—'}</span></div>
      </div>`;
  } catch(e) {
    document.getElementById('rcArea').innerHTML = '<div class="loading">Report Card failed to load</div>';
  }
}

function pn(v){ if(!v || v==='—' || v==='-') return 0; return parseFloat(String(v).replace(/,/g,'').replace(/[()]/g,'')) || 0; }
function isNegative(v){ const str = String(v).trim(); return str.startsWith('-') || (str.startsWith('(') && str.endsWith(')')); }
function fmt(v){
  if(!v || v==='0' || v===0 || v==='-') return '<span class="dim">—</span>';
  const str = String(v).trim();
  if (isNegative(str)) return `<span class="negative">(${str.replace(/[()-]/g,'')})</span>`;
  const num = pn(v);
  if (isNaN(num)) return `<span style="color:#fff">${v}</span>`;
  return num.toLocaleString();
}
function go(n){ cur = TABS.find(t=>t.name===n); load(); }

load();
</script>
</body>
</html>
