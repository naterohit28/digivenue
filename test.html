<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DigiVenue — Unified Banquet Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════
   DESIGN TOKENS (Merged Palette)
════════════════════════════════════════════════════ */
:root {
  --navy:        #003265;
  --navy-mid:    #00418a;
  --navy-lit:    #1a5aab;
  --gold:        #eaa921;
  --gold-l:      #f5c040;
  --gold-pale:   #fef8e6;
  --gold-glow:   rgba(234,169,33,.15);
  --jade:        #1e7a50;
  --jade-pale:   #e6f7ef;
  --rose:        #b83030;
  --bg:          #f2efe9;
  --surface:     #faf8f4;
  --card:        #ffffff;
  --border:      #e4ddd4;
  --text:        #1a1612;
  --muted:       #7a7068;
  --r:           12px;
  --shadow:      0 4px 24px rgba(12,35,64,.12);
}

/* ════════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ════════════════════════════════════════════════════
   TOPBAR
════════════════════════════════════════════════════ */
.topbar {
  height: 56px;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  border-bottom: 2px solid var(--gold);
  z-index: 1000;
}
.tb-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; color: #fff; font-weight: 700;
}
.tb-logo span { color: var(--gold); }
.tb-right { display: flex; align-items: center; gap: 10px; }
.btn-gold { 
    background: var(--gold); color: var(--navy); border: none; 
    padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer;
}

/* ════════════════════════════════════════════════════
   SIDEBAR & CONTENT
════════════════════════════════════════════════════ */
.layout { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--navy);
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(255,255,255,.06);
}
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; color: rgba(255,255,255,.55);
  cursor: pointer; transition: 0.2s; font-size: 14px;
}
.nav-link:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-link.active { background: var(--gold-glow); color: var(--gold-l); border-right: 3px solid var(--gold); }

.content { flex: 1; overflow-y: auto; padding: 24px; }
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* ════════════════════════════════════════════════════
   MUHURAT STYLING (From Claude Code)
════════════════════════════════════════════════════ */
.mu-calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.mu-day-cell {
  background: #fff;
  min-height: 100px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.mu-day-num { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.mu-tag {
  font-size: 10px;
  padding: 2px 4px;
  border-radius: 4px;
  font-weight: 600;
  line-height: 1.2;
}
.mu-tag-wedding { background: #fdf2f8; color: #be185d; border: 1px solid #fbcfe8; }
.mu-tag-engagement { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

.community-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  background: var(--card);
  padding: 12px;
  border-radius: var(--r);
  border: 1px solid var(--border);
}
.comm-btn {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg);
}
.comm-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

/* ════════════════════════════════════════════════════
   BOOKING CARDS
════════════════════════════════════════════════════ */
.booking-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
}
.card {
    background: white;
    padding: 16px;
    border-radius: var(--r);
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">Digi<span>Venue</span></div>
  <div class="tb-right">
    <button class="btn-gold" onclick="alert('New Booking Flow')">+ Quick Booking</button>
    <div style="width:32px; height:32px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:700">RN</div>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div style="padding: 20px 16px; color: rgba(255,255,255,0.3); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">Menu</div>
    <div class="nav-link active" onclick="navTo('dashboard', this)"><span>📊</span> Dashboard</div>
    <div class="nav-link" onclick="navTo('muhurat', this)"><span>🪔</span> Muhurat Calendar</div>
    <div class="nav-link" onclick="navTo('bookings', this)"><span>📋</span> All Bookings</div>
    <div class="nav-link" onclick="navTo('leads', this)"><span>🎯</span> Sales Leads</div>
  </nav>

  <main class="content">
    
    <div id="page-dashboard" class="page active">
        <h1 style="margin-bottom: 20px; font-family: 'Cormorant Garamond';">Business Overview</h1>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
            <div class="card" style="border-left: 4px solid var(--gold);">
                <div style="color: var(--muted); font-size: 12px;">Total Revenue</div>
                <div style="font-size: 24px; font-weight: 700;">₹42,50,000</div>
            </div>
            <div class="card" style="border-left: 4px solid var(--jade);">
                <div style="color: var(--muted); font-size: 12px;">Pending Collections</div>
                <div style="font-size: 24px; font-weight: 700; color: var(--rose);">₹8,15,000</div>
            </div>
            <div class="card" style="border-left: 4px solid var(--navy-lit);">
                <div style="color: var(--muted); font-size: 12px;">Active Leads</div>
                <div style="font-size: 24px; font-weight: 700;">14</div>
            </div>
        </div>
    </div>

    <div id="page-muhurat" class="page">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h1 style="font-family: 'Cormorant Garamond';">Smart Muhurat Calendar</h1>
        <div id="monthDisplay" style="font-weight:700; font-size:18px">March 2025</div>
      </div>

      <div class="community-selector">
        <span style="font-size: 12px; font-weight: 700; color: var(--muted); align-self: center; margin-right: 10px;">Select Community:</span>
        <button class="comm-btn active" onclick="setCommunity('marathi', this)">Marathi</button>
        <button class="comm-btn" onclick="setCommunity('gujarati', this)">Gujarati</button>
        <button class="comm-btn" onclick="setCommunity('northIndian', this)">North Indian</button>
      </div>

      <div class="mu-calendar-grid" id="muhuratGrid">
        </div>
    </div>

    <div id="page-bookings" class="page">
        <h1 style="margin-bottom: 20px; font-family: 'Cormorant Garamond';">Confirmed Bookings</h1>
        <div class="booking-grid" id="bookingList"></div>
    </div>

  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DATA MODELS (Merged from Claude Code)
═══════════════════════════════════════════════════ */
const MUHURATS = {
  marathi: [
    { date: "2025-03-12", type: "Wedding Muhurat" },
    { date: "2025-03-15", type: "Wedding Muhurat" },
    { date: "2025-03-19", type: "Engagement Muhurat" },
    { date: "2025-03-22", type: "Wedding Muhurat" }
  ],
  gujarati: [
    { date: "2025-03-12", type: "Wedding Muhurat" },
    { date: "2025-03-14", type: "Wedding Muhurat" },
    { date: "2025-03-22", type: "Wedding Muhurat" }
  ],
  northIndian: [
    { date: "2025-03-15", type: "Wedding Muhurat" },
    { date: "2025-03-16", type: "Wedding Muhurat" },
    { date: "2025-03-28", type: "Wedding Muhurat" }
  ]
};

const BOOKINGS = [
    { id: 1, client: "Sunil Deshmukh", date: "2025-03-15", type: "Wedding", venue: "Grand Ballroom", status: "Paid" },
    { id: 2, client: "Rakesh Mehta", date: "2025-03-22", type: "Wedding", venue: "Lawn A", status: "Partially Paid" }
];

/* ═══════════════════════════════════════════════════
   APP STATE & NAVIGATION
═══════════════════════════════════════════════════ */
let currentCommunity = 'marathi';

function navTo(pageId, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${pageId}`).classList.add('active');
    
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');

    if(pageId === 'muhurat') renderMuhuratCalendar();
    if(pageId === 'bookings') renderBookingList();
}

function setCommunity(comm, el) {
    currentCommunity = comm;
    document.querySelectorAll('.comm-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderMuhuratCalendar();
}

/* ═══════════════════════════════════════════════════
   CALENDAR GENERATOR
═══════════════════════════════════════════════════ */
function renderMuhuratCalendar() {
    const grid = document.getElementById('muhuratGrid');
    grid.innerHTML = '';
    
    const year = 2025;
    const month = 2; // March
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const startDay = new Date(year, month, 1).getDay();

    // Add Empty Sockets
    for(let i=0; i<startDay; i++) {
        grid.innerHTML += `<div class="mu-day-cell" style="background:var(--bg)"></div>`;
    }

    for(let d=1; d<=daysInMonth; d++) {
        const dateStr = `${year}-0${month+1}-${d < 10 ? '0'+d : d}`;
        const dayMuhurats = MUHURATS[currentCommunity].filter(m => m.date === dateStr);
        const dayBookings = BOOKINGS.filter(b => b.date === dateStr);

        let tagsHtml = dayMuhurats.map(m => 
            `<div class="mu-tag ${m.type.includes('Wedding') ? 'mu-tag-wedding' : 'mu-tag-engagement'}">${m.type}</div>`
        ).join('');

        let bookingHtml = dayBookings.map(b => 
            `<div style="font-size:10px; color:var(--navy); font-weight:700">✓ ${b.client.split(' ')[0]}</div>`
        ).join('');

        grid.innerHTML += `
            <div class="mu-day-cell ${dayMuhurats.length > 0 ? 'mu-shubh-day' : ''}">
                <div class="mu-day-num">${d}</div>
                ${tagsHtml}
                ${bookingHtml}
            </div>
        `;
    }
}

/* ═══════════════════════════════════════════════════
   BOOKING LIST GENERATOR
═══════════════════════════════════════════════════ */
function renderBookingList() {
    const container = document.getElementById('bookingList');
    container.innerHTML = BOOKINGS.map(b => `
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span style="font-weight:700">${b.client}</span>
                <span style="font-size:10px; padding:2px 6px; border-radius:10px; background:var(--jade-pale); color:var(--jade)">${b.status}</span>
            </div>
            <div style="font-size:13px; color:var(--muted)">${b.type} @ ${b.venue}</div>
            <div style="font-size:13px; color:var(--navy); font-weight:700; margin-top:5px">${b.date}</div>
        </div>
    `).join('');
}

// Init
window.onload = () => {
    // Starting on Dashboard
};

</script>
</body>
</html>
