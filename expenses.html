<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses • Event Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .modal { animation: modalPop 0.3s ease-out; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .expense-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .expense-card:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .tag { font-size: 10px; letter-spacing: 0.5px; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <!-- HEADER -->
  <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-5 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-cyan-500 rounded-2xl flex items-center justify-center text-2xl">📋</div>
      <h1 class="text-3xl font-semibold tracking-tight">Expenses</h1>
    </div>
    
    <div class="flex items-center gap-4">
      <button onclick="openAddExpenseModal()" 
              class="bg-cyan-500 hover:bg-cyan-400 text-zinc-950 font-semibold px-6 py-3 rounded-3xl flex items-center gap-2 shadow-xl shadow-cyan-500/30">
        <i class="fa-solid fa-plus text-lg"></i>
        <span class="text-lg">Add Expense</span>
      </button>
    </div>
  </div>

  <div class="max-w-screen-2xl mx-auto px-6 py-8">

    <!-- FILTERS -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-zinc-900 rounded-3xl p-5">
      <div>
        <label class="text-xs text-zinc-400 font-medium px-2">Filter by Event</label>
        <select id="filter-event" onchange="filterExpenses()" 
                class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-cyan-400">
          <option value="">All Events</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-zinc-400 font-medium px-2">Filter by Category</label>
        <select id="filter-category" onchange="filterExpenses()" 
                class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-cyan-400">
          <option value="">All Categories</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-zinc-400 font-medium px-2">Date From</label>
        <input type="date" id="filter-date-from" onchange="filterExpenses()" 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-cyan-400">
      </div>
      <div>
        <label class="text-xs text-zinc-400 font-medium px-2">Date To</label>
        <input type="date" id="filter-date-to" onchange="filterExpenses()" 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-cyan-400">
      </div>
    </div>

    <!-- EXPENSES LIST -->
    <div class="flex justify-between items-center mb-4">
      <h2 id="list-title" class="text-2xl font-semibold">All Expenses</h2>
      <div class="text-sm text-zinc-400" id="list-count">0 expenses</div>
    </div>
    
    <div id="expenses-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Populated by JS -->
    </div>

  </div>

  <!-- ADD EXPENSE MODAL -->
  <div id="add-modal" onclick="if(event.target.id==='add-modal')closeModal()" 
       class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[999] flex items-center justify-center">
    
    <div onclick="event.stopImmediatePropagation()" 
         class="modal bg-zinc-900 w-full max-w-2xl mx-4 rounded-3xl overflow-hidden max-h-[94vh] flex flex-col">
      
      <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between bg-zinc-950">
        <h3 class="text-2xl font-semibold">Add New Expense</h3>
        <button onclick="closeModal()" class="text-4xl leading-none text-zinc-400 hover:text-white">×</button>
      </div>

      <div class="flex-1 overflow-auto p-8 space-y-8">

        <!-- 1. Event Selection -->
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Select Event</label>
          <select id="form-event" onchange="onEventSelected()" 
                  class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg focus:outline-none focus:border-cyan-400">
            <option value="">Choose an event...</option>
          </select>
          <div id="selected-event-info" class="mt-3 hidden bg-zinc-800 rounded-3xl p-4 text-sm"></div>
        </div>

        <!-- 2. Category -->
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Category</label>
          <select id="form-category" onchange="updateExpenseHeads()" 
                  class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg focus:outline-none focus:border-cyan-400">
            <option value="">Select Category</option>
          </select>
        </div>

        <!-- 3. Expense Head (Dynamic) -->
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Expense Head</label>
          <select id="form-head" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg focus:outline-none focus:border-cyan-400">
            <option value="">Select Head</option>
          </select>
        </div>

        <!-- 4. Amount -->
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Amount (₹)</label>
          <div class="flex items-center gap-3">
            <input type="number" id="form-amount" placeholder="0" 
                   class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-8 py-5 text-4xl font-semibold focus:outline-none focus:border-cyan-400 text-center">
            <div class="flex flex-col gap-2">
              <button onclick="quickAmount(500)" class="bg-zinc-800 hover:bg-zinc-700 text-xs font-medium px-4 py-2 rounded-2xl">+₹500</button>
              <button onclick="quickAmount(1000)" class="bg-zinc-800 hover:bg-zinc-700 text-xs font-medium px-4 py-2 rounded-2xl">+₹1,000</button>
              <button onclick="quickAmount(5000)" class="bg-zinc-800 hover:bg-zinc-700 text-xs font-medium px-4 py-2 rounded-2xl">+₹5,000</button>
              <button onclick="quickAmount(10000)" class="bg-zinc-800 hover:bg-zinc-700 text-xs font-medium px-4 py-2 rounded-2xl">+₹10,000</button>
            </div>
          </div>
        </div>

        <!-- 5. Payment Mode -->
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Payment Mode</label>
          <select id="form-mode" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg focus:outline-none focus:border-cyan-400">
            <option value="Cash">Cash</option>
            <option value="UPI" selected>UPI</option>
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="Credit">Credit</option>
            <option value="Vendor Pending">Vendor Pending</option>
          </select>
        </div>

        <!-- 6. Vendor -->
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Vendor</label>
          <div class="flex gap-3">
            <select id="form-vendor" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg focus:outline-none focus:border-cyan-400">
              <option value="">Select Vendor (optional)</option>
            </select>
            <button onclick="showAddVendorInline()" 
                    class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-600 px-8 rounded-3xl text-cyan-400 font-medium flex items-center gap-2">
              <i class="fa-solid fa-plus"></i> New
            </button>
          </div>
        </div>

        <!-- 7. Notes -->
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Notes</label>
          <textarea id="form-notes" rows="2" placeholder="Any additional details..."
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 focus:outline-none focus:border-cyan-400"></textarea>
        </div>

        <!-- 8. Receipt Upload -->
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Receipt Photo (optional)</label>
          <div class="border border-dashed border-zinc-600 rounded-3xl p-8 text-center cursor-pointer hover:border-cyan-400 transition-colors"
               onclick="document.getElementById('receipt-upload').click()">
            <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="handleReceiptUpload(event)">
            <i id="upload-icon" class="fa-solid fa-cloud-upload text-4xl text-zinc-400 mb-3"></i>
            <p id="upload-text" class="text-zinc-400">Tap to upload receipt</p>
            <div id="receipt-preview" class="hidden mt-4">
              <img id="preview-img" class="mx-auto max-h-48 rounded-2xl shadow-inner">
            </div>
          </div>
        </div>

        <!-- LIVE SUMMARY -->
        <div class="bg-gradient-to-br from-zinc-900 to-zinc-800 rounded-3xl p-6 border border-zinc-700">
          <h4 class="font-medium text-cyan-400 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-chart-bar"></i> Live Summary for this Event
          </h4>
          <div id="live-summary" class="space-y-4 text-sm">
            <!-- Populated by JS -->
          </div>
        </div>

      </div>

      <div class="p-6 border-t border-zinc-700 bg-zinc-950 flex gap-3">
        <button onclick="closeModal()" 
                class="flex-1 py-5 text-lg font-medium border border-zinc-600 rounded-3xl">Cancel</button>
        <button onclick="saveExpense()" 
                class="flex-1 py-5 text-lg font-semibold bg-cyan-500 hover:bg-cyan-400 text-zinc-950 rounded-3xl">Save Expense</button>
      </div>
    </div>
  </div>

  <!-- INLINE ADD VENDOR MINI-MODAL -->
  <div id="vendor-mini-modal" onclick="if(event.target.id==='vendor-mini-modal')hideAddVendorInline()" 
       class="hidden fixed inset-0 bg-black/70 z-[1000] flex items-end md:items-center justify-center">
    <div class="bg-zinc-900 w-full md:w-96 rounded-t-3xl md:rounded-3xl p-6">
      <h4 class="font-semibold mb-4">Add New Vendor</h4>
      <input id="new-vendor-name" type="text" placeholder="Vendor Name" class="w-full bg-zinc-800 rounded-3xl px-6 py-4 mb-3">
      <input id="new-vendor-phone" type="tel" placeholder="Phone Number" class="w-full bg-zinc-800 rounded-3xl px-6 py-4 mb-6">
      <div class="flex gap-3">
        <button onclick="hideAddVendorInline()" class="flex-1 py-4 border border-zinc-600 rounded-3xl">Cancel</button>
        <button onclick="addNewVendor()" class="flex-1 py-4 bg-cyan-500 text-zinc-950 rounded-3xl font-semibold">Add Vendor</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== DATA ====================
    let events = JSON.parse(localStorage.getItem('events')) || [
      { id: "EV-260414-001", client: "Manav Seva Trust", date: "2026-04-14", venue: "Manav Seva Hall" },
      { id: "EV-260407-002", client: "Christ Church", date: "2026-04-07", venue: "Christ Church Grounds" },
      { id: "EV-260405-003", client: "Lohar Wadi Temple", date: "2026-04-05", venue: "Lohar Wadi" }
    ]

    let vendors = JSON.parse(localStorage.getItem('vendors')) || [
      { id: 1, name: "Fresh Mart", phone: "9876543210" },
      { id: 2, name: "Shree Kirana Store", phone: "9123456789" },
      { id: 3, name: "Royal Catering Labour", phone: "9988776655" }
    ]

    let expenses = JSON.parse(localStorage.getItem('expenses')) || []

    // Full Expense Heads Dataset
    const expenseHeadsDB = {
      "Raw Material": [
        "Grocery – किराणा", "Vegetable – भाजी", "Fruits – फळ", 
        "Oil & Spices – तेल आणि मसाले", "Paneer & Dairy – पनीर आणि दुग्ध", 
        "Dry Fruits – सुकामेवा", "Rice & Grains – तांदूळ आणि धान्य"
      ],
      "Live Counter": [
        "Starter – स्टार्टर", "Chat – चाट", "Dosa / Pav Bhaji – डोसा / पाव भाजी",
        "Live Sweet – लाईव्ह गोड", "Pani Puri Counter", "Chaat Counter"
      ],
      "Labour": [
        "Cook – स्वयंपाकी", "Helper – मदतनीस", "Cleaner – सफाई", "Waiter – वेटर"
      ],
      "Operations": [
        "Gas – गॅस", "Electricity – विज", "Water – पाणी", "Transport – वाहतूक"
      ],
      "Admin": [
        "Printing – प्रिंटिंग", "Permission – परवानगी", "Marketing – जाहिरात"
      ],
      "Adjustment": [
        "Discount – सूट", "Refund – परतावा", "Miscellaneous – इतर"
      ]
    }

    const categories = Object.keys(expenseHeadsDB)

    // ==================== RENDER FUNCTIONS ====================
    function renderFilters() {
      // Events
      const eventSelect = document.getElementById('filter-event')
      eventSelect.innerHTML = `<option value="">All Events</option>`
      events.forEach(ev => {
        const opt = document.createElement('option')
        opt.value = ev.id
        opt.textContent = `${ev.id} – ${ev.client}`
        eventSelect.appendChild(opt)
      })

      // Categories
      const catSelect = document.getElementById('filter-category')
      catSelect.innerHTML = `<option value="">All Categories</option>`
      categories.forEach(cat => {
        const opt = document.createElement('option')
        opt.value = cat
        opt.textContent = cat
        catSelect.appendChild(opt)
      })
    }

    function renderExpenses(filteredExpenses) {
      const container = document.getElementById('expenses-list')
      container.innerHTML = ''

      if (filteredExpenses.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-400">
          <i class="fa-solid fa-receipt text-6xl mb-4 opacity-30"></i>
          <p>No expenses found</p>
        </div>`
        return
      }

      filteredExpenses.forEach(exp => {
        const ev = events.find(e => e.id === exp.eventId) || { client: 'Unknown' }
        const card = document.createElement('div')
        card.className = `expense-card bg-zinc-900 rounded-3xl p-6 cursor-pointer`
        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div>
              <div class="text-xs text-zinc-400">${exp.date}</div>
              <div class="font-semibold text-lg">${ev.client}</div>
            </div>
            <div class="text-right">
              <div class="text-3xl font-semibold text-cyan-400">₹${Number(exp.amount).toLocaleString('en-IN')}</div>
            </div>
          </div>
          
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="px-3 py-1 bg-zinc-800 text-xs rounded-3xl tag">${exp.category}</span>
              <span class="text-sm">${exp.head}</span>
            </div>
            ${exp.vendor ? `<span class="text-zinc-400 text-xs">${exp.vendor}</span>` : ''}
          </div>
          
          ${exp.mode ? `<div class="mt-4 text-xs text-zinc-400 flex items-center gap-2"><i class="fa-solid fa-circle-dot"></i> ${exp.mode}</div>` : ''}
          ${exp.notes ? `<div class="mt-3 text-xs text-zinc-400 line-clamp-2">${exp.notes}</div>` : ''}
        `
        card.onclick = () => alert(`Expense ID: ${exp.id}\nAmount: ₹${exp.amount}\n(You can add edit/delete later)`)
        container.appendChild(card)
      })

      document.getElementById('list-count').textContent = `${filteredExpenses.length} expenses`
    }

    function filterExpenses() {
      const eventId = document.getElementById('filter-event').value
      const category = document.getElementById('filter-category').value
      const from = document.getElementById('filter-date-from').value
      const to = document.getElementById('filter-date-to').value

      let filtered = expenses

      if (eventId) filtered = filtered.filter(e => e.eventId === eventId)
      if (category) filtered = filtered.filter(e => e.category === category)
      if (from) filtered = filtered.filter(e => e.date >= from)
      if (to) filtered = filtered.filter(e => e.date <= to)

      // Sort newest first
      filtered.sort((a, b) => new Date(b.date) - new Date(a.date))

      renderExpenses(filtered)
    }

    // ==================== ADD EXPENSE MODAL LOGIC ====================
    let currentReceiptBase64 = null

    function openAddExpenseModal() {
      // Reset form
      document.getElementById('add-modal').classList.remove('hidden')
      document.getElementById('add-modal').classList.add('flex')

      // Populate events
      const select = document.getElementById('form-event')
      select.innerHTML = `<option value="">Choose an event...</option>`
      events.forEach(ev => {
        const opt = document.createElement('option')
        opt.value = ev.id
        opt.textContent = `${ev.id} – ${ev.client}`
        select.appendChild(opt)
      })

      // Populate categories
      const catSelect = document.getElementById('form-category')
      catSelect.innerHTML = `<option value="">Select Category</option>`
      categories.forEach(cat => {
        const opt = document.createElement('option')
        opt.value = cat
        opt.textContent = cat
        catSelect.appendChild(opt)
      })

      // Populate vendors
      const vendorSelect = document.getElementById('form-vendor')
      vendorSelect.innerHTML = `<option value="">Select Vendor (optional)</option>`
      vendors.forEach(v => {
        const opt = document.createElement('option')
        opt.value = v.name
        opt.textContent = v.name
        vendorSelect.appendChild(opt)
      })

      // Clear preview
      currentReceiptBase64 = null
      document.getElementById('receipt-preview').classList.add('hidden')
      document.getElementById('upload-text').textContent = 'Tap to upload receipt'
      document.getElementById('form-amount').value = ''
      document.getElementById('live-summary').innerHTML = `<p class="text-zinc-400 text-center py-6">Select event &amp; amount to see live summary</p>`
    }

    function closeModal() {
      document.getElementById('add-modal').classList.add('hidden')
      document.getElementById('add-modal').classList.remove('flex')
    }

    function onEventSelected() {
      const eventId = document.getElementById('form-event').value
      const infoBox = document.getElementById('selected-event-info')
      
      if (!eventId) {
        infoBox.classList.add('hidden')
        return
      }

      const ev = events.find(e => e.id === eventId)
      infoBox.innerHTML = `
        <div class="flex gap-6">
          <div><span class="text-xs text-zinc-400">Client</span><br><span class="font-medium">${ev.client}</span></div>
          <div><span class="text-xs text-zinc-400">Date</span><br><span class="font-medium">${ev.date}</span></div>
          <div><span class="text-xs text-zinc-400">Venue</span><br><span class="font-medium">${ev.venue}</span></div>
        </div>`
      infoBox.classList.remove('hidden')
      
      updateLiveSummary()
    }

    function updateExpenseHeads() {
      const category = document.getElementById('form-category').value
      const headSelect = document.getElementById('form-head')
      headSelect.innerHTML = `<option value="">Select Head</option>`

      if (category && expenseHeadsDB[category]) {
        expenseHeadsDB[category].forEach(head => {
          const opt = document.createElement('option')
          opt.value = head
          opt.textContent = head
          headSelect.appendChild(opt)
        })
      }
      updateLiveSummary()
    }

    function quickAmount(val) {
      const input = document.getElementById('form-amount')
      input.value = (Number(input.value) || 0) + val
      updateLiveSummary()
    }

    function handleReceiptUpload(e) {
      const file = e.target.files[0]
      if (!file) return
      
      const reader = new FileReader()
      reader.onload = function(ev) {
        currentReceiptBase64 = ev.target.result
        const preview = document.getElementById('receipt-preview')
        const img = document.getElementById('preview-img')
        img.src = currentReceiptBase64
        preview.classList.remove('hidden')
        document.getElementById('upload-text').textContent = 'Receipt attached ✓'
      }
      reader.readAsDataURL(file)
    }

    function updateLiveSummary() {
      const eventId = document.getElementById('form-event').value
      const amount = parseFloat(document.getElementById('form-amount').value) || 0
      const category = document.getElementById('form-category').value

      if (!eventId || amount === 0) {
        document.getElementById('live-summary').innerHTML = `<p class="text-zinc-400 text-center py-6">Select event &amp; amount to see live summary</p>`
        return
      }

      const eventExpenses = expenses.filter(e => e.eventId === eventId)
      const totalEvent = eventExpenses.reduce((sum, e) => sum + Number(e.amount), 0)
      const catTotal = eventExpenses.filter(e => e.category === category).reduce((sum, e) => sum + Number(e.amount), 0)

      document.getElementById('live-summary').innerHTML = `
        <div class="flex justify-between"><span class="text-zinc-400">Total spent on this event</span><span class="font-semibold">₹${(totalEvent + amount).toLocaleString('en-IN')}</span></div>
        <div class="flex justify-between"><span class="text-zinc-400">This category total (incl. current)</span><span class="font-semibold">₹${(catTotal + amount).toLocaleString('en-IN')}</span></div>
        <div class="flex justify-between text-cyan-400"><span class="text-zinc-400">New expense amount</span><span class="font-semibold text-2xl">+ ₹${amount.toLocaleString('en-IN')}</span></div>
      `
    }

    function showAddVendorInline() {
      document.getElementById('vendor-mini-modal').classList.remove('hidden')
      document.getElementById('vendor-mini-modal').classList.add('flex')
    }

    function hideAddVendorInline() {
      document.getElementById('vendor-mini-modal').classList.add('hidden')
      document.getElementById('vendor-mini-modal').classList.remove('flex')
    }

    function addNewVendor() {
      const name = document.getElementById('new-vendor-name').value.trim()
      const phone = document.getElementById('new-vendor-phone').value.trim()
      if (!name) return

      vendors.unshift({ id: Date.now(), name, phone: phone || '-' })
      localStorage.setItem('vendors', JSON.stringify(vendors))

      // Refresh vendor dropdown
      const select = document.getElementById('form-vendor')
      const opt = document.createElement('option')
      opt.value = name
      opt.textContent = name
      opt.selected = true
      select.appendChild(opt)

      hideAddVendorInline()
    }

    function saveExpense() {
      const eventId = document.getElementById('form-event').value
      if (!eventId) {
        alert("Please select an event")
        return
      }

      const newExpense = {
        id: 'EXP-' + Date.now().toString().slice(-6),
        eventId: eventId,
        date: new Date().toISOString().slice(0, 10),
        category: document.getElementById('form-category').value,
        head: document.getElementById('form-head').value,
        amount: document.getElementById('form-amount').value,
        mode: document.getElementById('form-mode').value,
        vendor: document.getElementById('form-vendor').value,
        notes: document.getElementById('form-notes').value,
        receipt: currentReceiptBase64 || null
      }

      expenses.unshift(newExpense)
      localStorage.setItem('expenses', JSON.stringify(expenses))

      closeModal()
      filterExpenses()   // refresh list

      // Optional toast
      const toast = document.createElement('div')
      toast.className = 'fixed bottom-8 right-8 bg-cyan-500 text-zinc-950 px-8 py-4 rounded-3xl shadow-2xl font-semibold'
      toast.textContent = '✅ Expense saved successfully!'
      document.body.appendChild(toast)
