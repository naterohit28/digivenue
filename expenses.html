<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense & Costing Tracker</title>
  <style>
    :root {
      --primary: #007bff;
      --danger: #dc3545;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 15px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    header {
      background: var(--primary);
      color: white;
      padding: 20px;
      text-align: center;
    }
    
    h1 {
      font-size: 1.8rem;
      margin: 0;
    }
    
    .content {
      padding: 20px;
    }
    
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .card {
      background: #f8f9fa;
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #eee;
    }
    
    .card h3 {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 8px;
    }
    
    .card p {
      font-size: 1.6rem;
      font-weight: bold;
      color: #333;
      margin: 0;
    }
    
    .section-title {
      font-size: 1.3rem;
      margin: 25px 0 12px 0;
      color: #333;
      border-bottom: 2px solid #eee;
      padding-bottom: 8px;
    }
    
    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 30px;
    }
    
    input, select, textarea {
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      width: 100%;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    button {
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    
    button:hover {
      background: #0056b3;
    }
    
    .search-box {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 15px;
    }
    
    .expense-item {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .expense-info {
      flex: 1;
    }
    
    .expense-info strong {
      font-size: 1.1rem;
      color: #333;
    }
    
    .expense-info small {
      color: #666;
      display: block;
      margin-top: 4px;
    }
    
    .expense-amount {
      text-align: right;
      font-weight: bold;
      font-size: 1.2rem;
      color: #007bff;
    }
    
    .delete-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-left: 10px;
    }
    
    .event-summary {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
    }
    
    .event-summary ul {
      list-style: none;
    }
    
    .event-summary li {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
    }
    
    .event-summary li:last-child {
      border-bottom: none;
    }
    
    @media (max-width: 600px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 Expense & Costing Tracker</h1>
    </header>
    
    <div class="content">
      <!-- Dashboard -->
      <div class="dashboard">
        <div class="card">
          <h3>Total Expenses</h3>
          <p id="total-expense">₹0.00</p>
        </div>
        <div class="card">
          <h3>Events Tracked</h3>
          <p id="event-count">0</p>
        </div>
      </div>

      <!-- Add Expense Form -->
      <h2 class="section-title">Add New Expense</h2>
      <form id="expense-form">
        <input type="date" id="date" required>
        
        <input type="text" id="event" placeholder="Event / Purpose (e.g. Office Party, Client Meeting)" required>
        
        <input type="number" id="amount" placeholder="Amount (₹)" step="0.01" required>
        
        <select id="mode" required>
          <option value="">Select Payment Mode</option>
          <option value="Cash">Cash</option>
          <option value="UPI">UPI</option>
          <option value="Cheque">Cheque</option>
        </select>
        
        <input type="text" id="paidby" placeholder="Paid By (Your Name or Team Member)" required>
        
        <textarea id="notes" rows="2" placeholder="Notes / Receipt details (optional)"></textarea>
        
        <button type="submit">Add Expense</button>
      </form>

      <!-- Expense List -->
      <h2 class="section-title">All Expenses</h2>
      <input type="text" id="search" class="search-box" placeholder="Search by event, notes or paid by...">

      <div id="expense-list"></div>

      <!-- Per Event Costing -->
      <h2 class="section-title">Costing Per Event</h2>
      <div id="event-summary" class="event-summary">
        <p style="color:#666; text-align:center;">Add some expenses to see per-event costing</p>
      </div>
    </div>
  </div>

  <script>
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

    const form = document.getElementById('expense-form');
    const list = document.getElementById('expense-list');
    const totalEl = document.getElementById('total-expense');
    const eventCountEl = document.getElementById('event-count');
    const searchInput = document.getElementById('search');
    const eventSummaryEl = document.getElementById('event-summary');

    function saveExpenses() {
      localStorage.setItem('expenses', JSON.stringify(expenses));
      renderAll();
    }

    function calculateTotals() {
      const total = expenses.reduce((sum, exp) => sum + parseFloat(exp.amount || 0), 0);
      totalEl.textContent = `₹${total.toFixed(2)}`;

      const uniqueEvents = new Set(expenses.map(exp => exp.event));
      eventCountEl.textContent = uniqueEvents.size;
    }

    function renderList(filteredExpenses = expenses) {
      list.innerHTML = '';

      if (filteredExpenses.length === 0) {
        list.innerHTML = '<p style="text-align:center; color:#666; padding:20px;">No expenses found</p>';
        return;
      }

      filteredExpenses.forEach((exp, index) => {
        const div = document.createElement('div');
        div.className = 'expense-item';
        div.innerHTML = `
          <div class="expense-info">
            <strong>${exp.event}</strong>
            <small>${exp.date} • ${exp.mode} • Paid by: ${exp.paidby}</small>
            ${exp.notes ? `<small style="margin-top:4px;">${exp.notes}</small>` : ''}
          </div>
          <div style="text-align:right;">
            <div class="expense-amount">₹${parseFloat(exp.amount).toFixed(2)}</div>
            <button class="delete-btn" data-index="${index}">Delete</button>
          </div>
        `;
        list.appendChild(div);
      });

      // Add delete listeners
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(e.target.dataset.index);
          if (confirm('Delete this expense?')) {
            expenses.splice(idx, 1);
            saveExpenses();
          }
        });
      });
    }

    function renderEventSummary() {
      const grouped = {};
      
      expenses.forEach(exp => {
        if (!grouped[exp.event]) grouped[exp.event] = 0;
        grouped[exp.event] += parseFloat(exp.amount || 0);
      });

      if (Object.keys(grouped).length === 0) {
        eventSummaryEl.innerHTML = '<p style="color:#666; text-align:center;">Add some expenses to see per-event costing</p>';
        return;
      }

      let html = '<ul>';
      Object.keys(grouped).sort().forEach(event => {
        html += `
          <li>
            <span><strong>${event}</strong></span>
            <span style="font-weight:bold; color:#007bff;">₹${grouped[event].toFixed(2)}</span>
          </li>`;
      });
      html += '</ul>';
      eventSummaryEl.innerHTML = html;
    }

    function renderAll() {
      calculateTotals();
      renderList();
      renderEventSummary();
    }

    // Form Submit
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const newExpense = {
        date: document.getElementById('date').value,
        event: document.getElementById('event').value.trim(),
        amount: document.getElementById('amount').value,
        mode: document.getElementById('mode').value,
        paidby: document.getElementById('paidby').value.trim(),
        notes: document.getElementById('notes').value.trim()
      };

      if (!newExpense.event || !newExpense.amount || !newExpense.mode || !newExpense.paidby) {
        alert("Please fill all required fields");
        return;
      }

      expenses.push(newExpense);
      saveExpenses();
      
      // Reset form
      form.reset();
      document.getElementById('date').valueAsDate = new Date();
    });

    // Search functionality
    searchInput.addEventListener('input', () => {
      const term = searchInput.value.toLowerCase().trim();
      
      const filtered = expenses.filter(exp => 
        exp.event.toLowerCase().includes(term) ||
        (exp.notes && exp.notes.toLowerCase().includes(term)) ||
        (exp.paidby && exp.paidby.toLowerCase().includes(term))
      );
      
      renderList(filtered);
    });

    // Set today's date by default
    function setDefaultDate() {
      document.getElementById('date').valueAsDate = new Date();
    }

    // Initialize app
    setDefaultDate();
    renderAll();
  </script>
</body>
</html>
