<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Maintenance</title>
  <style>
    :root {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #e0e0e0;
      --accent: #007bff;
      --danger: #dc3545;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 15px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    header {
      background: #1a1a1a;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    h1 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .logo {
      width: 40px;
      height: 40px;
      background: #007bff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .content { padding: 20px; }
    .section { margin-bottom: 35px; }
    .section-title {
      font-size: 1.4rem;
      margin-bottom: 15px;
      color: #aaa;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }
    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    input, select, textarea, button {
      padding: 12px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    button {
      background: var(--accent);
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      grid-column: span 2;
    }
    button:hover { background: #0056b3; }
    .list {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
    }
    .item {
      padding: 12px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item:last-child { border-bottom: none; }
    .delete-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .expense-item {
      background: #252525;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .total {
      font-size: 1.3rem;
      font-weight: bold;
      color: #4caf50;
      text-align: right;
      margin: 15px 0;
    }
    @media (max-width: 600px) {
      form { grid-template-columns: 1fr; }
      button { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="logo">📋</span> Expense Maintenance</h1>
    </header>
    
    <div class="content">

      <!-- Register New Event -->
      <div class="section">
        <h2 class="section-title">Register New Event</h2>
        <form id="event-form">
          <input type="date" id="event-date" required>
          <input type="text" id="venue" placeholder="Event Venue" required>
          <select id="event-type" required>
            <option value="">Event Type</option>
            <option value="Manav Seva">Manav Seva</option>
            <option value="Christ Church">Christ Church</option>
            <option value="Lohar Wadi">Lohar Wadi</option>
            <option value="Dadar">Dadar</option>
            <option value="Corporate">Corporate</option>
            <option value="Wedding">Wedding</option>
            <option value="Other">Other</option>
          </select>
          <input type="text" id="client-name" placeholder="Name of Client / Organizer" required>
          <input type="tel" id="contact" placeholder="Contact No." required>
          <button type="submit">Register Event</button>
        </form>
      </div>

      <!-- Events List -->
      <div class="section">
        <h2 class="section-title">Registered Events</h2>
        <div id="events-list" class="list"></div>
      </div>

      <!-- Add Expense -->
      <div class="section">
        <h2 class="section-title">Add Expense for Event</h2>
        <form id="expense-form">
          <select id="event-select" required>
            <option value="">Select Event</option>
          </select>
          <input type="date" id="exp-date" required>
          <input type="number" id="amount" placeholder="Amount (₹)" step="0.01" required>
          <select id="mode" required>
            <option value="">Payment Mode</option>
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Cheque">Cheque</option>
          </select>
          <input type="text" id="paidby" placeholder="Paid By" required>
          <textarea id="notes" placeholder="Notes / Receipt details" rows="2"></textarea>
          <button type="submit">Add Expense</button>
        </form>
      </div>

      <!-- All Expenses -->
      <div class="section">
        <h2 class="section-title">All Expenses</h2>
        <input type="text" id="search" placeholder="Search expenses..." style="width:100%; padding:12px; margin-bottom:15px; background:#2a2a2a; border:1px solid #444; border-radius:8px; color:white;">
        <div id="expense-list"></div>
      </div>

      <!-- Costing Per Event -->
      <div class="section">
        <h2 class="section-title">Costing Per Event</h2>
        <div id="event-costing"></div>
      </div>

    </div>
  </div>

  <script>
    let events = JSON.parse(localStorage.getItem('events')) || [];
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

    const eventForm = document.getElementById('event-form');
    const expenseForm = document.getElementById('expense-form');
    const eventsList = document.getElementById('events-list');
    const eventSelect = document.getElementById('event-select');
    const expenseList = document.getElementById('expense-list');
    const eventCosting = document.getElementById('event-costing');
    const searchInput = document.getElementById('search');

    function generateEventCode() {
      const now = new Date();
      const dateStr = now.getFullYear().toString().slice(2) + 
                     String(now.getMonth()+1).padStart(2,'0') + 
                     String(now.getDate()).padStart(2,'0');
      const count = events.length + 1;
      return `EV-${dateStr}-${String(count).padStart(3,'0')}`;
    }

    function saveData() {
      localStorage.setItem('events', JSON.stringify(events));
      localStorage.setItem('expenses', JSON.stringify(expenses));
      renderAll();
    }

    function renderEvents() {
      eventsList.innerHTML = '';
      eventSelect.innerHTML = '<option value="">Select Event</option>';

      events.forEach((ev, i) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div>
            <strong>${ev.code}</strong> — ${ev.date} — ${ev.venue}<br>
            <small>${ev.type} | ${ev.client} | ${ev.contact}</small>
          </div>
          <button class="delete-btn" data-type="event" data-index="${i}">Delete</button>
        `;
        eventsList.appendChild(div);

        const opt = document.createElement('option');
        opt.value = ev.code;
        opt.textContent = `${ev.code} - ${ev.venue} (${ev.date})`;
        eventSelect.appendChild(opt);
      });

      // Delete listeners for events
      document.querySelectorAll('[data-type="event"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (confirm('Delete this event and all its expenses?')) {
            const idx = parseInt(e.target.dataset.index);
            const code = events[idx].code;
            events.splice(idx, 1);
            expenses = expenses.filter(exp => exp.eventCode !== code);
            saveData();
          }
        });
      });
    }

    function renderExpenses(filtered = expenses) {
      expenseList.innerHTML = '';

      filtered.forEach((exp, i) => {
        const eventName = events.find(e => e.code === exp.eventCode)?.venue || exp.eventCode;
        const div = document.createElement('div');
        div.className = 'expense-item';
        div.innerHTML = `
          <div>
            <strong>${eventName} (${exp.eventCode})</strong><br>
            <small>${exp.date} • ${exp.mode} • ${exp.paidby}</small>
            ${exp.notes ? `<br><small>${exp.notes}</small>` : ''}
          </div>
          <div style="text-align:right">
            <strong>₹${parseFloat(exp.amount).toFixed(2)}</strong><br>
            <button class="delete-btn" data-index="${i}">Delete</button>
          </div>
        `;
        expenseList.appendChild(div);
      });

      // Delete listeners
      document.querySelectorAll('#expense-list .delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (confirm('Delete expense?')) {
            expenses.splice(parseInt(e.target.dataset.index), 1);
            saveData();
          }
        });
      });
    }

    function renderEventCosting() {
      eventCosting.innerHTML = '';
      const grouped = {};

      expenses.forEach(exp => {
        if (!grouped[exp.eventCode]) grouped[exp.eventCode] = 0;
        grouped[exp.eventCode] += parseFloat(exp.amount || 0);
      });

      Object.keys(grouped).forEach(code => {
        const ev = events.find(e => e.code === code);
        if (!ev) return;
        const total = grouped[code];

        const div = document.createElement('div');
        div.style = 'background:#252525; padding:15px; border-radius:8px; margin-bottom:12px;';
        div.innerHTML = `
          <strong>${ev.code} - ${ev.venue}</strong><br>
          <small>${ev.date} | ${ev.type} | ${ev.client}</small>
          <div class="total">Total Cost: ₹${total.toFixed(2)}</div>
        `;
        eventCosting.appendChild(div);
      });

      if (Object.keys(grouped).length === 0) {
        eventCosting.innerHTML = '<p style="color:#777; text-align:center;">No expenses yet</p>';
      }
    }

    function renderAll() {
      renderEvents();
      renderExpenses();
      renderEventCosting();
    }

    // Register Event
    eventForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const newEvent = {
        code: generateEventCode(),
        date: document.getElementById('event-date').value,
        venue: document.getElementById('venue').value.trim(),
        type: document.getElementById('event-type').value,
        client: document.getElementById('client-name').value.trim(),
        contact: document.getElementById('contact').value.trim()
      };
      events.push(newEvent);
      saveData();
      eventForm.reset();
    });

    // Add Expense
    expenseForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const newExpense = {
        eventCode: document.getElementById('event-select').value,
        date: document.getElementById('exp-date').value,
        amount: document.getElementById('amount').value,
        mode: document.getElementById('mode').value,
        paidby: document.getElementById('paidby').value.trim(),
        notes: document.getElementById('notes').value.trim()
      };
      if (!newExpense.eventCode) {
        alert("Please select an event");
        return;
      }
      expenses.push(newExpense);
      saveData();
      expenseForm.reset();
      document.getElementById('exp-date').valueAsDate = new Date();
    });

    // Search
    searchInput.addEventListener('input', () => {
      const term = searchInput.value.toLowerCase();
      const filtered = expenses.filter(exp => {
        const ev = events.find(e => e.code === exp.eventCode);
        return (ev && ev.venue.toLowerCase().includes(term)) ||
               (exp.notes && exp.notes.toLowerCase().includes(term)) ||
               exp.paidby.toLowerCase().includes(term);
      });
      renderExpenses(filtered);
    });

    // Set default dates
    document.getElementById('event-date').valueAsDate = new Date();
    document.getElementById('exp-date').valueAsDate = new Date();

    // Initial render
    renderAll();
  </script>
</body>
</html>
