<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Finance • Catering</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #f1f5f9;
      margin: 0;
      padding: 0;
    }
    .header {
      background: #171717;
      padding: 20px;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .card {
      background: #171717;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .btn {
      background: #22d3ee;
      color: #0a0a0a;
      border: none;
      padding: 14px 24px;
      border-radius: 9999px;
      font-weight: 600;
      cursor: pointer;
    }
    .floating {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background: #22d3ee;
      color: #0a0a0a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 10px 30px rgba(34, 211, 238, 0.4);
      z-index: 200;
    }
    input, select {
      width: 100%;
      padding: 16px;
      background: #262626;
      border: 1px solid #444;
      border-radius: 16px;
      color: white;
      margin-bottom: 12px;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: flex-end;
      z-index: 300;
    }
    .modal-content {
      background: #171717;
      width: 100%;
      max-width: 500px;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 24px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .warning {
      background: #451a03;
      color: #fdba74;
      padding: 12px 20px;
      border-radius: 12px;
      margin: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 class="text-3xl font-bold">Event Finance</h1>
  </div>

  <div id="warning" class="warning hidden">
    ⚠️ Data will not be saved after refresh (sandbox mode). 
    For saving, open with Live Server in VS Code.
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="p-6">
    <div class="grid grid-cols-2 gap-4">
      <div class="card">
        <p class="text-gray-400">Total Events</p>
        <p id="total-events" class="text-4xl font-bold mt-2">0</p>
      </div>
      <div class="card">
        <p class="text-gray-400">Total Expenses</p>
        <p id="total-exp" class="text-4xl font-bold mt-2 text-red-400">₹0</p>
      </div>
    </div>

    <h2 class="text-xl font-semibold mt-8 mb-4">Recent Events</h2>
    <div id="recent-events" class="space-y-4"></div>
  </div>

  <!-- FLOATING + BUTTON -->
  <div onclick="showAddExpenseModal()" class="floating">
    <i class="fa-solid fa-plus"></i>
  </div>

  <!-- ADD EXPENSE MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 class="text-2xl font-semibold mb-6" id="modal-title">Add Expense</h3>
      
      <select id="event-select" class="mb-4"></select>
      
      <select id="category-select" onchange="updateHeads()" class="mb-4">
        <option value="">Select Category</option>
        <option value="Raw Material">Raw Material</option>
        <option value="Live Counter">Live Counter</option>
        <option value="Labour">Labour</option>
        <option value="Operations">Operations</option>
        <option value="Admin">Admin</option>
        <option value="Adjustment">Adjustment</option>
      </select>
      
      <select id="head-select" class="mb-4"></select>
      
      <input type="number" id="amount" placeholder="Amount ₹" class="mb-4 text-3xl text-center">
      
      <div class="flex gap-3 mb-6">
        <button onclick="quickAdd(500)" class="flex-1 bg-zinc-800 py-3 rounded-2xl">+500</button>
        <button onclick="quickAdd(1000)" class="flex-1 bg-zinc-800 py-3 rounded-2xl">+1000</button>
        <button onclick="quickAdd(5000)" class="flex-1 bg-zinc-800 py-3 rounded-2xl">+5000</button>
      </div>
      
      <button onclick="saveExpense()" class="btn w-full mb-3">Save Expense</button>
      <button onclick="hideModal()" class="w-full py-4 text-gray-400">Cancel</button>
    </div>
  </div>

  <script>
    // In-memory data (safe for sandboxed environments)
    let events = []
    let expenses = []

    const expenseHeadsDB = {
      "Raw Material": ["Grocery – किराणा", "Vegetable – भाजी", "Fruits", "Oil / Ghee", "Paneer / Dairy"],
      "Live Counter": ["Chaat – चाट", "Starter – स्टार्टर", "Dosa – डोसा"],
      "Labour": ["Cook – स्वयंपाकी", "Helper Staff"],
      "Operations": ["Transport", "Gas", "Packaging"],
      "Admin": ["Office Expense", "Commission"],
      "Adjustment": ["Damage", "Refund"]
    }

    function loadDemoData() {
      if (events.length === 0) {
        events = [
          {
            id: "EV-260414-001",
            client: "Manav Seva Trust",
            date: "2026-04-14",
            venue: "Manav Seva Hall"
          }
        ]
      }
    }

    function renderDashboard() {
      document.getElementById('total-events').textContent = events.length
      
      const totalExp = expenses.reduce((sum, e) => sum + Number(e.amount || 0), 0)
      document.getElementById('total-exp').textContent = `₹${totalExp.toLocaleString('en-IN')}`

      let html = ''
      events.slice(0, 5).forEach(ev => {
        html += `
          <div class="card">
            <div class="font-semibold">${ev.client || 'Unnamed Event'}</div>
            <div class="text-sm text-gray-400">${ev.date || ''} • ${ev.venue || ''}</div>
          </div>`
      })
      document.getElementById('recent-events').innerHTML = html || '<p class="text-gray-400">No events yet</p>'
    }

    function showAddExpenseModal() {
      if (events.length === 0) {
        alert("No events found. Please add an event first.")
        return
      }

      document.getElementById('modal').style.display = 'flex'
      document.getElementById('modal-title').textContent = 'Add Expense'

      const select = document.getElementById('event-select')
      select.innerHTML = '<option value="">Select Event</option>'
      events.forEach(ev => {
        const opt = document.createElement('option')
        opt.value = ev.id
        opt.textContent = ev.client || 'Event'
        select.appendChild(opt)
      })
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none'
    }

    function updateHeads() {
      const cat = document.getElementById('category-select').value
      const headSelect = document.getElementById('head-select')
      headSelect.innerHTML = '<option value="">Select Head</option>'
      if (expenseHeadsDB[cat]) {
        expenseHeadsDB[cat].forEach(h => {
          const opt = document.createElement('option')
          opt.value = h
          opt.textContent = h
          headSelect.appendChild(opt)
        })
      }
    }

    function quickAdd(val) {
      const amt = document.getElementById('amount')
      amt.value = (parseFloat(amt.value) || 0) + val
    }

    function saveExpense() {
      const eventId = document.getElementById('event-select').value
      const category = document.getElementById('category-select').value
      const head = document.getElementById('head-select').value
      const amount = parseFloat(document.getElementById('amount').value)

      if (!eventId || !category || !head || !amount) {
        alert("Please fill all required fields")
        return
      }

      const newExpense = {
        id: "EXP-" + Date.now().toString().slice(-6),
        eventId: eventId,
        date: new Date().toISOString().slice(0,10),
        category: category,
        head: head,
        amount: amount
      }

      expenses.unshift(newExpense)
      hideModal()
      renderDashboard()
      alert("✅ Expense added successfully!")
    }

    // Initialize
    function init() {
      loadDemoData()
      renderDashboard()

      // Show warning if running in sandbox
      try {
        localStorage.getItem('test')
      } catch(e) {
        document.getElementById('warning').classList.remove('hidden')
      }
    }

    window.onload = init
  </script>
</body>
</html>
