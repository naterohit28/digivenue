<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavor Fusion Pro v2.5 | Professional Catering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .quick-btn { @apply bg-gray-100 hover:bg-blue-100 px-3 py-1 rounded text-sm font-medium transition; }
        #toast { position: fixed; bottom: 20px; right: 20px; display: none; z-index: 100; transition: all 0.3s; }
        .mode-tag { @apply px-2 py-0.5 rounded-md text-[10px] font-bold uppercase; }
        .logo-svg { height: 45px; width: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="toast" class="bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold flex items-center gap-3">
        <span id="toast-msg">Action Successful</span>
    </div>

    <nav class="bg-white border-b p-3 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="logo-svg">
                    <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M124.9 334.8c-23.7-18.4-56.8-11.8-73.9 14.7-15.5 24.1-10.9 56 10.2 74.3 21.1 18.4 54.2 11.8 71.3-12.3 17.1-24.1 16.3-58.4-7.6-76.7z" fill="#334155"/>
                        <path d="M141.4 349.5l140.4-140.4 14.1 14.1-140.4 140.4z" fill="#334155"/>
                        <path d="M211.5 151.7c-50.5-50.5-132.4-50.5-182.9 0l182.9 182.9 14.1-14.1-14.1-14.1 14.1-14.1-14.1-14.1 14.1-14.1-14.1-14.1 14.1-14.1-14.1-14.1z" fill="#334155"/>
                        <path d="M465.7 348.6c-21.1-18.3-54.2-11.7-71.3 12.3-17.1 24.1-16.3 58.4 7.6 76.7 23.7 18.4 56.8 11.8 73.9-14.7 15.5-24.1 10.9-56-10.2-74.3z" fill="#334155"/>
                        <path d="M370.6 349.5L230.2 209.1l-14.1 14.1 140.4 140.4z" fill="#334155"/>
                        <path d="M300.5 151.7c50.5-50.5 132.4-50.5 182.9 0l-182.9 182.9-14.1-14.1 14.1-14.1-14.1-14.1 14.1-14.1 14.1-14.1 14.1-14.1-14.1-14.1 14.1-14.1z" fill="#334155"/>
                        <path d="M256 32C172.1 32 104 100.1 104 184c0 38.8 14.5 74.2 38.4 101.1l-4.1 4.1c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l4.1-4.1c26.9 23.9 62.3 38.4 101.1 38.4s74.2-14.5 101.1-38.4l4.1 4.1c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-4.1-4.1c23.9-26.9 38.4-62.3 38.4-101.1 0-83.9-68.1-152-152-152zM192 184c0-35.3 28.7-64 64-64s64 28.7 64 64-28.7 64-64 64-64-28.7-64-64z" fill="#334155"/>
                        <rect x="360" y="210" width="120" height="30" rx="15" fill="#FF7A00"/>
                        <rect x="360" y="255" width="120" height="30" rx="15" fill="#FF7A00"/>
                        <path d="M190 280h132v20H190z" fill="#334155"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-black leading-none text-orange-600 tracking-tighter">FLAVOR FUSION</h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Next-Gen Catering</p>
                </div>
            </div>
            <div class="flex space-x-4">
                <button onclick="switchTab('dashboard')" class="text-xs font-bold uppercase tracking-tight hover:text-orange-500 transition">Dashboard</button>
                <button onclick="switchTab('events')" class="text-xs font-bold uppercase tracking-tight hover:text-orange-500 transition">Events</button>
                <button onclick="switchTab('expenses')" class="text-xs font-bold uppercase tracking-tight hover:text-orange-500 transition">Expenses</button>
                <button onclick="switchTab('vendors')" class="text-xs font-bold uppercase tracking-tight hover:text-orange-500 transition">Vendors</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <section id="dashboard" class="tab-content active"><div id="stats-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div><div id="overdue-list" class="space-y-3"></div></section>
        <section id="events" class="tab-content"><div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></section>
        <section id="expenses" class="tab-content"><div class="bg-white rounded-xl shadow border overflow-hidden"><table class="w-full text-left"><tbody id="expenses-table-body"></tbody></table></div></section>

        <section id="vendors" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Vendor Directory</h2>
                <button onclick="openVendorModal()" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold">+ Add New Vendor</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="vendors-list"></div>
        </section>

        <section id="event-detail" class="tab-content"><div id="detail-content"></div></section>
    </main>

    <div id="vendor-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleVendorSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-black mb-6">Add New Vendor</h3>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Vendor Name</label>
                    <input type="text" id="vn-name" required placeholder="Enter name" class="w-full border-b py-2 outline-none font-bold focus:border-orange-500">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Category</label>
                        <select id="vn-cat" onchange="updateHeads('vn-cat', 'vn-head')" required class="w-full border-b py-2 outline-none bg-transparent">
                            </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Sub-Head (Specialty)</label>
                        <select id="vn-head" required class="w-full border-b py-2 outline-none font-bold">
                            </select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Phone</label>
                    <input type="tel" id="vn-phone" placeholder="9876543210" class="w-full border-b py-2 outline-none">
                </div>
            </div>

            <div class="flex justify-end mt-8 space-x-4">
                <button type="button" onclick="closeModals()" class="text-slate-400 font-bold">Cancel</button>
                <button type="submit" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold">Save Vendor</button>
            </div>
        </form>
    </div>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-black mb-6">Record Expense</h3>
            <div class="space-y-5">
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Event</label><select id="ex-event" class="w-full border-b py-2 outline-none font-bold"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Category</label><select id="ex-cat" onchange="updateHeads('ex-cat', 'ex-head')" class="w-full border-b py-2 outline-none"></select></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sub-Head</label><select id="ex-head" class="w-full border-b py-2 outline-none"></select></div>
                </div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Amount (₹)</label><input type="number" id="ex-amount" class="w-full border-b py-2 outline-none font-black text-red-500"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Date</label><input type="date" id="ex-date" class="w-full border-b py-2 outline-none"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Vendor</label><select id="ex-vendor" class="w-full border-b py-2 outline-none"></select></div>
                </div>
            </div>
            <div class="flex justify-end mt-8 space-x-4">
                <button type="button" onclick="closeModals()" class="text-slate-400 font-bold">Cancel</button>
                <button type="submit" class="bg-red-500 text-white px-8 py-3 rounded-2xl font-bold">Save Expense</button>
            </div>
        </form>
    </div>

    <script>
        const DB_KEYS = { EVENTS: 'ff_events_v2', EXPENSES: 'ff_exp_v2', PAYMENTS: 'ff_pay_v2', VENDORS: 'ff_ven_v2' };
        
        const expenseHeadsDB = {
            "Raw Material": ["Grocery – किराणा", "Other Grocery", "Vegetable – भाजी", "Fruits", "Juice", "Water", "Ice + Milk", "Bread", "Pickle", "Sweet", "Dry Fruits", "Spices", "Oil / Ghee", "Paneer / Dairy"],
            "Live Counter": ["Chaat", "Starter", "Dosa", "Chinese", "Ice Cream", "Paan Mukhwas", "Counter Setup", "Pav Bhaji", "Pizza", "Dessert", "Beverage"],
            "Labour": ["Rojiya Labour", "Boys", "Ghati", "Cook", "Helper", "Roti Labour", "Cleaner", "PRO", "Supervisor", "Loading"],
            "Operations": ["Transport", "Fuel / Diesel", "Gas", "Rented Material", "Disposable", "Packaging", "New Utensils", "Generator", "Water Tanker"],
            "Admin": ["Royalty", "Office", "Phone", "Printing", "License", "Commission", "Marketing", "Tips", "Misc"],
            "Adjustment": ["Damage", "Refund", "Staff Advance", "Cash Difference"]
        };

        let state = {
            events: JSON.parse(localStorage.getItem(DB_KEYS.EVENTS)) || [],
            expenses: JSON.parse(localStorage.getItem(DB_KEYS.EXPENSES)) || [],
            payments: JSON.parse(localStorage.getItem(DB_KEYS.PAYMENTS)) || [],
            vendors: JSON.parse(localStorage.getItem(DB_KEYS.VENDORS)) || []
        };

        function save() {
            localStorage.setItem(DB_KEYS.EVENTS, JSON.stringify(state.events));
            localStorage.setItem(DB_KEYS.EXPENSES, JSON.stringify(state.expenses));
            localStorage.setItem(DB_KEYS.PAYMENTS, JSON.stringify(state.payments));
            localStorage.setItem(DB_KEYS.VENDORS, JSON.stringify(state.vendors));
            renderAll();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.display = 'flex';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            renderAll();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function updateHeads(catId, subCatId) {
            const cat = document.getElementById(catId).value;
            const sub = document.getElementById(subCatId);
            sub.innerHTML = (expenseHeadsDB[cat] || []).map(h => `<option value="${h}">${h}</option>`).join('');
        }

        // --- VENDOR LOGIC ---
        function openVendorModal() {
            const m = document.getElementById('vendor-modal');
            m.querySelector('form').reset();
            const catSel = document.getElementById('vn-cat');
            catSel.innerHTML = Object.keys(expenseHeadsDB).map(c => `<option value="${c}">${c}</option>`).join('');
            updateHeads('vn-cat', 'vn-head');
            m.classList.add('active');
        }

        function handleVendorSubmit(e) {
            e.preventDefault();
            const data = {
                id: "VN" + Date.now(),
                name: document.getElementById('vn-name').value,
                category: document.getElementById('vn-cat').value,
                specialty: document.getElementById('vn-head').value, // SAVING SUB-HEAD
                phone: document.getElementById('vn-phone').value
            };
            state.vendors.push(data);
            save(); closeModals(); showToast("Vendor Registered");
        }

        function renderVendors() {
            const list = document.getElementById('vendors-list');
            list.innerHTML = state.vendors.map(v => `
                <div class="bg-white p-5 rounded-2xl border shadow-sm group hover:border-orange-200 transition">
                    <p class="font-black text-slate-800">${v.name}</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">${v.category}</p>
                    <p class="text-[10px] font-black text-orange-600 uppercase mb-4">${v.specialty}</p>
                    <div class="flex justify-between items-center pt-2 border-t">
                        <span class="text-xs font-bold text-slate-400">${v.phone || '--'}</span>
                        <a href="https://wa.me/91${v.phone}" class="text-[10px] bg-green-50 text-green-600 px-2 py-1 rounded font-bold">WhatsApp</a>
                    </div>
                </div>
            `).join('') || '<div class="col-span-full text-center py-12 text-slate-400">No vendors yet.</div>';
        }

        // --- DASHBOARD & OTHER RENDERS ---
        function renderAll() {
            renderVendors();
            // ... (Add renderDashboard, renderEvents, renderExpenses logic here)
        }

        // INIT
        renderAll();
    </script>
</body>
</html>
