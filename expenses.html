<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavor Fusion Pro | Business Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #toast { position: fixed; bottom: 20px; right: 20px; display: none; z-index: 100; transition: all 0.3s; }
        .logo-img { height: 50px; width: auto; }
        /* Custom Scrollbar for better UI */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="toast" class="bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold flex items-center gap-3">
        <span id="toast-msg">Success</span>
    </div>

    <nav class="bg-white border-b p-3 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="logo-img">
                    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                        <path d="M124.9 334.8c-23.7-18.4-56.8-11.8-73.9 14.7-15.5 24.1-10.9 56 10.2 74.3 21.1 18.4 54.2 11.8 71.3-12.3 17.1-24.1 16.3-58.4-7.6-76.7z" fill="#334155"/>
                        <path d="M141.4 349.5l140.4-140.4 14.1 14.1-140.4 140.4z" fill="#334155"/>
                        <path d="M211.5 151.7c-50.5-50.5-132.4-50.5-182.9 0l182.9 182.9 14.1-14.1-14.1-14.1 14.1-14.1-14.1-14.1 14.1-14.1-14.1-14.1 14.1-14.1-14.1-14.1z" fill="#334155"/>
                        <path d="M465.7 348.6c-21.1-18.3-54.2-11.7-71.3 12.3-17.1 24.1-16.3 58.4 7.6 76.7 23.7 18.4 56.8 11.8 73.9-14.7 15.5-24.1 10.9-56-10.2-74.3z" fill="#334155"/>
                        <path d="M370.6 349.5L230.2 209.1l-14.1 14.1 140.4 140.4z" fill="#334155"/>
                        <path d="M300.5 151.7c50.5-50.5 132.4-50.5 182.9 0l-182.9 182.9-14.1-14.1 14.1-14.1-14.1-14.1 14.1-14.1 14.1-14.1 14.1-14.1-14.1-14.1 14.1-14.1z" fill="#334155"/>
                        <path d="M256 32C172.1 32 104 100.1 104 184c0 38.8 14.5 74.2 38.4 101.1l-4.1 4.1c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l4.1-4.1c26.9 23.9 62.3 38.4 101.1 38.4s74.2-14.5 101.1-38.4l4.1 4.1c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-4.1-4.1c23.9-26.9 38.4-62.3 38.4-101.1 0-83.9-68.1-152-152-152zM192 184c0-35.3 28.7-64 64-64s64 28.7 64 64-28.7 64-64 64-64-28.7-64-64z" fill="#334155"/>
                        <rect x="360" y="210" width="120" height="30" rx="15" fill="#FF7A00"/>
                        <rect x="360" y="255" width="120" height="30" rx="15" fill="#FF7A00"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-black leading-none text-orange-600 tracking-tighter">FLAVOR FUSION</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Next-Gen Catering</p>
                </div>
            </div>
            <div class="flex space-x-6">
                <button onclick="switchTab('dashboard')" class="text-xs font-bold uppercase tracking-widest hover:text-orange-500 transition">Dashboard</button>
                <button onclick="switchTab('events')" class="text-xs font-bold uppercase tracking-widest hover:text-orange-500 transition">Events</button>
                <button onclick="switchTab('expenses')" class="text-xs font-bold uppercase tracking-widest hover:text-orange-500 transition">Expenses</button>
                <button onclick="switchTab('vendors')" class="text-xs font-bold uppercase tracking-widest hover:text-orange-500 transition">Vendors</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        
        <section id="dashboard" class="tab-content active">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8" id="stats-grid"></div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="text-lg font-black mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-amber-500 rounded-full"></span> Overdue Collections
                    </h2>
                    <div id="overdue-list" class="space-y-3"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="text-lg font-bold mb-4 italic text-slate-400">Quick Actions</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="openEventModal()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">+ New Event</button>
                        <button onclick="openExpenseModal()" class="w-full bg-red-500 text-white p-3 rounded-xl font-bold">+ Record Expense</button>
                        <button onclick="openVendorModal()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold">+ Add Vendor</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="events" class="tab-content">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold">Event Portfolio</h2>
                <input type="text" id="event-search" oninput="renderEvents()" placeholder="Search client name..." class="border p-2 rounded-xl text-sm w-full md:w-64 outline-none focus:border-orange-500">
            </div>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="expenses" class="tab-content">
            <div class="bg-white p-4 rounded-2xl border mb-6 flex justify-around text-center shadow-sm">
                <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Entries</p><p id="exp-count" class="text-xl font-black">0</p></div>
                <div class="w-px bg-slate-100"></div>
                <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Total Spend</p><p id="exp-total-val" class="text-xl font-black text-red-600">₹0</p></div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b text-slate-500 text-[10px] font-black uppercase tracking-widest">
                        <tr><th class="p-4">Date</th><th class="p-4">Event</th><th class="p-4">Head</th><th class="p-4">Amount</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="expenses-table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="vendors" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Vendor Directory</h2>
                <button onclick="openVendorModal()" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold">+ Add New Vendor</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="vendors-list"></div>
        </section>

        <section id="event-detail" class="tab-content">
            <button onclick="switchTab('events')" class="text-blue-600 mb-6 font-bold flex items-center">← Back to Portfolio</button>
            <div id="detail-content"></div>
        </section>

    </main>

    <div id="event-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleEventSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
            <h3 id="event-modal-title" class="text-2xl font-bold mb-6">Event Details</h3>
            <input type="hidden" id="edit-event-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Client Name</label><input type="text" id="ev-client" required class="w-full border-b py-2 focus:border-orange-500 outline-none font-bold"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Event Date</label><input type="date" id="ev-date" required class="w-full border-b py-2 outline-none font-bold"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mobile</label><input type="tel" id="ev-mobile" required class="w-full border-b py-2 outline-none font-bold"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Billing (₹)</label><input type="number" id="ev-billing" required class="w-full border-b py-2 outline-none font-black text-blue-600"></div>
                <div class="md:col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Venue</label><input type="text" id="ev-venue" class="w-full border-b py-2 outline-none"></div>
            </div>
            <div class="flex justify-end mt-8 space-x-4"><button type="button" onclick="closeModals()" class="font-bold text-slate-400">Cancel</button><button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">Save Event</button></div>
        </form>
    </div>

    <div id="expense-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleExpenseSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
            <h3 class="text-2xl font-bold mb-6">Record Expense</h3>
            <input type="hidden" id="edit-expense-id">
            <div class="space-y-5">
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Event</label><select id="ex-event" required class="w-full border-b py-2 outline-none font-bold"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Category</label><select id="ex-cat" onchange="updateHeads('ex-cat', 'ex-head')" required class="w-full border-b py-2 outline-none"></select></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Sub-Head</label><select id="ex-head" required class="w-full border-b py-2 outline-none font-bold"></select></div>
                </div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Amount (₹)</label><input type="number" id="ex-amount" required class="w-full border-b py-2 font-black text-red-600 text-2xl outline-none"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Date</label><input type="date" id="ex-date" required class="w-full border-b py-2 outline-none"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Vendor</label><select id="ex-vendor" class="w-full border-b py-2 outline-none font-bold text-orange-600"></select></div>
                </div>
            </div>
            <div class="flex justify-end mt-8 space-x-4"><button type="button" onclick="closeModals()" class="font-bold text-slate-400">Cancel</button><button type="submit" class="bg-red-500 text-white px-8 py-3 rounded-2xl font-bold">Save Expense</button></div>
        </form>
    </div>

    <div id="vendor-modal" class="modal items-center justify-center p-4">
        <form onsubmit="handleVendorSubmit(event)" class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h3 id="vendor-modal-title" class="text-xl font-black mb-6">Add New Vendor</h3>
            <input type="hidden" id="edit-vendor-id">
            <div class="space-y-5">
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Vendor Name</label><input type="text" id="vn-name" required class="w-full border-b py-2 outline-none font-bold focus:border-orange-500"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Category</label><select id="vn-cat" onchange="updateHeads('vn-cat', 'vn-head')" required class="w-full border-b py-2 outline-none"></select></div>
                    <div><label class="text-[10px] font-
