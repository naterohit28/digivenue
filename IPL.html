<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 Fantasy League</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #F59E0B;
      --bg-dark: #0F172A;
      --bg-card: #1E293B;
      --text-light: #F1F5F9;
      --text-muted: #94A3B8;
      --border: #334155;
      --success: #10B981;
      --error: #EF4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--border);
    }

    .login-card h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .login-card p {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    input[type="email"],
    input[type="text"],
    select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-light);
      font-size: 16px;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* Main App */
    .app-screen {
      display: none;
    }

    .app-screen.active {
      display: block;
    }

    /* Header */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      margin-bottom: 30px;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: var(--bg-dark);
    }

    .user-details h2 {
      font-size: 18px;
      margin-bottom: 2px;
    }

    .user-details p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .logout-btn {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-light);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab-btn {
      padding: 12px 20px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: var(--text-light);
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* Match Selector */
    .match-selector {
      background: var(--bg-card);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }

    .match-selector label {
      font-size: 14px;
      margin-bottom: 10px;
      display: block;
    }

    .match-selector select {
      max-width: 200px;
    }

    /* Report Card */
    .report-card {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .section-header h3 {
      font-size: 16px;
      color: var(--primary);
      font-weight: 600;
    }

    .section-score {
      font-size: 24px;
      font-weight: 700;
      color: var(--success);
    }

    .section-detail {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .tabs {
        gap: 4px;
      }

      .tab-btn {
        padding: 10px 16px;
        font-size: 13px;
      }
    }

    /* Data Table */
    .data-table {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: var(--bg-dark);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--border);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    tr:hover {
      background: rgba(245, 158, 11, 0.05);
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>IPL 2026 Fantasy</h1>
      <p>Enter your registered email to continue</p>
      
      <div id="errorMsg" class="error-msg" style="display: none;"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="your.email@gmail.com"
            required
            autocomplete="email"
          >
        </div>
        
        <button type="submit" class="btn" id="loginBtn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="appScreen" class="app-screen">
    <header>
      <div class="container">
        <div class="header-content">
          <div class="user-info">
            <div class="avatar" id="userAvatar"></div>
            <div class="user-details">
              <h2 id="userName"></h2>
              <p id="userEmail"></p>
            </div>
          </div>
          <button class="logout-btn" id="logoutBtn">Sign Out</button>
        </div>
      </div>
    </header>

    <div class="container">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="reportcard">Your Report Card</button>
        <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
        <button class="tab-btn" data-tab="matchscores">Match Scores</button>
        <button class="tab-btn" data-tab="dailyscores">Daily Scores</button>
      </div>

      <!-- Report Card Tab -->
      <div id="tab-reportcard" class="tab-content active">
        <div class="match-selector">
          <label for="matchSelect">Select Match</label>
          <select id="matchSelect">
            <!-- Will be populated by JS -->
          </select>
        </div>

        <div id="reportCardContent">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading your report card...</p>
          </div>
        </div>
      </div>

      <!-- Other Tabs -->
      <div id="tab-leaderboard" class="tab-content" style="display: none;">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading leaderboard...</p>
        </div>
      </div>

      <div id="tab-matchscores" class="tab-content" style="display: none;">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading match scores...</p>
        </div>
      </div>

      <div id="tab-dailyscores" class="tab-content" style="display: none;">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading daily scores...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxxaK3hsX7zc5_3KDRpomlRkoonn82FypW-G-NTci6Jb4l_20qNwtdJ9EsyHlEzmxfg/exec';
    
    let currentUser = null;
    let currentMatch = 7;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      checkLogin();
      setupEventListeners();
      populateMatchSelect();
    });

    function setupEventListeners() {
      // Login
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      
      // Logout
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);
      
      // Tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
      
      // Match selector
      document.getElementById('matchSelect').addEventListener('change', (e) => {
        currentMatch = parseInt(e.target.value);
        loadReportCard();
      });
    }

    function populateMatchSelect() {
      const select = document.getElementById('matchSelect');
      for (let i = 1; i <= 74; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = `Match ${i}`;
        if (i === currentMatch) option.selected = true;
        select.appendChild(option);
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim().toLowerCase();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      
      try {
        const response = await fetch(`${API_URL}?action=getReportCard&email=${encodeURIComponent(email)}&match=1`);
        const data = await response.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        if (data.success && data.data.player) {
          // Login successful
          currentUser = {
            email: email,
            name: data.data.player
          };
          
          localStorage.setItem('iplUser', JSON.stringify(currentUser));
          showApp();
        } else {
          throw new Error('Invalid response from server');
        }
        
      } catch (error) {
        errorMsg.textContent = error.message || 'Login failed. Please check your email and try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function handleLogout() {
      localStorage.removeItem('iplUser');
      currentUser = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appScreen').classList.remove('active');
    }

    function checkLogin() {
      const stored = localStorage.getItem('iplUser');
      if (stored) {
        currentUser = JSON.parse(stored);
        showApp();
      }
    }

    function showApp() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').classList.add('active');
      
      // Set user info
      const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = currentUser.name;
      document.getElementById('userEmail').textContent = currentUser.email;
      
      // Load initial data
      loadReportCard();
    }

    async function loadReportCard() {
      const container = document.getElementById('reportCardContent');
      container.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading Match ${currentMatch} data...</p>
        </div>
      `;
      
      try {
        const response = await fetch(`${API_URL}?action=getReportCard&email=${encodeURIComponent(currentUser.email)}&match=${currentMatch}`);
        const result = await response.json();
        
        if (!result.success) {
          throw new Error(result.error || 'Failed to load data');
        }
        
        const data = result.data;
        
        // Build report card HTML
        let html = '<div class="report-card">';
        
        // Section titles mapping
        const sectionTitles = {
          matchscores: 'Match Related Points',
          bonusscores: 'Bonus Points',
          riskincentive: 'Risk Incentive',
          spscores: 'SP Scores',
          ddscores: 'DD Scores',
          ssscores: 'SS Scores',
          specialincentive: 'Special Incentive',
          theresurrector: 'The Resurrector',
          playerpoints: 'Player Points'
        };
        
        for (let section in data.sections) {
          const sectionData = data.sections[section];
          const title = sectionTitles[section] || section;
          
          html += `
            <div class="section">
              <div class="section-header">
                <h3>${title}</h3>
                <div class="section-score">${sectionData.score || '-'}</div>
              </div>
              <div class="section-detail">${sectionData.detail || 'No data available'}</div>
              ${sectionData.error ? `<div style="color: var(--error); font-size: 12px; margin-top: 8px;">${sectionData.error}</div>` : ''}
            </div>
          `;
        }
        
        // Debug info
        html += `
          <div class="section" style="background: var(--bg-dark);">
            <details>
              <summary style="cursor: pointer; color: var(--text-muted);">Debug Info</summary>
              <pre style="margin-top: 10px; font-size: 12px; overflow-x: auto;">${JSON.stringify(data.debug, null, 2)}</pre>
            </details>
          </div>
        `;
        
        html += '</div>';
        
        container.innerHTML = html;
        
      } catch (error) {
        container.innerHTML = `
          <div class="error-msg">
            ${error.message}
          </div>
        `;
      }
    }

    function switchTab(tabName) {
      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });
      
      // Update tab content
      document.querySelectorAll('.tab-content').forEach(content => {
        content.style.display = 'none';
      });
      
      const activeTab = document.getElementById(`tab-${tabName}`);
      activeTab.style.display = 'block';
      
      // Load data for other tabs if needed
      if (tabName !== 'reportcard') {
        loadGenericTab(tabName);
      }
    }

    async function loadGenericTab(tabName) {
      const container = document.getElementById(`tab-${tabName}`);
      
      // Map frontend tab names to sheet names
      const tabToSheet = {
        'leaderboard': 'D-1',
        'matchscores': 'Match Scores',
        'dailyscores': 'Daily Scores'
      };
      
      const sheetName = tabToSheet[tabName] || tabName;
      
      try {
        const response = await fetch(`${API_URL}?tab=${encodeURIComponent(sheetName)}`);
        const data = await response.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        // Simple table view
        let html = '<div class="data-table"><table>';
        
        if (data.rows && data.rows.length > 0) {
          // Headers
          html += '<thead><tr>';
          data.rows[0].forEach(cell => {
            html += `<th>${cell}</th>`;
          });
          html += '</tr></thead><tbody>';
          
          // Rows (limit to first 100 for performance)
          for (let i = 1; i < Math.min(data.rows.length, 100); i++) {
            html += '<tr>';
            data.rows[i].forEach(cell => {
              html += `<td>${cell}</td>`;
            });
            html += '</tr>';
          }
          html += '</tbody>';
        }
        
        html += '</table></div>';
        container.innerHTML = html;
        
      } catch (error) {
        container.innerHTML = `<div class="error-msg">${error.message}</div>`;
      }
    }
  </script>

</body>
</html>
