<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL 2026 Fantasy League - Complete</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #F59E0B;
      --bg-dark: #0F172A;
      --bg-card: #1E293B;
      --text-light: #F1F5F9;
      --text-muted: #94A3B8;
      --border: #334155;
      --success: #10B981;
      --error: #EF4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--border);
    }

    .login-card h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .login-card p {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    input[type="email"],
    select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-light);
      font-size: 16px;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--bg-dark);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    /* App Screen */
    .app-screen {
      display: none;
    }

    .app-screen.active {
      display: block;
    }

    /* Header */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      margin-bottom: 30px;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: var(--bg-dark);
    }

    .user-details h2 {
      font-size: 18px;
      margin-bottom: 2px;
    }

    .user-details p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .logout-btn {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-light);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .logout-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .tab-btn {
      padding: 12px 20px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: var(--text-light);
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* Match Selector */
    .match-selector {
      background: var(--bg-card);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }

    .match-selector label {
      font-size: 14px;
      margin-bottom: 10px;
      display: block;
    }

    .match-selector select {
      max-width: 200px;
    }

    /* Report Card Sections */
    .report-card {
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .section-group {
      border-bottom: 2px solid var(--border);
      padding: 0;
    }

    .section-group:last-child {
      border-bottom: none;
    }

    .section-group-header {
      background: var(--bg-dark);
      padding: 15px 20px;
      font-weight: 600;
      font-size: 16px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .line-item {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .line-item:last-child {
      border-bottom: none;
    }

    .line-item.total {
      background: rgba(245, 158, 11, 0.05);
      font-weight: 600;
    }

    .line-item-label {
      flex: 1;
    }

    .line-item-label h4 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .line-item-label p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .line-item-score {
      font-size: 18px;
      font-weight: 700;
      color: var(--success);
      min-width: 80px;
      text-align: right;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Data Table */
    .data-table {
      width: 100%;
      overflow-x: auto;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: var(--bg-dark);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);
    }

    tr:hover {
      background: rgba(245, 158, 11, 0.05);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>IPL 2026 Fantasy</h1>
      <p>Enter your registered email to continue</p>
      
      <div id="errorMsg" class="error-msg" style="display: none;"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="your.email@gmail.com"
            required
            autocomplete="email"
          >
        </div>
        
        <button type="submit" class="btn" id="loginBtn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="appScreen" class="app-screen">
    <header>
      <div class="container">
        <div class="header-content">
          <div class="user-info">
            <div class="avatar" id="userAvatar"></div>
            <div class="user-details">
              <h2 id="userName"></h2>
              <p id="userEmail"></p>
            </div>
          </div>
          <button class="logout-btn" id="logoutBtn">Sign Out</button>
        </div>
      </div>
    </header>

    <div class="container">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="reportcard">Your Report Card</button>
        <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
        <button class="tab-btn" data-tab="matchscores">Match Scores</button>
        <button class="tab-btn" data-tab="bonusscores">Bonus Scores</button>
        <button class="tab-btn" data-tab="riskincentive">Risk Incentive</button>
        <button class="tab-btn" data-tab="ssscores">SS Scores</button>
        <button class="tab-btn" data-tab="ddscores">DD Scores</button>
        <button class="tab-btn" data-tab="spscores">SP Scores</button>
        <button class="tab-btn" data-tab="specialincentive">Special Incentive</button>
        <button class="tab-btn" data-tab="weeklyscores">Weekly Scores</button>
        <button class="tab-btn" data-tab="dailyscores">Daily Scores</button>
        <button class="tab-btn" data-tab="cummatchwise">Cum Match Wise</button>
      </div>

      <!-- Report Card Tab -->
      <div id="tab-reportcard" class="tab-content active">
        <div class="match-selector">
          <label for="matchSelect">Select Match</label>
          <select id="matchSelect">
            <!-- Populated by JS -->
          </select>
        </div>

        <div id="reportCardContent">
          <div class="loading">
            <div class="spinner"></div>
            <p>Loading your report card...</p>
          </div>
        </div>
      </div>

      <!-- Other Tabs (Generic Table Display) -->
      <div id="tab-leaderboard" class="tab-content"></div>
      <div id="tab-matchscores" class="tab-content"></div>
      <div id="tab-bonusscores" class="tab-content"></div>
      <div id="tab-riskincentive" class="tab-content"></div>
      <div id="tab-ssscores" class="tab-content"></div>
      <div id="tab-ddscores" class="tab-content"></div>
      <div id="tab-spscores" class="tab-content"></div>
      <div id="tab-specialincentive" class="tab-content"></div>
      <div id="tab-weeklyscores" class="tab-content"></div>
      <div id="tab-dailyscores" class="tab-content"></div>
      <div id="tab-cummatchwise" class="tab-content"></div>
    </div>
  </div>

  <script>
    // IMPORTANT: Replace this with your actual Apps Script URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbxxaK3hsX7zc5_3KDRpomlRkoonn82FypW-G-NTci6Jb4l_20qNwtdJ9EsyHlEzmxfg/exec';
    
    let currentUser = null;
    let currentMatch = 9;

    // Sheet name mapping
    const TAB_TO_SHEET = {
      'leaderboard': 'D-1',
      'matchscores': 'Match Scores',
      'bonusscores': 'Bonus Scores',
      'riskincentive': 'Risk Incentive',
      'ssscores': 'SS Scores',
      'ddscores': 'DD Scores',
      'spscores': 'SP Scores',
      'specialincentive': 'Special Incentive',
      'weeklyscores': 'Weekly Scores',
      'dailyscores': 'Daily Scores',
      'cummatchwise': 'Cum Match Wise Scores'
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      checkLogin();
      setupEventListeners();
      populateMatchSelect();
    });

    function setupEventListeners() {
      document.getElementById('loginForm').addEventListener('submit', handleLogin);
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
      
      document.getElementById('matchSelect').addEventListener('change', (e) => {
        currentMatch = parseInt(e.target.value);
        loadReportCard();
      });
    }

    function populateMatchSelect() {
      const select = document.getElementById('matchSelect');
      for (let i = 1; i <= 74; i++) {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = `Match ${i}`;
        if (i === currentMatch) option.selected = true;
        select.appendChild(option);
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim().toLowerCase();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      
      try {
        const response = await fetch(`${API_URL}?action=getReportCard&email=${encodeURIComponent(email)}&match=1`);
        const data = await response.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        if (data.success && data.data.player) {
          currentUser = {
            email: email,
            name: data.data.player
          };
          
          localStorage.setItem('iplUser', JSON.stringify(currentUser));
          showApp();
        } else {
          throw new Error('Invalid response from server');
        }
        
      } catch (error) {
        errorMsg.textContent = error.message || 'Login failed. Please check your email.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function handleLogout() {
      localStorage.removeItem('iplUser');
      currentUser = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appScreen').classList.remove('active');
    }

    function checkLogin() {
      const stored = localStorage.getItem('iplUser');
      if (stored) {
        currentUser = JSON.parse(stored);
        showApp();
      }
    }

    function showApp() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').classList.add('active');
      
      const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = currentUser.name;
      document.getElementById('userEmail').textContent = currentUser.email;
      
      loadReportCard();
    }

    async function loadReportCard() {
      const container = document.getElementById('reportCardContent');
      container.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading Match ${currentMatch} data...</p>
        </div>
      `;
      
      try {
        const response = await fetch(`${API_URL}?action=getReportCard&email=${encodeURIComponent(currentUser.email)}&match=${currentMatch}`);
        const result = await response.json();
        
        if (!result.success) {
          throw new Error(result.error || 'Failed to load data');
        }
        
        container.innerHTML = buildReportCardHTML(result.data);
        
      } catch (error) {
        container.innerHTML = `<div class="error-msg">${error.message}</div>`;
      }
    }

    function buildReportCardHTML(data) {
      const s = data.sections;
      const ss = data.ssTeam;
      
      let html = '<div class="report-card">';
      
      // MATCH RELATED
      html += `
        <div class="section-group">
          <div class="section-group-header">Match Related</div>
          ${lineItem('Match Points', s.matchscores)}
          ${lineItem('Bonus Points', s.bonusscores)}
          ${lineItem('Risk Incentive', s.riskincentive)}
          ${lineItem('Special Incentive', s.specialincentive)}
          ${lineItem('Match Related Points (Total)', s.matchscores, true)}
        </div>
      `;
      
      // SUPER PICKS
      html += `
        <div class="section-group">
          <div class="section-group-header">Super Picks</div>
          ${lineItem('SP Individual Performance', s.spscores)}
          ${lineItem('Linked / Not Linked', s.spscores)}
          ${lineItem('SP Points (incl link effect)', s.spscores, true)}
        </div>
      `;
      
      // DOUBLE DOWN
      html += `
        <div class="section-group">
          <div class="section-group-header">Double Down</div>
          ${lineItem('D1 Individual Performance', s.ddscores)}
          ${lineItem('D2 Individual Performance', s.ddscores)}
          ${lineItem('Upfront Premium?', s.ddscores)}
          ${lineItem('DD Points (incl prem. effect)', s.ddscores, true)}
        </div>
      `;
      
      // THE RESURRECTOR
      html += `
        <div class="section-group">
          <div class="section-group-header">The Resurrector</div>
          ${lineItem('Ressurector 1', s.theresurrector)}
          ${lineItem('Ressurector 2', s.theresurrector)}
          ${lineItem('THE RESURRECTOR (Total)', s.theresurrector, true)}
        </div>
      `;
      
      // SUPER SELECTOR TEAM
      if (ss) {
        html += `
          <div class="section-group">
            <div class="section-group-header">Super Selector Team</div>
            ${ssLineItem('Wicket Keeper', ss['Wicket Keeper'], s.ssscores)}
            ${ssLineItem('Vice Captain', ss['Vice Captain'], s.ssscores)}
            ${ssLineItem('Captain', ss['Captain'], s.ssscores)}
            ${ssLineItem('Bat 1', ss['Bat 1'], s.ssscores)}
            ${ssLineItem('Bat 2', ss['Bat 2'], s.ssscores)}
            ${ssLineItem('Bat 3', ss['Bat 3'], s.ssscores)}
            ${ssLineItem('Bow 1', ss['Bow 1'], s.ssscores)}
            ${ssLineItem('Bow 2', ss['Bow 2'], s.ssscores)}
            ${ssLineItem('Bow 3', ss['Bow 3'], s.ssscores)}
            ${ssLineItem('All-Rounder 1', ss['All-Rounder 1'], s.ssscores)}
            ${ssLineItem('All-Rounder 2', ss['All-Rounder 2'], s.ssscores)}
            ${ssLineItem('Play 1', ss['Play 1'], s.ssscores)}
            ${ssLineItem('Play 2', ss['Play 2'], s.ssscores)}
            ${lineItem('Super Selector (Total)', s.ssscores, true)}
          </div>
        `;
      }
      
      // TOTAL DAILY SCORE
      html += `
        <div class="section-group">
          <div class="line-item total">
            <div class="line-item-label">
              <h4 style="font-size: 18px;">TOTAL DAILY SCORE</h4>
            </div>
            <div class="line-item-score" style="font-size: 28px;">
              ${calculateTotal(s)}
            </div>
          </div>
        </div>
      `;
      
      html += '</div>';
      return html;
    }

    function lineItem(label, section, isTotal = false) {
      if (!section) {
        return `
          <div class="line-item ${isTotal ? 'total' : ''}">
            <div class="line-item-label">
              <h4>${label}</h4>
              <p>-</p>
            </div>
            <div class="line-item-score">-</div>
          </div>
        `;
      }
      
      return `
        <div class="line-item ${isTotal ? 'total' : ''}">
          <div class="line-item-label">
            <h4>${label}</h4>
            <p>${section.detail || '-'}</p>
          </div>
          <div class="line-item-score">${section.score || '-'}</div>
        </div>
      `;
    }

    function ssLineItem(label, playerName, section) {
      return `
        <div class="line-item">
          <div class="line-item-label">
            <h4>${label}</h4>
            <p>${playerName || '-'}</p>
          </div>
          <div class="line-item-score">${section?.score || '-'}</div>
        </div>
      `;
    }

    function calculateTotal(sections) {
      // For now, just sum the scores we have
      // You may need to adjust this based on actual data structure
      let total = 0;
      for (let key in sections) {
        const score = parseInt(sections[key]?.score || '0');
        if (!isNaN(score)) total += score;
      }
      return total || '-';
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });
      
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      
      const activeTab = document.getElementById(`tab-${tabName}`);
      activeTab.classList.add('active');
      
      if (tabName !== 'reportcard' && !activeTab.innerHTML) {
        loadGenericTab(tabName);
      }
    }

    async function loadGenericTab(tabName) {
      const container = document.getElementById(`tab-${tabName}`);
      container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
      
      const sheetName = TAB_TO_SHEET[tabName];
      
      try {
        const response = await fetch(`${API_URL}?tab=${encodeURIComponent(sheetName)}`);
        const data = await response.json();
        
        if (data.error) {
          throw new Error(data.error);
        }
        
        let html = '<div class="data-table"><table>';
        
        if (data.rows && data.rows.length > 0) {
          html += '<thead><tr>';
          data.rows[0].forEach(cell => {
            html += `<th>${cell}</th>`;
          });
          html += '</tr></thead><tbody>';
          
          for (let i = 1; i < Math.min(data.rows.length, 100); i++) {
            html += '<tr>';
            data.rows[i].forEach(cell => {
              html += `<td>${cell}</td>`;
            });
            html += '</tr>';
          }
          html += '</tbody>';
        }
        
        html += '</table></div>';
        container.innerHTML = html;
        
      } catch (error) {
        container.innerHTML = `<div class="error-msg">${error.message}</div>`;
      }
    }
  </script>

</body>
</html>
