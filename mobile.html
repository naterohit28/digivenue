<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DigiVenue — Complete Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════════════════ */
:root {
  --navy:        #003265;
  --navy-mid:    #00418a;
  --navy-lit:    #1a5aab;
  --gold:        #eaa921;
  --gold-l:      #f5c040;
  --gold-pale:   #fef8e6;
  --gold-glow:   rgba(234,169,33,.15);
  --jade:        #1e7a50;
  --jade-l:      #28a06a;
  --jade-pale:   #e6f7ef;
  --rose:        #b83030;
  --rose-pale:   #fceaea;
  --amber:       #c07010;
  --amber-pale:  #fef3e0;
  --sky:         #1a60a8;
  --sky-pale:    #e6f0fc;
  --violet:      #6030a0;
  --violet-pale: #f0eafa;
  --bg:          #f4f6f9;
  --surface:     #f9fafc;
  --card:        #ffffff;
  --border:      #dde3ec;
  --border-l:    #c8d2e0;
  --text:        #0d1b2a;
  --muted:       #6b7a94;
  --faint:       #a8b4c8;
  --r:           12px;
  --r-lg:        18px;
  --shadow-xs:   0 1px 4px rgba(0,50,101,.06);
  --shadow-sm:   0 2px 12px rgba(0,50,101,.09);
  --shadow:      0 4px 24px rgba(0,50,101,.12);
  --shadow-lg:   0 10px 48px rgba(0,50,101,.18);
}

/* ════════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ════════════════════════════════════════════════════
   TOPBAR
════════════════════════════════════════════════════ */
.topbar {
  height: 64px;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 3px solid var(--gold);
  box-shadow: 0 2px 10px rgba(0,50,101,.10);
}
.tb-logo {
  display: flex; align-items: center;
  gap: 8px; flex: 1; min-width: 0;
}
.tb-logo img { height: 40px; }
.tb-center { display: none; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; flex: 1; padding: 0 24px; }
.tb-right  { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

.tb-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-l));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: var(--navy); cursor: pointer;
  border: 2px solid rgba(234,169,33,.4); flex-shrink: 0;
}

/* ════════════════════════════════════════════════════
   BUTTONS (Touch Accessible 44px Min Height)
════════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 12px 24px; border-radius: 8px; border: none; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .2s; white-space: nowrap;
  min-height: 44px;
}
.btn-primary { background: var(--navy); color: #ffffff; }
.btn-primary:hover { background: var(--navy-mid); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { background: var(--gold-l); transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--navy); border: 2px solid var(--border-l); }
.btn-outline:hover { border-color: var(--navy); background: var(--surface); }
.btn-sm { padding: 8px 16px; font-size: 13px; min-height: 36px; }
.btn-danger { background: var(--rose-pale); color: var(--rose); border: 1px solid rgba(184,48,48,.2); }
.btn-danger:hover { background: var(--rose); color: #fff; }

/* ════════════════════════════════════════════════════
   MAIN LAYOUT & SIDEBAR
════════════════════════════════════════════════════ */
.layout { display: flex; flex: 1; flex-direction: column; }
.sidebar {
  display: none; width: 240px; flex-shrink: 0; background: var(--navy);
  flex-direction: column; overflow-x: hidden; overflow-y: auto;
  transition: width .3s ease; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.15) transparent;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 3px; }
.sidebar.collapsed { width: 64px; }
.sb-section { padding: 16px 12px 8px; }
.sb-section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
  color: rgba(255,255,255,.4); font-weight: 700; padding: 0 8px; margin-bottom: 8px;
}
.sidebar.collapsed .sb-section-label { opacity: 0; }
.nav-link {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  border-radius: 8px; margin-bottom: 4px; cursor: pointer; transition: all .2s;
  color: rgba(255,255,255,.7); font-size: 14px; font-weight: 500; min-height: 44px;
}
.nav-link:hover { background: rgba(255,255,255,.1); color: #ffffff; }
.nav-link.active { background: var(--gold); color: #003265; font-weight: 700; }
.nl-icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar.collapsed .nl-label, .sidebar.collapsed .nl-badge { display: none; }
.sb-bottom { margin-top: auto; padding: 16px 12px; border-top: 1px solid rgba(255,255,255,.1); }

/* ════════════════════════════════════════════════════
   CONTENT AREA
════════════════════════════════════════════════════ */
.content { flex: 1; display: flex; flex-direction: column; width: 100%; align-items: center; }
.page { display: none; width: 100%; padding: 24px 16px 100px; }
.page.active { display: block; }

/* ════════════════════════════════════════════════════
   PAGE HEADERS
════════════════════════════════════════════════════ */
.page-header { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; width: 100%; }
.ph-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1.2; }
.ph-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }
.ph-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; width: 100%; }

/* ════════════════════════════════════════════════════
   CARDS & GRIDS
════════════════════════════════════════════════════ */
.card, .sec-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); }
.sec-card { margin-bottom: 24px; overflow: hidden; }
.sec-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface); gap: 12px; flex-wrap: wrap; }
.sec-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; }
.sec-body { padding: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }

.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.kpi-card { padding: 16px; position: relative; overflow: hidden; border-radius: var(--r); background: var(--card); border: 1px solid var(--border); transition: box-shadow .2s; }
.kpi-card:hover { box-shadow: var(--shadow-sm); }
.kpi-card::after { content: ''; position: absolute; top: 0; right: 0; width: 64px; height: 64px; border-radius: 0 0 0 64px; opacity: .1; }
.kpi-gold::after { background: var(--gold); } .kpi-jade::after { background: var(--jade); }
.kpi-rose::after { background: var(--rose); } .kpi-amber::after { background: var(--amber); }

.kpi-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; margin-bottom: 8px; }
.kpi-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.kv-gold { color: var(--gold); } .kv-jade { color: var(--jade); } .kv-rose { color: var(--rose); } .kv-amber { color: var(--amber); }
.kpi-sub { font-size: 12px; color: var(--muted); }

/* ════════════════════════════════════════════════════
   STATUS BADGES
════════════════════════════════════════════════════ */
.badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 24px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
.b-confirmed { background: var(--gold-pale); color: var(--gold); border: 1px solid rgba(200,146,10,.25); } .b-confirmed::before { background: var(--gold); }
.b-paid { background: var(--jade-pale); color: var(--jade); border: 1px solid rgba(30,122,80,.25); } .b-paid::before { background: var(--jade); }
.b-pending { background: var(--amber-pale); color: var(--amber); border: 1px solid rgba(192,112,16,.25); } .b-pending::before { background: var(--amber); }
.b-overdue { background: var(--rose-pale); color: var(--rose); border: 1px solid rgba(184,48,48,.25); } .b-overdue::before { background: var(--rose); }

/* ════════════════════════════════════════════════════
   TABLES
════════════════════════════════════════════════════ */
.data-table { width: 100%; border-collapse: collapse; min-width: 600px; }
.data-table th { text-align: left; padding: 12px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; border-bottom: 1px solid var(--border); background: var(--surface); white-space: nowrap; }
.data-table td { padding: 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--surface); }

/* ════════════════════════════════════════════════════
   DESKTOP OVERRIDES
════════════════════════════════════════════════════ */
@media (min-width: 769px) {
  .mobile-nav { display: none !important; }
  body, .layout { overflow: hidden; height: 100vh; }
  .sidebar { display: flex !important; }
  .page { max-width: 1200px; margin: 0 auto; padding: 32px; overflow-y: auto; height: 100%; }
  .page-header { flex-direction: row; align-items: center; justify-content: space-between; }
  .ph-actions { width: auto; }
  .kpi-grid { grid-template-columns: repeat(4, 1fr); }
  .dash-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
}

@media (max-width: 768px) {
  .page { padding-bottom: 120px; } /* Room for mobile nav */
  .mobile-only { display: block; }
  .desktop-only { display: none; }
}

/* ════════════════════════════════════════════════════
   MOBILE NAV
════════════════════════════════════════════════════ */
.mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: #ffffff; border-top: 2px solid var(--gold); padding: 8px 0; z-index: 150; box-shadow: 0 -2px 12px rgba(0,50,101,.10); }
.mn-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 8px; cursor: pointer; min-height: 44px; }
.mn-icon { font-size: 22px; }
.mn-label { font-size: 11px; font-weight: 600; color: var(--muted); }
.mn-item.active .mn-label { color: var(--gold); font-weight: 700; }
.mn-item.active .mn-icon { transform: scale(1.1); color: var(--gold); }
</style>
</head>
<body>

<div class="demo-banner" id="demoBanner" style="background: var(--navy); color: #fff; padding: 12px 16px; text-align: center; font-size: 14px; position: relative;">
  <span style="background: var(--gold); color: var(--navy); padding: 4px 8px; border-radius: 12px; font-weight: 700; font-size: 12px; margin-right: 8px;">🚀 Demo</span>
  You're viewing a live demo of DigiVenue.
  <button onclick="dismissBanner()" style="position: absolute; right: 16px; top: 12px; background: transparent; border: none; color: #fff; font-size: 18px; cursor: pointer; min-height: 44px; min-width: 44px;">✕</button>
</div>

<div class="topbar">
  <div class="tb-logo">
    <div style="font-size: 20px; font-weight: 700; color: var(--navy);">Digi<span style="color: var(--gold)">Venue</span></div>
  </div>
  <div class="tb-right">
    <div class="tb-avatar">RS</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-section-label">Main</div>
      <div class="nav-link active" onclick="showPage('dashboard',this)"><span class="nl-icon">📊</span><span class="nl-label">Dashboard</span></div>
      <div class="nav-link" onclick="showPage('bookings',this)"><span class="nl-icon">📋</span><span class="nl-label">Bookings</span></div>
      <div class="nav-link" onclick="showPage('finances',this)"><span class="nl-icon">💰</span><span class="nl-label">Finances</span></div>
    </div>
  </div>

  <div class="content">
    
    <div class="page active" id="page-dashboard">
      <div class="page-header">
        <div>
          <div class="ph-title">Dashboard</div>
          <div class="ph-sub" id="tbDate">Today's Overview</div>
        </div>
        <div class="ph-actions">
          <button class="btn btn-primary">+ New Booking</button>
        </div>
      </div>

      <div class="kpi-grid" id="dashKPI">
        </div>

      <div class="dash-two-col">
        <div class="sec-card">
          <div class="sec-head"><div class="sec-title">Recent Bookings</div></div>
          <div class="sec-body" style="padding: 0;">
            <table class="data-table" id="dashBookTable">
              </table>
          </div>
        </div>
        <div class="sec-card">
          <div class="sec-head"><div class="sec-title">Recent Activity</div></div>
          <div class="sec-body" id="activityFeed" style="display: flex; flex-direction: column; gap: 16px;">
            </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-bookings">
      <div class="page-header">
        <div>
          <div class="ph-title">Bookings</div>
          <div class="ph-sub">Manage your events</div>
        </div>
        <button class="btn btn-primary">+ Add Booking</button>
      </div>
      <div class="sec-card" style="padding: 0;">
         <table class="data-table" id="ptTable"></table>
      </div>
    </div>

    <div class="page" id="page-finances">
      <div class="page-header">
        <div>
          <div class="ph-title">Financial Overview</div>
          <div class="ph-sub">Revenue and Collections</div>
        </div>
      </div>
      <div class="kpi-grid" id="finKPI"></div>
    </div>

  </div>
</div>

<div class="mobile-nav">
  <div class="mn-item active" onclick="showPage('dashboard',this)"><span class="mn-icon">📊</span><span class="mn-label">Home</span></div>
  <div class="mn-item" onclick="showPage('bookings',this)"><span class="mn-icon">📋</span><span class="mn-label">Bookings</span></div>
  <div class="mn-item" onclick="showPage('finances',this)"><span class="mn-icon">💰</span><span class="mn-label">Finance</span></div>
</div>

<script>
// Maintaining functionality with basic state mockups for the optimized UI
const bookings = [
  { id: 1, client: 'Sharma Wedding', venue: 'Grand Hall', date: '2026-04-20', amount: 950000, advance: 400000, guests: 450 },
  { id: 2, client: 'Mehra Reception', venue: 'Garden Lawn', date: '2026-04-25', amount: 420000, advance: 420000, guests: 280 }
];

const activity = [
  { icon: '📝', type: 'gold', title: 'Sharma Wedding confirmed', sub: 'Grand Hall · ₹9,50,000', time: '2h ago' },
  { icon: '💰', type: 'jade', title: 'Payment received ₹4,20,000', sub: 'Mehra Reception — fully paid', time: '5h ago' }
];

function renderDashboard() {
  const rev = bookings.reduce((s,b)=>s+b.amount,0);
  const coll = bookings.reduce((s,b)=>s+b.advance,0);
  const due = rev-coll;

  document.getElementById('dashKPI').innerHTML = `
    <div class="kpi-card kpi-gold"><div class="kpi-label">Total Revenue</div><div class="kpi-value kv-gold">₹${(rev/100000).toFixed(1)}L</div><div class="kpi-sub">${bookings.length} bookings</div></div>
    <div class="kpi-card kpi-jade"><div class="kpi-label">Collected</div><div class="kpi-value kv-jade">₹${(coll/100000).toFixed(1)}L</div><div class="kpi-sub">Received</div></div>
    <div class="kpi-card kpi-rose"><div class="kpi-label">Outstanding</div><div class="kpi-value kv-rose">₹${(due/100000).toFixed(1)}L</div><div class="kpi-sub">Pending</div></div>
  `;

  document.getElementById('dashBookTable').innerHTML = `
    <thead><tr><th>Client</th><th>Venue</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
    <tbody>${bookings.map(b => `
      <tr>
        <td style="font-weight: 600;">${b.client}</td>
        <td style="color: var(--muted);">${b.venue}</td>
        <td>${b.date}</td>
        <td style="font-weight: 600;">₹${b.amount}</td>
        <td><span class="badge ${b.advance >= b.amount ? 'b-paid' : 'b-pending'}">${b.advance >= b.amount ? 'Paid' : 'Due'}</span></td>
      </tr>`).join('')}
    </tbody>`;

  document.getElementById('activityFeed').innerHTML = activity.map(a => `
    <div style="display: flex; gap: 16px; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
      <div style="width: 44px; height: 44px; border-radius: 12px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 20px;">${a.icon}</div>
      <div style="flex: 1;">
        <div style="font-size: 14px; font-weight: 700; color: var(--text);">${a.title}</div>
        <div style="font-size: 12px; color: var(--muted);">${a.sub}</div>
      </div>
      <div style="font-size: 12px; color: var(--faint);">${a.time}</div>
    </div>`).join('');
}

function showPage(pageId, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  
  if(el) {
    document.querySelectorAll('.mn-item, .nav-link').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }
}

function dismissBanner() { document.getElementById('demoBanner').style.display = 'none'; }

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('tbDate').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
  renderDashboard();
});
</script>
</body>
</html>
